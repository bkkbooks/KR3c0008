front:
  text: 後序端平改元七月乙卯萬榮以尚右郎蒙恩升對首奉守一心之正以謹治原次奏懲群吏之貪以固邦本天威咫尺洊賜褒嘉既而玉音巽發謂朕嘗見卿所編棠隂比事知卿聽訟决能審克萬榮即恭奏臣昨調建康司理右掾待次日久因編此以資見聞豈料天侈其逄誤關乙覽容臣下殿躬謝暨出黃門便有力求此本者鋟梓星江逺莫之致是用重刋流布庶可上廣聖主好生之德下禆涖官哀矜之意十月既望朝散大夫新除直寶章閣知常德府桂萬榮謹識棠隂比事後序獄重事也獄而有疑則尤事之重君子所冝盡心焉今之居是官者其果能盡是心乎吾表兄桂夢協讀書不讀律而每有哀憐無辜之心尉滿參選特注司寇參軍而歸人問之則曰此吾志也待次五年則曰此吾所欲也因取古人之書有資於折獄者觀之其於和魯公之疑獄集鄭公克之折獄龜鑑則又考之精玩之熟事之類者不期而合韻之協者不期而比屬辭七十有二信乎臨事之不茍而遇物期於無悔也虙嘗伏而讀之以為近世士夫鉤元提要以資博識彊記者不知幾書類多無𥙷此書一傳天下其無冤民乎則又從而思之竊謂鞭絲以出鐵擊皮以驗鹽發冡知盜模金辨誣如此等事不見於古之盛時而見於後世豈古之風俗尚淳不俟乎測囚之法而後世如鬼如蜮不如是則不得其情邪觀天子議獄緩死之言獨於中孚之象發之蓋惟天下之至誠可以動人悟物雖開金石感鬼神可也茍推吾是心聽之以五聲簡之以五辭不撓不屈志氣清明天威具嚴洋洋在上謂人情不可得吾不信也吾表兄其知之矣虙幹辨浙東安撫司事表兄携此書見示未幾赴官金陵道出越上虙歸此書因題于後以代送行序云嘉定辛未良月之望張虙識
