  - {type: variant, offset: 2563, length: 293, content: 曰我桑殿直也為我察盗之實的居處切勿泄乃分軍士悉擒獲之見本傳蘓秦在齊齊大夫多與之争寵而使人刺之不殊而走求賊不得蘓秦且死乃謂齊王曰臣死之後王車裂以殉於市曰秦為燕作亂於齊如此則刺臣之賊决可得王如其言殺蘓秦者果出齊王因而誅之舊出春秋後語任城示靴楊津獲絹北齊任城王湝領并州刺史時有婦人臨汾水浣衣為乗馬行人換其靴而去者婦人持故靴詣州言之湝召城中諸嫗以靴示之紿曰有乗馬於路𬒳刼者遺此一靴得非親屬乎一嫗撫膺哭曰兒昨着此囘妻家也即捕而獲之周楊津字羅漢為岐州刺史有武功人齎絹三百匹去城十里為賊所刼時有使者馳騎而至𬒳刼人因以告之使者到州以狀白之津乃下教曰有人着某色衣乗某色馬在城東十里𬒳殺不知姓名若有家人可速, WYG: ''}
