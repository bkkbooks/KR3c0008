  - {type: variant, offset: 6984, length: 607, content: 按賣田問隣成劵會隣古法也近年有司茍取小快遂改此法未之思歟叅政韓億知洋州時土豪李甲者兄死迫嫁其嫂因誣其子為異姓以專其資嫂歷訴於官甲輙賂吏使掠服之億視舊牘但未曽引乳醫為證一日盡召其黨以乳醫示之衆乃無詞其冤遂白袁滋鑄金孫寳秤散唐李汧公鎮鳯翔屬邑有編氓因耨田得馬蹄金一瓮里民送於縣治沿牒将置府庭邑宰恐公藏失守使貯於私庫信宿視之乃土塊也以狀聞於府議者僉疑姦人换之遂遣掾就案其事宰莫能明即以易金誣服窮其所藏之所或云糞土或云水中以案上聞汧公怒甚俄而有宴語及斯事坐客咸驚時袁相國滋亦在幕中獨俛首無語汧公詰之滋曰某疑此事有枉汧公乃俾移其獄於郡命袁治之袁令閱瓮間得土二百五十餘塊遂於列肆索金鎔成土塊状始及其半已有三百斤詢其𥘉負之人乃二農夫以巨竹舁之計其緫數非二人以竹可轝度其在路之時金已化為土矣於是群情大豁邑宰獲伸雪劇談録漢孫寳為京兆尹有賣鐶散者今之鐶餅也於都市與一村民相逄撃落皆碎村民甘認填五十枚賣者堅稱三百枚争至太守之前引問無以證明公令别買一枚秤之乃都秤碎者細折分兩賣者乃伏虗誑之罪程簿舊錢王璩故簡程顥察院𥘉爲京兆府鄠縣簿民有借兄之宅居者發地藏錢兄之子訴曰父所藏也令言無證佐何以决之顥曰此易辨耳問兄之子曰爾父藏錢㡬年矣曰二十年遣吏取一千視之謂曰今官所鑄不五六年則徧天下此錢乃爾父未居前數十年所鑄何也其人遂伏伊川所撰行状寺丞王璩甞爲襄州中廬令有賊乆訊不得情偶於賊槖中得故簡而掲示之乃房陵商人道爲賊所掠者賊即引伏王珪所撰志棠隂比事上卷, WYG: ''}
