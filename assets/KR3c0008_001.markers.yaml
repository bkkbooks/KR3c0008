  - {type: variant, offset: 6806, length: 2, content: 唐韓, WYG: 張輅行穴石晉時魏州冠氏縣華村僧寺有一鐡佛長丈餘中心空一旦云佛能言士衆雲集施利填委縣申州府時高祖鎮鄴命牙將尚謙持香奉供且驗其事有三傳張輅請與偕行乃率人圍寺盡遣僧赴道塲輅即潛開僧房見有穴道及入穴行至鐡佛座下因入空身中厲聲歴數僧過擒魁首數人上聞就彼戮之因以輅為長河縣主簿薛向執賈樞宻薛向初為京兆户曹兼監商稅有賈胡過稅務出銀二篋書其上曰宻使遺涇原都監向曰此决偽也安有大人餉人物而使賈胡致之執詣府治之果伏其詐揚牧笞巫後魏李崇為揚州刺史有定州流人觧}
  - {type: page-break, offset: 6806, content: '', id: KR3c0008_WYG_000-23a, image: WYG0729/WYG0729-0980c.png}
