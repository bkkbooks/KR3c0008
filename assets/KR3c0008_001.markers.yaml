  - {type: variant, offset: 3126, length: 255, content: 當死寀獨曰子盗母柩納於父墓豈可與發冡取財者比請之得减死侍讀賈黯判流内銓時益州推官乗澤在蜀三年不知其父死及代還銓吏不為領文書始去發喪既除服且求磨勘黯言澤與父不通問者三年借非匿喪是豈為孝卒使坐廢田里王珪撰志子産知姦莊遵疑哭鄭子産聞婦人哭使人執而問之果手刃其夫者也御者問曰何以知之子産曰夫人之於所親也有病則憂臨死則懼既死則哀今其夫已死哭不哀而懼是以知其有姦也出獨異志莊遵為楊州刺史廵行部内聞一哭聲懼而不哀駐車問之答曰夫遭火燒死遵疑焉因令吏守之有蝇集於屍首吏乃披髻視之得鐡釘焉因知此婦與姦人共殺其夫也即案其罪思兢詐客佐, WYG: 左}
