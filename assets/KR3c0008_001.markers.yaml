  - {type: variant, offset: 2, length: 4, content: 萬榮編次, WYG: 陽監民爭舟毆死獄久不决􅁮出囚飲食之皆還於獄獨留一人留者色動􅁮曰殺人者汝也囚不知所以然􅁮曰吾視食者皆以右手汝獨以左今死者傷右肋此汝殺之明騐也囚乃伏罪錢推求奴錢若水為同州推官有富家女奴逃亡父母訴於州録事參軍録參嘗貸富家錢不獲遂劾富民父子共殺女奴投尸於水或為元謀或為加功罪皆應死獄具若水獨疑留而不决州郡上下切怪之録參誣若水受賂若水但笑謝而已旬餘屏人語知州曰某留獄者所以訪求女奴今得之矣知州取入從簾中推出示其父母父母驚曰是已於是富民父子得釋知州欲奏其功固辭不願朝廷聞之驟加進擢}
