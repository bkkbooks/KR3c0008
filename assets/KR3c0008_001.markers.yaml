  - {type: variant, offset: 2387, length: 0, content: '', WYG: 葛王諫議知福州時閩人欲報仇或先食野葛而後鬬即死其家遂誣告之臻問所傷果致命耶吏曰傷不甚也臻疑反訊告者遂得其實穎知子盗郎中歐陽穎知歙州富家有盗啟其藏捕久不獲穎曰勿捕獨召富家二子械付獄劾之即伏吏民初疑不勝楚掠而自誣及取出所盗物乃信孫料兄殺孫長卿知和州民有訴弟為人所殺察其言不情乃問汝户幾等曰上等汝家幾人曰惟一弟與妻子耳長卿曰殺弟者兄也豈將併有其貲乎訊之果服乖崖察額張尚書知江寧有僧呈牒給憑公㨿案熟視久之判司理院勘殺人賊郡寮不曉其故公乃召僧問披剃幾年對曰七年又曰何故額有巾痕即首伏乃一民與僧同行道中殺之以其度牒自剃為僧胡質集鄰魏志胡質為常山太守東筦盧顯為人所殺求賊未得質曰此事無仇而有少妻所以死耳乃集鄰居少年有李若者}
