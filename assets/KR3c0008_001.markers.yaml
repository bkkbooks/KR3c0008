  - {type: indent, offset: 4011, content: 　, id: KR3c0008_krp_001-bkkind180}
  - {type: variant, offset: 4012, length: 547, content: 有令何至此也其人垂泣不肯去具言所以允濟遂令左右縛牛主布衫蒙頭將詣其妻家村中捕盗牛賊悉問此村牛所從来妻家不知其故恐𬒳連及乃曰此是女壻家牛允濟令發其蒙謂曰此即女壻當以牛歸之唐裴子雲為衛州新郷令部人王恭戍邊留㹀牛六頭於舅李璡家五年産犢三十頭㳟還索牛李云㹀牛二頭已死只還四頭老㹀㳟訴之子雲送㳟於獄令收追盗牛者李璡璡至子雲叱之曰賊引汝盗牛三十頭藏汝莊禸喚賊共對乃以布衫籠㳟頭立南墻下命璡急吐欵云三十頭牛㧾是外甥㹀牛所生實非盗得子雲遣去㳟布衫即令盡還牛却以五頭酬璡辛苦王質母原馬亮悉貸王質待制知廬州有盗殺其黨并其貲而遁邏者得之質抵之死轉運使楊告駮之曰盗殺其徒者死當原質云殺其徒而自首者當原今殺人而取其貲非自首而捕得之原死豈法意乎數上䟽不報降監舒州靈仙觀逾年韓琦知審刑院請盗殺其徒而不首者母得原見本傳尚書馬亮知潭州屬縣有亡命卒剽攻為鄉村患或謀殺之在法當死者四人亮曰能為民除害而反坐以死豈法意耶乃悉貸之鄭克評曰按剽攻之人於法許捕若非名捕者輒以謀殺之則慮有誣枉法所不許也能奏聼裁尤為得體云允濟聴葱彭城書菜張允濟為武陽令道逄老母種葱結庵守之因告曰不湏守若遇盗當来訴老母如戒居一宿而失葱母以告允濟悉召葱地左右居人使之一一聴其手乃得盗者北齊彭城王浟為滄州刺史有老母種菜数被盗者浟使人宻徃書其葉明日市中認之乃獲賊吕婦斷腕, WYG: 服}
