  - {type: line-break, offset: 0, content: '', id: KR3c0008_SBCK_001-1a01}
  - {type: variant, offset: 0, length: 2, content: 棠隂, WYG: 待制馬宗元少時父麟毆人被繫守辜而傷者死將抵法宗元推所毆時在限外四刻因訴於郡得原父死鄭克云按辜限計日而日以百刻計之死在限外則不坐毆殺之罪而坐毆傷之罪雖止四刻亦在限外謹按大明律云几保辜者責令犯人醫治辜限内皆須因傷死者以鬬毆殺人論其在辜限外死者各從本毆傷法若折傷以上辜内醫治平復者各减二等辜限滿日不平復者各依律全科又依唐律云保辜限内死者依殺人論限外死者依本毆傷法又按元史刑法志云保辜限内死者依殺人論限外死者杖一百七盖元時未嘗定律及聖朝未定律之先皆以唐律}
  - {type: page-break, offset: 0, content: '', id: KR3c0008_WYG_000-8b, image: WYG0729/WYG0729-0973b.png}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 擬故我朝律文多宗唐律而此條亦本之也訥曩在南京㑹審刑部罪囚有毆人辜限外死者訥曰當依本毆傷法或曰律云辜限滿不平復者全科此當死訥曰所云限滿不平復全科者因上文折傷以上限内平復减二等立文盖謂辜内雖平復而成殘廢篤疾及限滿不平復者則全科折傷之罪若曰辜限外死者全科死罪則律又何不云傷不平復而死者絞乃虚立此辜限乎後此囚㑹赦得免然或人終不以愚言為然也近讀宗元守辜}
  - {type: page-break, offset: 3, content: '', id: KR3c0008_WYG_000-9a, image: WYG0729/WYG0729-0973c.png}
  - {type: variant, offset: 4, length: 1, content: 卷, WYG: 有感因備載之讀者詳焉杜亞疑酒唐杜亞鎮維揚有富室子父亡奉繼母不以道因}
  - {type: page-break, offset: 4, content: '', id: KR3c0008_WYG_000-9b, image: WYG0729/WYG0729-0973d.png}
  - {type: variant, offset: 6, length: 1, content: 宋, WYG: 壽母復子觴子疑有毒覆於地地墳乃謂母以酖殺人母曰天鑒在上何當厚誣訴於府公曰酒從何來曰長婦執爵而致公曰爾婦執爵毒因婦起豈可誣母乃分開鞫之盖子婦同謀害母遂皆伏法張昇窺井張丞相知潤州有婦人夫出不歸忽聞菜園井中有死人即往哭曰吾夫也以聞於官昇命吏集鄰里騐是其夫否皆言井深不可辨昇曰衆不可辨而婦人獨知為夫何耶送獄訊問乃奸夫殺之婦與共謀歐陽左手都官歐陽􅁮知端州有}
  - {type: page-break, offset: 6, content: '', id: KR3c0008_WYG_000-10a, image: WYG0729/WYG0729-0974a.png}
