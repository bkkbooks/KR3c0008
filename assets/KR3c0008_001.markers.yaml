  - {type: variant, offset: 375, length: 1041, content: 知州欲奏其功固辭不願朝廷聞之驟加進擢同上曹攄明婦裴均釋夫晉曹攄字顔逺為臨淄令目有寡婦飬姑甚謹姑以其年少勸令改適婦守節不移姑愍之宻自殺親黨乃以誣其婦婦不勝官司拷訊即自誣伏攄𥘉到疑其冤更加辨究具得情實時稱其明唐裴均鎮襄陽日里俗妻有外情乃託骨烝之疾云醫者湏得獵犬肉食之則愈謂其夫曰東隣有犬每來盗物君可屠之夫乃依其言獻肉於妻妻食之餘乃留於篋笥夫出命隣告之遂聞於公夫到官因述妻之所欲公曰斯乃妻有他姦躓夫於禍耳令劾之具得其情併以外情者俱付法其夫遂釋程顥詰翁丙吉驗子程察院知澤州晉城縣日冨民張氏子其父死未㡬有老父至門曰我汝父也來就汝居具陳其由張氏子驚疑相與詣縣請辨老父曰業醫逺出妻生子貧不能飬以與張氏某年月日某人抱去某人見之顥曰歲乆矣汝何說之詳也老父曰書於藥法册後某歸而知之使以其册進乃曰某年月日某人抱兒與張三翁顥問張氏子年㡬曰三十六又問爾父年㡬曰七十六謂老父曰是子之生其父纔年四十人已謂之張三翁乎老父驚駭服罪此聞之前􅒰漢宣帝時陳留有人年八十餘家冨而無子𥘉娵祗一女已適人再娵復生一子數年而翁死前妻女欲奪財物乃誣後母所生非其父之子郡縣不能决聞於䑓省丙吉為廷尉乃曰吾聞老人之子不耐寒且日中無影時八月中取同歲小兒均衣單衣而老人之子獨色變及立於日中亦無影前女遂受誣母之罪李崇還泰黄覇叱姒後魏李崇為揚州刺史縣民荀㤗者有子三歲失之後見在趙奉伯家各言已子並有隣證郡縣不能斷崇乃令二父與兒各禁數日忽遣獄吏報兒暴卒㳟聞之悲不自勝奉伯嗟嘆而已遂以兒還泰奉伯伏罪漢時頴川有冨室兄弟同居弟婦與長姒皆懐姙長姒胎傷弟婦生男輒奪以為已子爭訴三年郡守黄覇使人抱兒於庭令娣姒競取之長姒持之甚猛弟婦恐有所傷於手覇乃叱長姒曰汝貪家財欲得兒寧慮頓有所傷乎乃以兒還弟婦出風俗通歐陽左手惟濟右臂都官歐陽曄知端州有桂陽監民争舟毆死獄乆不决曄出囚飲食之皆還於獄獨留一人留者色動曄曰殺人者汝也囚不知所以然曄曰吾視食者皆以右手汝獨以左今死者傷右肋此汝殺之明也囚乃服見歐文忠所撰志錢惟濟知絳州有條桑者盗強奪之不得乃自斫其右臂誣以殺人官司莫能辨公乃引問面給以食而盗以左手舉匕因語之曰他人行刃則上重下輕今上輕下重正用左手傷右臂也誣者引伏見本傳沈括顙喉南公塞鼻沈内翰云世人以竹木牙骨之屬作呌子置喉中顙之能作人言予謂瘖者苦煩冤無以自明取呌子令顙之作聲如傀儡子粗能辨其一二冤或可伸尚書李南公為河北提刑時有班行犯罪下獄案之不服開口不食者百餘日獄吏不敢拷訊甚以為患南公曰吾能立使之食引出問曰吾以一物塞汝鼻汝能終不食乎其人懼即食蓋彼善服氣以物塞鼻則氣結而不通是以自服, WYG: ''}
