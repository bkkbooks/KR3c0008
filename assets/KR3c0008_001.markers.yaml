  - {type: variant, offset: 4682, length: 1958, content: 見本傳崔黯捜帑張輅行穴唐崔黯鎮湖南有惡少不為鄉里所容乃自髠鉗依佛教為傭隷假託焚脩幻誘聾俗積財萬計公𥘉到懼其事露乃投牒請脫鉗歸俗公問曰你教化三年所得㡬何曰旋得旋用不計其數公曰費用造設㡬何曰三千餘貫公曰給者既知納者不記决有隱欺乃捜其積蓄有妻孥滿室遂劾其矯妄之咎並以財物施之貧下石晉時魏州冠氏縣華村僧寺有一鐡佛可長丈餘中心且空一旦云佛能言士衆雲集施利填委縣申州府時髙祖鎮鄴莫測其事命衙将尚謙持香奉供且驗其事有三傳張輅請與偕行詰其妖狀乃率人圍寺盡遣僧赴道塲輅即潜開僧房見有穴道及入穴行至鐡佛坐下因於空身中厲聲歷數僧過使令擒魁首數人上聞就彼戮之因以輅為長河縣主簿杜鎬毁像次翁戮男杜鎬侍郎之兄仕江南為法官嘗有子毁父畫像為所親所訟者疑其法未能决鎬㓜輙曰僧道之毁天尊佛像可以比也兄甚竒之遂用此為斷黄覇字次翁漢宣時為相燕代之間有三男共娶一婦因生一子及欲分離各争其子遂訟於臺請覇斷之覇曰非同人類當以禽獸處之遂戮三男其子還母按荀子云有法者以法行無法者以類舉若夫黄覇戮三男王尊殺假子蓋舉其事之類耳法不禁禽獸聚麀然人殺禽獸無罪則戮之可也傅令鞭絲李惠撃鹽宋傅季珪為山隂令有賣糖賣針者争一絲團訴於縣乃令掛絲於柱鞭之有少鐵屑焉乃罰賣糖者後魏李惠仕為雍州刺史有負塩負薪者争一羊皮各言籍背之物惠謂州吏曰此皮可拷知主群下嘿然惠因令置皮於席上以杖擊之見少許塩屑使争者視之負薪者伏辜楊牧笞巫薛向執賈後魏李崇為楊州刺史有定州流人解思安背役亡歸其兄慶賔規絶名貫乃認城外死屍詐稱是弟為蘓顯甫李盖所殺有女巫陽氏託鬼附說思安𬒳害之苦李盖等不勝其楚各自欵服崇疑之乃遣二人偽從外来詣慶賔曰某住在北州有一人夜過寄宿云是流兵背役人觧思安欲送之官苦求見免且謂有兄慶賔見住楊州君脫矜閔為徃告報湏重相酬今但見質若徃不獲送官未晚慶賔悵然失色崇乃攝而問之即自引伏數日間思安亦為人縛至崇笞女巫一百遂釋盖等出北史本傳樞宻薛向𥘉為京兆户曹兼監商稅有賈胡過稅務出銀一篋書其上曰宻使遺涇原都監向曰此决偽也安有大臣餉人物而使賈胡致之執詣府治之果伏其詐吕大防所撰志程戡仇門仲游帥宇程戡宣徽知䖍州民有積為仇者一日諸子私謂其母曰母今老且病恐不得更夀請以母死報仇乃殺其母置于仇人之門而訴之仇不能自明戡疑之或謂無足疑戡曰殺人而自置於門非可疑耶乃親劾治具見本謀王珪所撰志畢仲游為河東提刑丞相韓縝出鎮太原其家奴胡童自陳有卒剽刼其衣服於黄堂之側公怒以付吏将黥配之仲游謂小童衣服尠薄而剽掠於大帥故相之宇下似非人情易吏案治其誣乃辨符融沐枕獄吏滌屨前秦苻融字愽林善斷獄董豊遊學三年而還宿妻家是夜妻爲人所殺妻兄疑豊殺之融引問曰汝𥘉無怪與卜問否豊曰夜夢乗馬入一水而北自北而南俯見両日在水中又馬左向濕筮者云憂獄逺二沐避二枕既至妻具沐夜授枕憶筮者言遂不從之妻乃自沐枕枕而寢融曰在易坎爲水爲北离爲馬爲南馬北渡從北而南從坎之离三爻同變离為中女坎為中男馬左向而濕水也左水右馬馮字兩日昌字其馮昌殺之乎遂捕昌詰之昌具服與其妻通期以新沐枕為驗悞中婦人江南大理寺鞫殺人獄未得其實獄吏憂畏乃焚香禱神因夣遇枯河上髙山寤而思曰河無水乃可字山而髙乃嵩字可嵩僧名也崇孝寺有僧名可嵩即白長官攝之訊問未有姦狀忽見屨上有墨汙因問其由云為墨所濺使脫視之乃墨塗也僧色動遂滌之即見血痕以此劾之僧乃服見吴淑校理祕閣閑談宗裔卷紬髙防校布王蜀時許宗裔典劔州有扵燈下識認暴客迨暁告吏捕之所收贓惟絲絇紬紈失主言是本物其賊不禁拷掠遂誣服因而送州宗裔引慮囚囚言其物乃是家有與失主互争即命取兩家繰絲車又問紬紈卷時各用何物為胎心一云杏核一云瓦子即開示之見杏核仍以絲絇安於車􅤧量其􅤧大小亦是囚家物𬒳刼主受妄認之過廵捕吏伏拷决之辜其枉獲雪周世宗時髙防知蔡州部民王義為賊所刼捕得五人繫獄窮治贓狀已具将加極刑防復取贓閱之召義問所失衫袴是一端布否曰然防令校其幅尺廣狹踈宻不同囚乃稱冤問何故服罪曰不任捶楚求速死耳居数日獲本賊而五人乃免防歸本朝終於左丞見本傳江分表裏章辨朱墨陵州仁夀縣有里胥洪氏利隣人田紿之曰我爲若稅免若役隣人喜剗其稅歸之名於公上踰二十年且偽爲劵以茶染𥿄類逺年者訟之于縣縣令江某郎中取𥿄積伸之曰若逺年𥿄裏當色白今表裏如一偽也訊之果伏江乃衢州開化人今失其名事見李泰伯主簿所撰志侍御章頻知彭州九隴縣時眉州大姓孫延世為偽契奪族人田乆不能辨運使委頻驗治頻曰劵墨浮朱上决先盗用印而後書之既引伏獄未上而其家人復訴於轉運使命知益州華陽縣黄夣松覆案亦無所異黄用此召為監察御史頻乃坐不即具獄降慶州監酒見本傳頻以景祐二年使虜而卒于道胡質集隣髙柔察色魏志胡質字文徳為常州太守東莞盧顯為人所殺求賊未得質曰此士無讐而有少妻所以死耳乃集隣居少年有李若者見質而色動遂窮詰之乃自首伏罪魏護軍營士竇禮出不還營以為沒身其妻盈氏詣廷尉訴髙柔曰爾夫不與人交財乎乃曰甞出錢與同營焦子文因追察之子文色動應對失節於是伏殺禮之罪, WYG: ''}
