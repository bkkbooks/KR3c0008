  - {type: variant, offset: 2386, length: 0, content: '', WYG: 觧張舉猪灰呉張舉為句章令有妻殺夫因放火燒舍乃詐稱火燒夫死夫之親疑之詣官告妻妻拒而不承舉遂取猪二口一殺一活積薪燒之殺者口中無灰活者口中有灰因驗夫口中無灰妻果伏罪王璩故紙寺丞王璩嘗為襄州中廬令有賊久訊不得情偶於賊囊中得故紙揭示之乃房陵商人道為賊所掠者賊遂服李公驗櫸尚書李南公知長沙縣日有鬬者甲强乙弱各有青赤痕南公以指揑之曰乙真甲偽訊之果然盖南方有櫸栁以葉塗肌則青赤如毆傷者剥其皮横置膚上以火熨之則如棒傷水洗不下但毆傷者血聚則硬偽者不硬耳王臻}
