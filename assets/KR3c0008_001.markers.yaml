  - {type: variant, offset: 6809, length: 3, content: 彦使并, WYG: 安背役亡歸其兄慶賔規絶名貫乃認城外死尸詐稱是弟為蘓顯甫李盖所殺有女巫楊氏托鬼附說思安被害之苦李盖等不勝其楚各自欵服崇疑之乃遣二人偽從外來詣慶賔寄弟口信慶賔悵然失色崇乃攝而問之即自引伏數日間思安亦為人縛至崇笞女巫一百遂釋盖等郎簡校劵侍郎郎簡知竇}
