  - {type: variant, offset: 3998, length: 0, content: '', WYG: 先盗用印而後書之既引伏獄未上而其家人復訴於轉運更命知華陽縣黄夢松覆案亦無所異章用是召為御史南公塞鼻尚書李南公為河北提刑時有班行犯罪下獄案之不服閉口不食者百餘日獄吏不敢拷訊南公曰我能立使之食引出問曰吾以一物塞汝鼻汝能終不食乎}
  - {type: variant, offset: 4000, length: 11, content: 乃越界訴於允濟允濟曰爾, WYG: 懼即食盖彼善服氣以物塞鼻則氣結不通是以}
