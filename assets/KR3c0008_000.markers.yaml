  - {type: variant, offset: 0, length: 267, content: 棠隂比事序疑獄有集舊矣理掾桂君萬榮今所撰次尤詳真治獄龜鑑也職牧守者所當究心毋徒曰此司狴犴者之責也昔于公自謂治獄有隂徳遽高其門我朝錢公若水問獄得情亦自其為郡府小官時桂君之為此其後詎可量耶亟命鋟木用廣其傳嘉定癸酉良月既望莆田劉隷書于金陵郡齋棠隂比事序開禧丁邜春僕以饒之餘干尉趨郡書滿紏曹孫公起予武林人也留欵竟曰話次因及臬事謂凡典獄之官實生民司命天心向背國祚脩短係焉比他職掌尤當謹重近者畨陽尉胥為人所殺昏暯莫知主名承捕之吏續執俞逹以告証佐皆具亦既承伏已且謀連三弓手結欵無一異詞某獨不能無疑躬造䑓府請緩其事重立賞榜廣布耳目俾緝正囚未幾果得龔立, WYG: ''}
