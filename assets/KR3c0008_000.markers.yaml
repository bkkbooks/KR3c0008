  - {type: variant, offset: 477, length: 0, content: '', WYG: 端明改元七月乙夘萬榮以尚右郎䝉恩陞對首奏守一心之正以謹治原次奏懲羣吏之貪以固邦本天威咫尺洊賜襃嘉既而玉音巽發謂朕嘗見卿所編}
  - {type: variant, offset: 481, length: 1, content: 目, WYG: 知卿聼訟决能審克萬榮即恭奏臣昨調建康司理右掾待次日久因編此以資見聞豈料天侈其逢誤闗乙覽容臣下殿恭謝既出黄門便有力求此本者鋟梓星江逺莫之致是用重刋流布庶可上廣聖主好生之徳下禆涖官哀矜之志十月既望朝散大夫新除直寳章閣知常徳府桂萬榮謹識欽定四庫全書棠隂比事宋桂萬榮撰明呉訥刪補漢武明經漢景帝時廷尉上囚防年繼母陳殺防年父防年因殺陳依律以殺母大逆論帝疑之武帝時年十二為太子在帝側遂問之對曰夫繼母如母明不及母縁父之故比之於母今繼母無狀手殺其父下手之日母恩絶矣宜與殺人同不宜以大逆論謹按大明律云凡繼母殺其父聽告不在干名犯義之限今觀漢史所云防年繼母殺父因殺繼母宜與殺人同不宜以大逆論竊詳此實倫理之變若比殺常人則故殺者斬若比父母為人殺而子孫擅殺行兇人者杖六十其即殺死者勿論盛世倫理修明固無此事萬一遇此所司當體究的確比擬奏請李傑買棺唐李傑為河南尹有寡婦告子不孝傑察其狀非不孝者乃謂曰汝寡居惟一子今罪至死得無悔乎婦曰不順之子寧復惜之傑曰審如是可買棺來取尸因使人覘之乃謂一道士曰事了矣俄將棺至傑尚兾其悔而寡婦堅執如初時道士在門外宻令擒之一問承服曰某與寡婦有私常為兒制故欲除之乃杖殺道士以棺盛之謹按大明律云父母誣告子孫勿論今觀所載母與所私道士謀誣告其子欲致於死母勿論道士難科教唆之罪萬一遇此當比依謀殺人巳行未曾傷人者杖一百徒三年比擬奏請戴爭異罸唐戴胄為大理少卿時長孫無忌被召不解佩刀入東上閣右僕射封德彞論監門校尉不覺察罪死無忌當贖胄曰校尉與無忌罪均臣子于君父不得稱誤御湯藥飲食舟船誤不如法皆死陛下}
