  - {type: variant, offset: 483, length: 8, content: 向相訪賊錢推求奴, WYG: 無忌功原之可也若罸無忌殺校尉不可謂刑帝曰法為天下公朕安得阿親戚詔復議德彞固執胄駁之曰校尉縁無忌以致罪法當從輕若皆過誤不當獨死由是無忌與校尉皆免死謹按大明律云若罪人自首告及遇赦原免或蒙特恩减罪收贖者亦准罪人原免减等贖罪法注云謂因人連累皆依罪人全免减等收贖今觀唐戴胄所爭長孫無忌事則我朝律文已備載之矣嗚呼至哉}
