  - {type: indent, offset: 8213, content: 　, id: KR3c0008_krp_002-bkkind378}
  - {type: variant, offset: 8213, length: 0, content: '', WYG: 黄榜許人格捕今若作鬭殺是本縣先自拒榜狀不得書我名銜吏皇恐謝罪易作拒捕結斷停户八人止得杖放歸日拜天曰願鄭公子孫益昌後公二子預薦登第云提舉辨明明慎如楊公可不儀式乎宋提舉楊某為越録事參軍其守治盗嚴凡保内捕賊不獲則被盗物責保長償之有一人家被盗持杖追擊仆地執送保長保長苦之乃即械繫觧官間盗死郡因治保長制死}
  - {type: page-break, offset: 8213, content: '', id: KR3c0008_WYG_000-47a, image: WYG0729/WYG0729-0992c.png}
  - {type: variant, offset: 8214, length: 1, content: 貴, WYG: 具後公閲狀云左肋下致命一痕長寸二分中有白路必背後追擊是其死非因保長制縛也獄吏爭案已成公不聽即追詰原捕賊者果得其}
  - {type: variant, offset: 8216, length: 7, content: 斷疑則從輕漢時, WYG: 索致杖首}
  - {type: variant, offset: 8224, length: 4, content: 驚文帝馬, WYG: 裂證益明迺引法止坐保長杖罪免死陳睦酷報睦事未可謂無録之為酷吏儆宋陳睦嘗提㸃兩浙刑獄㑹杭民有妾沉香}
  - {type: variant, offset: 8229, length: 2, content: 張釋, WYG: 浣衣井旁嫡子墮井死妻訟於州以為必沉香擠}
