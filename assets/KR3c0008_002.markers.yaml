  front:
  - {type: 'kr:newline', offset: 0, content: '

      ', id: KR3c0008_krp_002-bkkkrnewl1}
  - {type: line-break, offset: 0, content: '', id: KR3c0008_SBCK_002-1a01}
  - {type: variant, offset: 0, length: 1619, content: 棠隂比事卷下宋桂萬榮編次公綽破柩元膺擒轝栁氏叙訓云栁公綽為襄陽節度使歲儉隣境尤甚有齊衰者哭且獻狀曰遷三世十二喪于武昌為津吏所遏公綽即命軍候擒其人破其柩皆實以稻米蓋葬於歉歲不應併舉三世十二䘮故知其詐耳唐吕元膺字景夫鎮岳陽日因出游賞見有䘮轝駐道左男子五人衰服而隨公曰逺葬則汰近葬則省此决姦黨為詐也因令左右搜索之棺中皆兵刃乃曰欲謀過江掠貨假喪使渡我者不疑耳公令劾之更有同黨數十已期集於彼岸併擒以付法栁冤瘖奴王扣狂嫗栁渾為江西觀察使判官僧有夜飲火其廬者歸罪瘖奴軍侯受財不詰獄具渾與其僚崔祐甫白奴冤於觀察使魏少游趣訊其僧僧乃首伏見本傳大卿王罕知潭州時有狂嫗數邀知州訴事言無倫理從騎多屏逐之罕乃令引歸聽事叩堦徐問嫗雖言語雜亂然時有可采者乃其始為人嫡妻無子其妾有子夫死為妾所逐累訴不直因恚而狂罕為直其事盡以家貲與之見涑水記聞李公驗櫸王臻辨葛尚書李南公知長沙縣日有闘者甲強乙弱各有青赤痕南公以指揑之曰乙真而甲偽訊之果然蓋南方有櫸柳以葉塗肌則青赤如毆傷者剥其皮横置膚上以火熨之則如棓傷水洗不下但毆傷者血聚則硬而偽者不然耳聞之士林王諌議知福州時閩人欲報仇或先食野葛而後闘即死其家遂誣告之臻問所傷果致命耶吏曰傷無甚也臻以為疑反訊告者乃得其實頴知子盗孫料兄殺郎中歐陽頴知歙州冨家有盗啓其藏捕乆不獲頴曰勿捕獨召冨家二子械付獄劾之即伏吏民𥘉疑不勝楚掠而自誣及取其所盗物乃信孫長卿知和州民有訴弟為人所殺察其言不情乃問汝户㡬等曰上等汝家幾人曰惟一弟與妻子耳長卿曰殺弟者兄也豈将併有其資乎訊之果然見王珪所撰志鄭躬明誤希亮救亡後漢鄭躬以郡吏辟公府時有兄弟共殺人者而罪未有所歸明帝以兄不訓弟故報兄重而减弟死中常侍孫章宣詔誤言兩報重尚書奏章矯制罪當腰斬帝以躬明法律召入問之躬對章應罰金帝曰章矯詔殺人何謂罸金躬曰法令有故誤章傳命之謬於事為誤誤者其文則輕帝曰囚與章同縣疑其故也躬曰周道如砥其直如矢君子不逆詐帝王法天刑不可委曲生意帝稱善遷躬廷尉正出躬本傳鄭克評曰按深文峻法務為苛刻者皆委曲生意而然也君子不逆詐蓋惡其末流决至於此爾傳稱躬之典理官也决獄斷刑依於矜恕故世傳法律而子孫至公者一人廷尉七人侯者三人二千石侍中郎將者三十餘人侍御史正監平者甚衆積善之慶不其盛歟陳希亮大卿為開封府司録時有青州男子趙宇上言元昊决反坐責為文學參軍福州安置明年果反宇自訟而所部不受亡至京師執政令劾以在官無故去法希亮奏乞以宇所上封事付有司即其言驗不當加責由是得釋見本傳商原詐服竇阻免䘮晉商仲堪為荆州牧有桂陽人黄欽生二親乆沒詐服縗麻言迎父喪府曹依律棄市商曰原此㫖當以二親生存而横言死沒情事悖逆所不忍言固當棄市今欽生父母終沒此特誕妄之過遂免死唐竇參𥘉為奉先尉男子曹芬兄弟隷北軍醉暴其妹父救不止恚赴井死參當兄弟重辟衆請俟免䘮參曰父由子死若以䘮延是殺父不坐皆搒殺之出唐書本傳鄭克評曰按唐制縣令許决死罪參為尉時殆攝行令事歟北軍之衆屯於奉先請爲其父持䘮以綬其刑蓋欲賂中官以倖免耳參駮正其說而亟决之乃爲此也薛絹互争符盗並走漢時有人持縑入市遇雨以縑披覆後一人至求庇廕因與一頭雨霽當别輒互争縑太守薛宣令斷縑各與一半使騎吏追聴之一云貢君之恩宣字貢月一稱冤不已宣知其狀追問乃伏出風俗通冀州有老母遇刼唱盗行人爲母逐擒之盗反誣行人争至郡符融曰二人並走先出鳯陽門者非盗既還符正色謂後至者曰汝真盗也其意以為盗若善走决不為行人所獲以此測之則知善走者是捕逐之人蕭儼震牛懐武用狗南唐昇元格盗及三緡者死吉之豪民暴衣失衾直數十千指隣為盗不勝楚掠隣自誣服詰其贓物即云散鬻於市無從追究赴法之日冤聲動人長史以聞先主命員外郎蕭儼覆之儼齋戒禱神佇雪冤枉到郡之日晴天忽雨雷撃失主一牛洎剖腹而得所失物蓋噉而猶未消潰出鄭文寳南唐近事王蜀時有蕭懐武者主㝷事團乃軍廵之職也所管百餘人毎人各飬私名十餘軰呼之曰狗深坊曲巷馬醫酒保乞丐傭作販賣童兒皆有其徒民間偶語公私動静即時聞逹於是人心恐懼自疑肘腋悉其狗也懐武殺人不可勝數郭崇韜入蜀乃族誅之是使察姦慝而反為姦慝者也見成都古今記, WYG: ''}
