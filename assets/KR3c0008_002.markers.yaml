  - {type: line-break, offset: 4095, content: '', id: KR3c0008_SBCK_002-16a02}
  - {type: variant, offset: 4107, length: 620, content: 前後空交分兩文書其實無金群衆以某孤立不狎流􅒰欲乗此擠之因流涕公乃以兠子召諸關連僧咸使面壁不得相向以泥各令模金之狀僧既不知形狀各模不同公怒即劾前數軰誣證之罪梁適重詛袁彖惡滛丞相梁適為審刑院詳議官時梓州妖人白彦歡能依鬼神作法詛呪人有死者獄上請讞皆以不見傷為疑適曰殺人以刃尚或可拒今以詛呪其能免乎卒以重辟論見王珪所撰志鄭克評曰按能依鬼神作法詛呪是造蓄蠱毒厭魅之類也鞫得其實疑不見傷此盖不知無法者當以類舉之義耳欲决大獄湏傳古義彼俗吏者豈足語此南齊袁彖為廬陵王諮議參軍王鎮荆州時南郡江陵縣茍将之之弟胡之其妻為曽口寺僧所淫夜入茍家将之殺之為官司所檢将之列家門穢行欲告則耻忍則不可實已所殺胡之所列又如此兄弟争死江陵令啓刺史博議彖曰将之胡之原心非暴辨讞之日義哀行路昔文舉引謗獲漏䟽網二子心迹同符古人䧟以深刑實傷為善於是免死出南史袁湛傳彖其族孫也曹駮坐妻孔議詈母沈存中内翰云夀州有人殺妻之父母兄弟數口州司以為不道縁坐妻子刑曹駮曰毆妻之父母即是義絶况於謀殺不當復坐其妻宋孔深之為尚書比部郎時安陸應城縣張江陵與妻呉共罵母黄令死黄忿恨自縊已值赦律子殺傷毆父母遇赦猶梟首罵詈棄市會赦免刑𥙷治無罵詈致死之科深之議曰夫題里逆心仁者不入名且惡之况乃人事故殺傷呪詛法所不容罵之致盡理無可宥江陵雖遇赦恩固合梟首婦本以義愛非天屬黄之所恨意不在呉原死𥙷治有允正法詔如深之議呉可棄市岀南史孔靖傳鄭克評曰罵之致死重於毆傷不以赦原於理為信妻若從坐猶或可赦吴實共罵棄市亦冝詔所以𥙷議之缺也, WYG: ''}
