  - {type: variant, offset: 8188, length: 0, content: '', WYG: 自率同列詣鐘闕隂塗以墨}
  - {type: variant, offset: 8189, length: 2, content: 鄢陵, WYG: 以帷蔽之命羣盗往捫少焉呼出獨一人手無所汚扣之乃為盗者劉敞察寃辨析於似是之問非至明其孰能之劉敞知揚州天長}
  - {type: variant, offset: 8192, length: 0, content: '', WYG: 鞫王甲殺人既具獄敞見而察其寃甲畏}
  - {type: variant, offset: 8193, length: 0, content: '', WYG: 不敢自直敞以委尸曹杜誘誘不能平反而傅致益牢將論囚敞曰寃也親按問之甲知敞為己直乃敢告盖殺人者富人}
  - {type: variant, offset: 8194, length: 3, content: 滿射鳥, WYG: 氏也相傳以為神明吕陶服罪天理之在人心固未嘗泯也然吕公必能心誠論之自是感發也吕陶調銅梁令民龎氏姊妹三人冒隠幼弟田弟壯訴官不得直貧至傭奴於人及是又訴陶一問三人服罪弟泣拜願以田半作佛事以報陶曉之曰三姊皆汝同氣方汝幼時適為汝主之爾不然亦為他人所欺與其捐半供佛曷若遺姊復為兄弟顧不美乎弟又拜而聽命濂溪悟酷此事已載各史夫人皆知之今贅録誠慕其胸次之正未易及也周濓溪為分寧主簿有獄久不决濓溪至一訊立辨邑人驚曰老吏不如也部使者薦之調南安軍司理參軍有囚法不當死轉運使王逵欲湥治之逵酷悍吏也衆莫與爭濓溪獨與之辨不聽乃委手版歸將棄官去曰如此尚可仕乎殺人以媚人吾不為也逵悟囚得免張洽服盗此等事固所願學也而不可及誠以動物張公亦庶幾乎張洽嘉定元年改袁州司理參軍有大囚訊之則服㝷復變異且力能動摇官吏累年不决而逮繫者甚衆洽以白提㸃刑獄殺之有盗黠甚詞不能折㑹獄有兄弟爭財者洽諭之曰訟於官祗為胥吏之地且冐法以求勝孰與各守分以全手足之愛乎詞氣懇切訟者感悟盗聞之自伏罪哈雅釋孝此亦恒有之如此試騐亦易然其事可為人子勸也元布嚕哈雅太宗時拜燕南諸路廉訪使未幾授斷事官使職如故有民}
