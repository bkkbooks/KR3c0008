  - {type: variant, offset: 8187, length: 0, content: '', WYG: 錢與同營士焦子文久求不得時子文適坐事繫獄柔乃見子文問所坐言次曰汝曾舉人錢否子文曰單貧初不敢舉人物也柔察子文色動遂曰汝適舉竇禮錢何言不舉邪子文怪事露應對不及柔曰汝已殺禮宜早服子文於是叩頭具道本末柔遣吏卒承子文詞掘得尸詔書復盈母子為平民抵子文罪崔公仁恕必養得此等志量然後可决大獄臨大事唐崔仁師貞觀初遷殿中侍御史時青州有男子謀逆有司捕支黨纍係填獄詔仁師覆按始至悉去囚械為具食飲以情訊之坐止魁惡十餘人他悉原縱大理少卿孫伏伽謂曰原雪者衆誰肯讓死就决而事變奈何仁師曰治獄主仁恕豈有知枉不申為身謀哉吾以一介易十囚命固願也及勅使覆訊諸囚咸叩頭曰崔公仁恕無枉者舉無異詞由是知名李嶠列枉此等胸襟亦不可不預養李嶠髙宗時為給事中㑹來俊臣搆狄仁傑李嗣真裴宣禮等獄將抵死勅嶠與大理少卿張德裕侍御史劉憲覆驗德裕等内知其寃不敢異嶠曰知其枉不申是為見義不為者卒列其枉狀唐臨不寃如此治獄固季路之儔也真可為法唐臨高宗時按獄交州出寃繫三千人遷大理卿帝嘗録囚臨占對無不盡帝喜曰國之要在用法刻則人殘寛則失有罪惟是折中以稱朕意他日復訊餘司斷者輒紛訴不服獨臨所訊無一言帝問故答曰唐卿斷囚不寃所以絶意帝嘆曰為獄者固當若是乃自述其考曰形如死灰心若鐡石云真卿感雨雨否固在天然由此觀之其辨獄必能平允固冝師其辨不必其雨顔真卿𤣥宗時再遷監察御史使河隴時五原有寃獄久不决天且旱真卿辨獄而雨郡人呼御史雨崔碣霽潦霽􅕙之事與雨相似崔公之明自是當傳也崔碣為河南尹邑有大賈王可久轉貨江湖間值龎勛亂盡亡其貲不得歸妻詣卜者楊乾夫咨存亡乾夫悦其色且利其富既占陽驚曰乃夫殆不還矣隂以百金謝媒者誘聘之妻乃嫁乾夫遂為富人及徐州平可久困甚丐衣食歸閭里往見妻乾夫大怒訽逐之妻詣吏自言乾夫厚納賄可久反得罪再訴復坐誣可久恨歎失明碣至可久陳寃碣得其情即勅吏掩乾夫并前獄吏悉發賕奸殺之以妻還可久時淫潦獄决而霽陳襄捫鐘此事亦人所共傳雖未可為常然仿此推類用心亦詰奸之一助也陳襄調浦城主簿攝令事民有失物者賊曹捕偷兒至襄語曰某廟鐘能辨盗犯者捫之輒有聲餘則否乃遣吏先引以}
