  - {type: variant, offset: 4861, length: 1593, content: 唐杜亞字次公鎮維陽日有富室父亡未乆奉繼母不以道因元日上母夀母復子觴子疑酒有毒覆之於地地墳乃謂其母以酖殺人母曰天鍳在上何當厚誣撫膺不伏既訴於府公問曰酒從何来曰長婦執爵而致也公曰爾婦執爵毒因婦起豈可誣母乃分所鞫之盖子與婦同謀害母皆伏法傳隆議絶漢武明繼宋文帝時剡縣人黄𥘉妻趙打息載妻王死後遇赦王有父母及息男稱依法徙趙二千里司徒左長史傅隆議曰父子至親分形同氣稱之於載即載之於趙雖云三代合之一體稱雖創鉅痛深固無讐祖之理故古人不以父命辭王父命若云稱可殺趙當何以處載父子祖孫互相殘戮恐非先王明罰臯陶立法之旨也舊令云殺人父母徙二千里外不施父子祖孫趙當避王期功千里外耳然令云凡流徙者同籍近親欲相隨聴之趙既流移載為人子何得不從載行而稱不行豈名敎所許趙雖内愧終身稱亦沉痛没齒祖孫之義永不得絶事理固然出南史傅亮傳漢景帝時廷尉上囚防年繼母陳殺防年父防年因殺陳依律殺母以大逆論帝疑之武帝時年十二爲太子在帝側遂問之對曰夫繼母如母明不及母縁父之故比之於母今繼母無狀手殺其父下手之日母恩絶矣冝與殺人同不冝以大逆論見通典不著本處戴争異罰徐詰縁例唐戴胄爲大理少卿時長孫無忌𬒳召不解佩刀入東上閣尚書右僕射封徳彛論監門校尉不察罪死當無忌贖胄曰校尉與無忌罪均臣子於君父不得稱誤法著御湯藥飲食舟船誤不如法皆死陛下録無忌功原之可也若罰無忌殺校尉不可謂刑帝曰法為天下公朕安得阿親戚詔復議徳彛固執帝将可胄駮之曰校尉縁無忌以致罪法當從輕若皆過誤不當獨死由是無忌與校尉皆免出本傳唐徐有功為司刑丞時有韓純孝者受徐敬業偽官前已物故推事使顧仲琰奏稱家口合縁坐詔依斷籍沒有功議曰律謀反者斬身亡即無斬法若情狀難捨或敕遣戮屍餘非此塗理絶言象縁坐元因處斬無斬豈合相縁既所縁之人亡則所因之罪减减止徒坐頻會赦恩今乃却斷入官未知據何條例詔依有功議斷放由是免籍沒者數百家刑曹駮射左丞免讁沈存中内翰云邢州有盗賊一家其夫婦即時死有一子明日乃死州司以其家財産依户絶法給出嫁親女刑曹駮曰某家父母死時其子尚在財産乃子物出嫁女即姊妹不合有分宋文帝時制刼盗同籍朞親𥙷兵餘杭人薄道舉為刼從弟代公道生並大功親或以代公等母存為朞親而謂子冝從母𥙷兵尚書左丞何承天議曰婦人有三從夫死從子今道舉為刼叔父已殁代公道生並是從弟不合𥙷讁乃以叔母為朞親而令二子隨母既乖大功不讁之制又失婦人三從之道論其母子並冝見原出南史本傳從事凾首乖崖察額近代有因行商回見其妻為人所殺而失其首妻族執其壻誣以殺女吏嚴訊之乃自誣伏案具郡守委諸從事從事疑之請緩其獄乃令封内仵作行人徧供近與人家安厝墓家多少去處一一面詰之有一人曰某近於豪家舉事只言死却妳子五更時於墻頭舁過凶噐輕似無物見瘞某處及發之但獲一女人首即將對屍令其夫驗認云非妻也繼收豪家鞫之乃是殺一妳子函首葬之以屍易此良家婦私蓄之豪民棄市出玉堂閑話張尚書知江寧有僧陳牒出憑公據案熟視乆之判司理院勘殺人賊郡僚不曉其故公乃召僧問披剃㡬年對曰七年又曰何故額有巾痕即首伏乃一民與僧同行道中殺之以其祠部自剃為僧李畋所撰忠定語録無名破冡行成叱驢唐天后賜太平公主鈿噐金寳歲餘失之后聞之怒督洛州長史而下捕盗甚急吏卒游徼計無所出道逄湖州别駕蘓無名相與請至縣白尉曰得盗矣尉問之無名曰吾湖州别駕也尉問吏卒何得誣辱無名曰君無恠也吾歴官所在擒姦擿伏有名此軰聞之故見誣為解圍耳遂請見長史使聞於朝期以旬餘獲之天后許之無名戒吏卒於東北門伺察有胡人十餘􅒰来哀絰出赴北邙即踵以報果見諸胡至一新冡設奠哭而不哀既徹奠又相視冡旁而笑無名乃使擒之而發其冡剖棺視之寳噐在焉天后問故因對曰臣到都日正見此胡出葬便知是盗但未知葬處今清明拜掃計須出城遂蹤跡得之哭而不哀者所葬非人也廵冢而笑者受物無傷也天后稱善遷秩二等唐懷州河内縣董行成能察賊有一人從河陽長店盗行人驢一頭并裳袋天欲暁至懐州行成於街中見之叱曰彼賊住賊即承伏人問何以知之行成曰此驢行急而汗非長行人也見人則引驢逺過怯也以此知之收下獄有頃失主㝷蹤而至皆如其言王曽驗稅, WYG: ''}
