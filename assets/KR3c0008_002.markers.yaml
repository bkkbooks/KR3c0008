  - {type: variant, offset: 8198, length: 3, content: 中鎮帥, WYG: 毆人死吏論以重法其子號泣請代死布嚕哈雅戒吏使擒於市懼則殺之既而不懼乃曰誤毆人死情有可宥子而能孝義無可誅遂并釋之使出銀以資葬埋且呼死者家諭之其人悦從德輝察寃此事亦世所有頋主刑者用心何如耳李德輝世祖時為右三部尚書録囚山西河東懐仁民有魏氏發得木偶持告其妻挾左道為厭勝謀不利於已移數獄詞皆具德輝察其寃知其有愛妾疑妾所為將搆陷其妻也召妾鞫之不移時而服遂杖其夫而論妾以死田滋得稿此事}
  - {type: page-break, offset: 8198, content: '', id: KR3c0008_WYG_000-44b, image: WYG0729/WYG0729-0991b.png}
  - {type: page-break, offset: 8198, content: '', id: KR3c0008_WYG_000-45a, image: WYG0729/WYG0729-0991c.png}
  - {type: variant, offset: 8203, length: 0, content: '', WYG: 可為常法然可見田公之用心也主刑者恒存此心庶幾公平也夫田滋為浙西廉訪使有縣尹張或者被誣以贓獄成滋審之但俯首泣而不語滋以為疑明日齋沐詣城隍祠禱曰張或坐事有寃伏願神明其誣守廟道士進曰曩有王成等五人同持誓狀到祠焚禱火未盡而去之燼中得其遺稿今藏於壁間豈其人耶視之果然明日詣憲司詰成等不服因出所得火中誓狀示之皆驚伏罪張或得釋澤民訊僧此非用心切至者不能有官君子庸可少忽乎汪澤民同知岳州事州民李氏以貲雄其弟死妻誓不他適兄利其財嗾族人誣婦以奸事獄成而澤民至察知其枉為直之及為平江府推官有僧淨廣與他僧有憾久絶往來一日邀廣飲廣弟子急欲得師財且苦其捶楚潛往他僧所殺之明日訴官他僧不勝拷掠乃誣服三經審録詞無異結案待决澤民取行兇刀視之刀上有鐡工姓名召工問之乃其弟子刀也一訊吐實即械之而出他僧罪清獻原情理法只在目前趙公能發明之趙清獻公抃景祐中為武安推官有偽造印者吏以為當死公獨曰造在赦前用在赦後赦前不用赦後不造法皆不死遂以疑讞之卒免死承議持平鄭公此事似若易及然非秉心之公不能紹興間鄭承議為蕭山丞有朱統制在縣牧馬侵西興鹽塲草鹽司申請於朝降榜許人格捕其卒打草如故為鹽停尸殺}
