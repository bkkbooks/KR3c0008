  - {type: variant, offset: 2062, length: 1316, content: 見天聖名臣傳宋元嘉二十二年孔熈先與徐湛之許耀謝綜范曄謀立彭城王義康湛之上表告狀詔收綜等並欵服唯曄不首頻詔窮治乃言熈先茍誣引臣文帝令以曄所造及改定符檄墨迹示之乃服罪出南史范泰傳陳議捍取胡争竊食陳奉古主客通判具州時有卒執盗者其母欲前取盗卒拒不與仆之地明日死以卒屬吏論為棄市奉古議曰主盗有亡失法今人取之法當得捍捍而死乃以闘論是守者不得主盗也殘一不辜而為剽奪生事法非是因以聞報至杖卒人稱服之胡向少卿𥘉為袁州司理有人竊食而主者撃殺之郡論以死向争之曰法當杖郡将不聴至請于朝乃如向議見吕大防撰志鄭克評曰以名分言之則𬒳擊者竊食之盗也擊之者典食之主也以情理言之則與常人相毆異矣登時擊殺罪不至死可也然湏撃者本無殺意邂逅致死乃坐杖罪或用刃或絶時或殘毁則是意在於殺法所不許也又當原其情理豈可一㮣科斷盡心君子亦冝察焉御史失状國淵求牋唐李靖為岐州刺史或告其謀反者髙祖命一御史徃案之御史知誣罔請與告事者偕行行數驛佯云失告狀驚懼異常乃祈告事者别䟽一狀驗之乃與元狀不同即還以聞髙祖大驚告事者反伏誅失御史名魏國淵字子尼為魏郡太守有投書誹謗者太祖疾之欲知其主淵請留其書而不宣露其書多引二京賦淵乃勅功曹曰此郡少學問者欲令就師求能者與受業因令作牋比方其書有似謗誹者取問伏罪偉冐范祚䖍傚鄧賢劉敞侍讀知永興軍時大姓范偉冐武功令祚為祖乃穿祚墓以已祖母袝之一規避徭役者五十年數犯法至徒流輒以贖免長安人甚患苦之然吏莫敢誰何敞按其事獄未具而召由是辭屢變證逮數百人獄連年不决詔取付御史臺驗治卒如敞所發見本傳沈括筆談云江南人好訟有一書名鄧思賢皆訟牒法也其始則教以侮文侮文不可得則欺誣以取之欺誣不可得則求其罪以刼之鄧思賢人名也始傳此術遂名其書凡村校中徃徃以此授生徒韓琚司封通判䖍州日民有偽作冤狀悲憤呌呼似若可信者琚偶攝郡究其風俗考其枉直其下莫之能欺辭伏者皆自以為不冤琚乃魏公琦之兄也終於兩浙轉運使尹洙所撰墓志次武各驅憲之俱解周于仲文字次武為趙王屬安固太守有任杜兩家各失牛後得一牛兩家争之州郡不能决益州長史韓伯携曰于安固少年聴察可令决之仲文乃令両家各驅牛群到及放所得一牛遂入任氏群又使人㣲傷之任氏嗟惋杜氏自若杜即伏罪南梁顧憲之為建康令有失牛者盗與主俱認之不能制令乃令解牛任其所之牛歸本主所居盗者始伏其罪出南史顧愷之傳憲之其孫也張昪窺井蔡髙宿海張丞相知潤州有婦人夫出數日不歸忽聞菜園井中有死人即徃哭之曰吾夫也以聞於官昪命属吏集隣里就驗是其夫否皆言井深不可辨昪曰衆不能辨而婦人獨知其為夫何耶收付所司訊問乃姦人殺之而婦人與聞其謀也沈氏筆談蔡髙為福州長溪縣尉有媪二子漁于海而亡媪指某氏為仇告縣捕賊吏難之曰海有風波安知果為仇所殺若不得屍於法不可理髙乃隂察仇家得其迹與媪約曰期十日不得屍則為媪受捕賊之責凡宿海上十日潮浮二屍到驗之皆殺也乃捕仇家鞫之而服法髙乃襄之弟事見歐公所撰志劉湜焚屍髙防劾病劉待制𥘉知耀州冨平縣有盗掠人子女者既擒獲輒詐死伺間即逸去再捕得復然湜令焚之見本傳鄭克評曰埋而使人守之足矣雖不焚可也防𥘉事周為刑部郎中宿州有民剚刃其妻而妻族受賂奪州言病風狂不語並不孝掠以具獄上請大理斷令决杖防覆之云某人病風不語醫工未有驗狀憑何取證便坐杖刑况禁繫旬月豈不呼索飲食再劾其事湏見太情周相然之終寘於法王鍔匿名, WYG: ''}
