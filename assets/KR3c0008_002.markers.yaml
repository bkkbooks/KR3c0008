  - {type: variant, offset: 8426, length: 5, content: 出魏志本傳, WYG: 觀此聽訟者可以躁心乗之哉梅妻逆夫有王梅者好酒其妻不潔圖去梅以快所私梅與族叔鍇素仇相絶歲鄉人社㑹梅家醉散入夜梅忽死於碎甕間鍇乍聞惻隠往視亟還妻懼鍇或訐發謀所私者誣鍇挾仇乗梅醉跌未死往殺之有司逮至訊鞫凡刑加梅妻輙毁加鍇乃無毁焉疑其妻寃益拷鍇不勝遂誣服㝷上官讞改鍇戍邉遇雷雨必焚香籲天後梅妻頸生惡瘡三呻吟苦楚以死所私者亦别麗重典盖妻故碎甕擠梅於上刃其頸三擬詭稱醉跌觸甕死適鍇往視以其仇誣之則易信且㓕所忌也刑具則所私賂吏卒夾棍等鐡異新故索異麻草堅韌朽脆相懸絶用惑有司云夫情偽㣲曖其變千狀奸惡不足異也明慎可少忽耶若夫天人之際亦嚴矣}
