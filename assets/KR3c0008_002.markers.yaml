  - {type: variant, offset: 8171, length: 1, content: 承, WYG: 崔黯搜帑唐崔黯鎮湖南有惡少不為鄉里所容乃自髠鉗依佛敎假托焚修幻誘愚俗積財萬計公初到懼事露乃投牒請脫鉗歸俗公問曰爾教化三年所得㡬何曰旋得旋用公曰費用造設幾何曰三千餘貫公曰給者既知納者不記决有隠欺乃搜其積蓄有妻孥滿室遂劾其矯妄之罪以財物施之貧下楊津獲絹周楊津為岐州刺史有武功人齎絹三百匹去城十里為賊所刼時有使者馳騎而至被刼人告之使者到州以狀白之乃下敎曰有人着某色衣乗某色馬在城東十里被殺若有家人可速來告有一老母行哭而至云是己子於是收捕并絹俱獲袁滋鑄金唐李汧公鎮鳳翔屬邑有編氓耕田得馬蹄金一甕送於縣將送於州邑宰恐公藏失守貯於私庫信宿視之乃土塊也以狀聞於府議者僉疑換之遂遣掾案其事宰莫能明即以易金誣服窮其所藏或云糞土或云水中汧公甚怒而公宴語其事時袁相國滋在幕中獨俯首無語汧公詰之滋曰某甚疑此事有枉汧公乃俾移其獄於郡命袁治之袁令閲甕間得土二百五十餘塊遂於列肆索金鎔成土塊狀始及其半已有三百斤詢其初乃二農夫以巨竹舁之計其數非二人以竹可舁度在路已化為土矣羣情太豁邑宰獲伸孫寳秤饊漢孫寳為京兆尹有賣鐶饊者今之鐶餅也於都市與一村民相逢擊落皆碎村民陪認五十枚賣者堅稱三百枚爭至無以證明公命别買一枚秤之乃都稱碎者紐折分兩賣者乃服韋臯劾財唐韋臯鎮劒南日有逆旅停止大賈因病而酖之隠沒其財公知之又有北客蘓延得病而卒公使驗其簿籍已被店主易置公乃㝷究經過宻勘於里屬詞多不同遂劾同店者店主乃認隠欺數千貫與吏二十餘人分之悉皆得罪由是劒南無横死之客元膺擒轝唐吕元膺鎮岳陽因出㳺見有喪轝駐道左男子五人衰服而隨公曰逺葬則侈近葬則省此决奸計也因令捜索之棺中皆兵刃曰欲謀過江掠貨假喪使渡者不疑耳公令劾之更有同黨數十已期集彼岸併擒付法劉相鄰證丞相劉沆知衡州日有大姓尹氏欲買鄰人田莫能得鄰人老而子幼乃偽為劵及鄰人死即逐其子訟二十年不得直沆至又訴尹氏出積歲户鈔為證沆曰若田百頃户鈔豈特收此乎始為劵時嘗問鄰乎其人多在可取為證尹不能對遂伏罪韓參乳醫參政韓億知揚州時土豪李甲者兄死迫嫁其嫂因誣其子為異姓以專其貲嫂歴訴於官甲輒賂吏使掠服之億視舊牘未曾引乳醫為證一日盡召其黨以乳醫視之衆乃無詞其寃遂白桞寃瘖奴唐桞渾為江西察判時僧有夜飲火其廬者歸罪瘖奴軍候受財不詰獄具渾與其僚崔祐甫白奴寃於觀察使魏少㳺促訊其僧僧乃首伏王扣狂嫗大理王罕知鄆州時有狂嫗數邀訴事言無倫理從騎屏逐之罕令引歸㕔事叩堦徐問嫗雖言語雜亂然時有可采者乃是人之嫡妻無子其妾有子夫死為妾所逐累訴不直因恚而狂罕為直其事盡以家貲與之䖍俲思賢沈括筆談云江南人好訟有一書名鄧思賢者作偽詞狀法也始教以侮文侮文不可得則欺誣以取之欺誣不可得則求其罪以劾之鄧思賢人名也始傳此術遂名其書村校中往往授生徒韓琚通判䖍州民有偽作寃狀悲憤叫呼似若可信琚攝郡究其風俗考其枉直莫之能欺民皆以為不寃琚魏公之兄終於轉運使按虔州今之贑州府也括熙寧中任知制誥去今四百年矣世道日漓刁民偽為寃狀以陷人者在在有焉貧弱有寃無處訴告者亦無地無焉受人財為人揑造寃苦詞情若鄧思賢者亦有之焉易訟卦彖曰利見大人言訟者求辨曲直利見剛明中正之大人以决其所訟也康誥曰如保赤子言赤子未能言為父母者誠心求之則能得其心之所欲矣今之任民牧者民呼為父母居顯要者人呼為大人其可不思盡其心稱其名以上無負聖}
