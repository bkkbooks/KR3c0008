  - {type: variant, offset: 8232, length: 1, content: 劾, WYG: 三易獄不合睦怒逐掾殺沉香東坡詩殺人無驗終不快此恨終身恐難了盖有激云睦還京久之無所授禱於廟無應後恍聞人云如沉香何睦震汗廢食累日而卒安禮神明王公固明敏然非用心何}
  - {type: variant, offset: 8234, length: 104, content: 犯蹕罪止罰金明其無心於驚馬也故不以乗輿之重加以異罰今滿意在射鳥非有心於中人律過誤傷人三歲刑况不傷乎罸之可也舊出南史本傳魏髙柔爲廷尉時獄法甚峻冝陽典農劉龜竊於禁内射兎其功曹張京詣校事言之帝匿京名收龜付獄柔表請告, WYG: 能此王安禮知開封邏}
