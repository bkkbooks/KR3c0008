  - {type: variant, offset: 8177, length: 8, content: 訊獵宋劉毅鎮姑熟, WYG: 䕶軍營士竇禮近出不還營以為亡表言沒其妻盈及男女為官奴婢盈稱寃自訟乃詣廷尉柔問曰汝何以知夫不亡盈泣曰夫少單特養一老嫗為母又哀兒女撫字不離非是輕狡不顧室家者柔重問曰汝夫無仇乎對曰夫良善與人無仇又曰汝夫不與人交財乎對曰}
