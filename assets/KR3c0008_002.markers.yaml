  - {type: variant, offset: 8416, length: 0, content: '', WYG: 人不軌書上命治之驗所指略問後加二人有薛姓}
  - {type: variant, offset: 8417, length: 0, content: '', WYG: 安禮曰得之矣召薛曰若仇乎曰有售筆者固拒之怏怏而去乃即命捕訊果得所為梟其首人稱為神文原雨旱鄧公蓋明達者邪辨析之精可為法也鄧文原僉浙西廉訪司事呉興民夜歸巡邏者執之繫亭下其人遁去有追及之者刺其脇仆地明旦家人得之以歸比死其兄問殺汝者何人曰白袍青衣長身者也其兄訴於官有司問直初更者曰張福兒執之使服焉械繫三年文原録之曰福兒身不滿六尺未見其長也刀傷右脇而福兒素用右手傷宜在左何右也鞫之果得真殺人者遂釋福兒桐廬人戴汝惟家被盗有司得盗獄成送郡夜有焚戴氏廬者而不知汝惟之所之文原曰此必有故也乃得其妻葉氏與其弟謀殺汝惟狀而於水涯樹下得尸與漬血斧俱在焉人以為神及移江東道徽州民謝蘭家僮汪姓者死蘭姪囘賂汪族人誣蘭殺之蘭誣服文原録之得其情釋蘭而坐囘時久旱獄决乃雨師泰折獄貢公亦善於推鞫矣詞雖煩而事可取敢併録之貢師泰為紹興路推官山隂白洋港有大船飄近岸史甲二十人適取鹵海濵見其無主因取其篙櫓而船中有二死人有徐乙者怪其無物而有死人以為史等所刼首官史既誣服師泰宻詢之則里中沈丁載物抵杭而囘漁者張網海中因盗網中魚為漁者所殺寃皆白又有㳺徼徐裕以巡鹽為}
  - {type: page-break, offset: 8417, content: '', id: KR3c0008_WYG_000-48a, image: WYG0729/WYG0729-0993a.png}
  - {type: page-break, offset: 8417, content: '', id: KR3c0008_WYG_000-48b, image: WYG0729/WYG0729-0993b.png}
  - {type: page-break, offset: 8417, content: '', id: KR3c0008_WYG_000-49a, image: WYG0729/WYG0729-0993c.png}
  - {type: variant, offset: 8418, length: 0, content: '', WYG: 肆掠村落間一日遇諸暨商奪其錢撲殺之投尸於水走告縣曰我獲私鹽犯人畏罪赴水死矣官驗視以有傷疑之遂以疑獄釋師泰追訊覆按之具得裕所以殺人狀又餘姚孫國賔獲姚甲造偽鈔受賕而釋之執高乙魯丙赴有司誣以同造偽鈔高嘗為姚行用實非自造而魯與孫有隙故并連之師泰疑高等覆造不合以孫詰之詞屈而情見即釋魯而加高以本罪姚遂處死孫亦就法易貴辨紙國朝易貴成化間守辰州府有窶人担紙息肩路旁倦而寐熟盗去訴於貴即使人抬失紙處一石到府階下杖焉擁入觀者如市閉門量罰觀者以資窶人復詰曰汝紙有誌}
  - {type: page-break, offset: 8418, content: '', id: KR3c0008_WYG_000-49b, image: WYG0729/WYG0729-0993d.png}
  - {type: page-break, offset: 8418, content: '', id: KR3c0008_WYG_000-50a, image: WYG0729/WYG0729-0994a.png}
  - {type: variant, offset: 8419, length: 1, content: 柔, WYG: 曰有遂俾住在外數日出公牘汎買諸賈人紙彼送至令各書名於上乃召窶人認之果得原紙因追究盗紙人伏罪彭祥還貲郭彭祥𢎞治間守眉州問刑明决鄰封合州有兄弟二人兄宦别省其貲每託弟携歸置産契劵俱弟收掌兄卒於官嫂扶櫬歸弟絶無所與又無籍}
  - {type: variant, offset: 8421, length: 4, content: 謂䏻執法, WYG: 稽嫂訴於州訊不服乃越境訴於郭郭即隠告者取獄中賊指攀其弟與盗同夥移文本州械致詰曰汝與某人為盗致富其弟泣曰吾兄仕宦所得未嘗盗也固詰之詞甚詳一一録記乃速其嫂語之弟遂服還貲産筠守釋誣𢎞治末稽察江郡帑藏及筠筠守周君津貳王君珀銳志治盗義民廖顯六素効巡捕劇盗甘乾八報復焚掠廖殺之二君益追治逮捕一惡少怡然就獄云與某村某某等隨甘行兇衆將信之察曰死地人所苦也彼甘就焉容非其情可稍須之倘得訊醜參鞫未晚後兩月馳報曰子言是也向惡少嘗行竊數為某某窘辱因亡身攀誣今獲真盗辨釋}
