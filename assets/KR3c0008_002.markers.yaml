  - {type: variant, offset: 8173, length: 2, content: 議射, WYG: 子之委任下無負斯民之仰望乎孝肅杖吏包拯知開封有犯杖脊徒罪者吏受財與之約曰今見尹須使我責狀汝但號呼自辨我當與汝分罪各受杖决既而引責囚如吏言分辨不已吏入大聲呼之曰但受脊杖出去拯謂其招權捽吏杖之特寛囚罪亦令從杖公知以此折吏勢不知乃為所賣弄也按元魯齋許文正公告世祖防欺之要備載是事且曰孝肅剛嚴峭直而卒為吏所賣盖在上者難於知下欲其不見欺也難矣今考孝肅由進士除大理評事出知建昌天長二縣拜監察御史歴三司判官改工部員外直集賢院出知端瀛揚廬池五州四為京東陜西河北轉運使遷三司副使天章閣待制知諫院陞龍圖閣直學士知江寧府由江寧召拜京尹歴練不為不深聲望不為不重資稟不為不高然為吏人所賣若此况初學古入官之士乎桂氏載於篇中而愚特取以終編者盖欲讀者知所警也噫棠隂比事欽定四庫全書棠隂比事附録袁安别繫所見既真必有此力量始可也推之庶政皆冝若是袁安永平中守楚郡時楚王英謀逆詞連繫者數千人安到郡不入府先案獄理其無明驗者條上出之府丞掾吏皆爭以為阿附反虜法與同罪安曰如有不合太守自當不以相及也遂分别具奏明帝感悟即報許得出者四百餘家高柔察色此正聽五詞之一騐也惟虚心以待之則情狀可見高柔遷}
