  - {type: variant, offset: 7176, length: 817, content: 呉志陳表字文奥以父死敵塲求用為将時有盗官物者數人唯收施明拷掠俟死無詞廷尉以疑聞孫權以表得士卒心詔以明付表表乃去其桎梏飲食沐浴之以誘其歡心明乃首服具列支黨權恱之欲全其名遂釋明而戮其黨明後變行致位為将軍朱詰賕民孔察代盗朱夀昌中散知閬州有大姓雍子良殺人乃賕其里民使出就吏獄具夀昌疑之因引囚屏處訊之囚對如𥘉乃告之曰吾聞子良遺汝錢十萬納汝女為子婦許嫁其女汝家有之乎囚色動又告之曰汝且死書劵抑汝女為婢指十萬為傭直而嫁其女於他人汝将柰何囚泣下始以實告子良付法曽肇所撰志後唐孔相循以邦計貳職權涖夷門軍府事長垣縣有四巨盗冨有資産及敗所牽挽則四貧民耳時都虞候姓韓者則宻使郭崇韜之僚壻也與推吏獄典同鍜其欵都不訊鞫欵成而上斷令棄市及親慮之則又無言就法之際囚屢囘首公疑其情未究即召問之乃曰實枉且言適爲獄吏髙其枷尾遂不得言即命移於州獄俾郡主簿鞫之自韓已下凡數十人受賂約七千緡併以伏法崇龜認刀司馬視鞘唐劉崇龜鎮南海有富商子年少而晳白泊船於江岸次有髙門家一妙姬殊不避人少年挑之曰昬黄當詣宅矣亦無難色是夕果啓扉俟之少年未至有盗入見一房無燭欲行竊姬不知即欣然就之盗謂見執以刀剚之遺刀而逃少年旋至即踐其血汰而仆地及捫之乃見死者急出解維而去明日其家迹其蹤至江岸岸上之人皆云其夜有某客船徑發官差人追之拷掠備至具實吐之惟不招殺人及以其刀視之乃屠家物府主即下令曰某日大教合境庖丁冝集毬塲以俟宰殺既集復曰已晚可留刀於厨而明日再至府主取諸刀乃以殺人之刀換下一口来早各来請刀獨一屠最後不認已刀因詰之對曰此非某刀乃某人之刀耳命擒之則已竄矣於是以合死之囚代商人之子侵夜斃於市竄者知囚已斃不一二夕果歸家遂擒伏法仍杖少年之脊以罪夜入人家後魏司馬恱為豫州刺史有上蔡董毛奴齎錢五千死於道或疑張堤行刼又於堤家得錢五千堤懼楚掠自誣恱疑之乃引毛奴兄問曰殺人取錢當時狼狽應有所遺曽得何物荅曰得一刀鞘恱取視之曰此非里巷所為也乃召州内刀匠示之有郭門者言手所作去歲賣與郭人董及祖恱收詰之具伏出北史司馬楚傳恱其孫也, WYG: ''}
