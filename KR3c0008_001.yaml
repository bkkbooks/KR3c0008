front:
  text: 棠隂比事卷上
  hash: sha256:b2e40f19594ee42df35cc3e70635e25165a57d1a43ac2ec0ede6325fb249a837
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3c0008_SBCK_001-1a}
body:
  text: 宋桂萬榮編次向相訪賊錢推求奴丞相向敏中判西京時有僧過村舍求宿主人不許遂宿於門外夜半忽見有賊携一婦人併物踰墻者僧恐明日為主人所執因亡去走荒草中誤墜眢井而踰墻婦人已為人殺在其中既而主人蹤迹捕獲送官不勝拷掠遂自誣服但云贓與刀留在井旁不知何人持去獄成公獨以贓仗不獲疑之詰問數四僧云前生負此人命無可言者力問之乃以實對於是密遣吏訪賊吏食於村店有嫗聞其府中來不知其吏因問僧之獄如何吏紿云昨日已笞死於市嫗云今若獲賊如何吏云府已誤決不復敢問嫗遂曰賊乃此村少年某甲也吏詢其處併贓捕獲涑水記聞錢若水為同州推官有冨家女奴逃亡父母訴於州録參嘗貸冨家錢不獲遂劾冨民父子共殺女奴失尸於水或為元謀或為加功罪皆應死獄具若水獨疑留而不決州郡上下切怪之録參誣若水受賂若水但笑謝而已旬餘詣州屏人語曰某留獄者所以訪求女奴今得之矣因送於州既而知州從簾中推出示其父母父母驚曰是也於是冨民父子皆得釋知州欲奏其功固辭不願朝廷聞之驟加進擢同上曹攄明婦裴均釋夫晉曹攄字顔逺為臨淄令目有寡婦飬姑甚謹姑以其年少勸令改適婦守節不移姑愍之密自殺親黨乃以誣其婦婦不勝官司拷訊即自誣伏攄𥘉到疑其冤更加辨究具得情實時稱其明唐裴均鎮襄陽日里俗妻有外情乃託骨蒸之疾云醫者須得獵犬肉食之則愈謂其夫曰東鄰有犬每來盜物君可屠之夫乃依其言獻肉於妻妻食之餘乃留於篋笥夫出命鄰告之遂聞於公夫到官因述妻之所欲公曰斯乃妻有他姦躓夫於禍耳令劾之具得其情併以外情者俱付法其夫遂釋程皓詰翁丙吉驗子程察院知澤州晉城縣日冨民張氏子其父死未幾有老父至門曰我汝父也來就汝居具陳其由張氏子驚疑相與詣縣請辨老父曰業醫逺出妻生子貧不能飬以與張氏某年月日某人抱去某人見之皓曰歲久矣汝何説之詳也老父曰書於藥法册後某歸而知之使以其册進乃曰某年月日某人抱兒與張三翁皓問張氏子年幾曰三十六又問爾父年幾曰七十六謂老父曰是子之生其父才年四十人已謂之張三翁乎老父驚駭服罪此聞之前􅒰漢宣帝時陳留有人年八十餘家冨而無子𥘉娵祗一女已適人再娵復生一子數年而翁死前妻女欲奪財物乃誣後母所生非其父之子郡縣不能決聞於臺省丙吉為廷尉乃曰吾聞老人之子不耐寒且日中無影時八月中取同歲小兒均衣單衣而老人之子獨色變及立於日中亦無影前女遂受誣母之罪李崇還泰黃霸叱姒後魏李崇為揚州刺史縣民荀泰者有子三歲失之後見在趙奉伯家各言已子並有鄰證郡縣不能斷崇乃令二父與兒各禁數日忽遣獄吏報兒暴卒恭聞之悲不自勝奉伯嗟嘆而已遂以兒還泰奉伯伏罪漢時頴川有冨室兄弟同居弟婦與長姒皆懷妊長姒胎傷弟婦生男輒奪以為已子爭訴三年郡守黃霸使人抱兒於庭令娣姒競取之長姒持之甚猛弟婦恐有所傷於手霸乃叱長姒曰汝貪家財欲得兒寧慮頓有所傷乎乃以兒還弟婦出風俗通歐陽左手惟濟右臂都官歐陽曄知端州有桂陽監民爭舟毆死獄久不決曄出囚飲食之皆還於獄獨留一人留者色動曄曰殺人者汝也囚不知所以然曄曰吾視食者皆以右手汝獨以左今死者傷右肋此汝殺之明也囚乃服見歐文忠所撰志錢惟濟知絳州有條桑者盜強奪之不得乃自斫其右臂誣以殺人官司莫能辨公乃引問面給以食而盜以左手舉匕因語之曰他人行刃則上重下輕今上輕下重正用左手傷右臂也誣者引伏見本傳沈括顙喉南公塞鼻沈內翰云世人以竹木牙骨之屬作呌子置喉中顙之能作人言豫謂瘖者苦煩冤無以自明取呌子令顙之作聲如傀儡子粗能辨其一二冤或可伸尚書李南公為河北提刑時有班行犯罪下獄案之不服開口不食者百餘日獄吏不敢拷訊甚以為患南公曰吾能立使之食引出問曰吾以一物塞汝鼻汝能終不食乎其人懼即食蓋彼善服氣以物塞鼻則氣結而不通是以自服程琳烓竈強至油幕程宣徽知開封府時禁中失火延燒兩宮宦者根治諸縫人已誣服乃送府具獄琳辨其非是又命工圖火所經處且言後宫人多而居隘其烓竈近版壁久燥而焚此殆天災不可罪人上為寬其獄卒無死者見本慱烓竈行竈也淵圭切強至祠部為開封府倉曹參軍時禁中露積油幕一夕火主守者法皆應死至預聽讞疑火所起召幕工訊之工言製幕須雜他藥相因既夕得濕則燔府為上聞仁宗悟曰頃歲真宗山陵火起油衣中其事正爾主守者遂傳輕典見行狀昔晉武庫火張華以為積油之所致者此也妾吏鴆宋玉素毒郭范忠宣知河中府有知録宋儋年會客罷以疾告是夜暴卒蓋其妾與小吏為姦公知死不以理遂付有司案治驗其尸九竅流血因言置毒鱉胾中公問鱉在第幾盞豈有中毒而能終席耶決非情實命再劾之乃因客散置毒酒盞中而殺之蓋罪人以儋年不嗜鱉而為坐客所併欲為他日翻異逃死計耳見范公言行録唐中書舍人郭正一有婢玉素極姝麗正一夜須漿水粥非玉素煮之不可玉素乃毒之良久覔婢并金銀器不得録奏敕令長安萬年尉石良捕之石良主帥魏昶有策略請喚舍人少年家奴三人布衫籠頭及縛衛士四人問十日內何人覔舍人家衛士云有投化髙麗留書遣付舍人牧馬奴索驗之乃云金城坊中有一空宅更無他語石良往彼處搜之至一宅封鎖甚密打開婢與化士並在其中乃是化士共牧馬奴藏之奉敕斬於東市彥超虗盜道讓詐囚後漢慕容彥超善捕盜為鄆帥日有庫在州中或以假銀二鋌質錢十萬彥超知之使主庫者出榜虗稱𬒳盜失所質銀鋌等物召人收捕不日聞果有人來贖銀執之伏罪後魏髙謙之子道讓為河隂令有人囊瓦石作金以詐市馬者因而逃去詔令捕之謙之乃枷一囚立於馬市宣言詐市馬賊欲刑之密遣人察市之私議者有人欣然曰無復憂矣遂執訊問悉獲其黨孫甫舂粟許元焚舟待制孫甫為華州推官日州倉粟惡吏當負錢數百萬轉運使李紘以吏屬甫甫乃令取斗粟舂之可棄者十才一二又試之亦然吏遂得弛繫負錢才數十萬而已紘因薦之見曽鞏所撰志待制許元𥘉為發運判官患官舟多虗破釘鞠之數元一日命取新造船一隻焚之稱其釘鞠比所破才十之一自是立為定額見魏泰東軒筆録宗元守辜魏濤證死待制馬宗元少時父麟毆人𬒳繫守辜而傷者死將抵法宗元推所毆時在限外四刻因訴於郡得原父罪由是知名鄭克評云案辜限計日而日以百刻計之死在限外則不坐毆殺之罪而坐毆傷之罪法無久近之異雖止四刻亦在限外魏朝奉知沂州永縣兩仇鬪而傷既決遣而傷者死濤求其故而未得死者子訴於監司監司怒有惡語濤歎曰官可奪囚不可殺後得其實乃因是夕罷歸騎及門而墜死鄰證既明其誣遂辨見陳無已所撰志桑懌閉柵蘇秦徇市明道末亰西旱蝗有惡賊二三十人樞密院召永安巡檢桑懌授以賊名使捕之懌曰盜畏吾名決潰去冝先示以怯至則閉柵戒軍吏不得出其下數請自效皆不許乃夜與數卒服盜服迹盜所常行處入民家老小皆走獨一媪留為治飲食如事群盜懌三日復自携饌飲媪媪以為真盜乃稍就與語因及群盜媪曰彼聞桑殿直來皆遁去近知閉營不出漸還矣某在某處某在某處懌後三日又往厚遺之遂以實告曰我桑殿直也為我察盜之實的居處切勿泄乃分軍士悉擒獲之見本傳蘇秦在齊齊大夫多與之爭寵而使人刺之不殊而走求賊不得蘇秦且死乃謂齊王曰臣死之後王車裂以殉於市曰秦為燕作亂於齊如此則刺臣之賊決可得王如其言殺蘇秦者果出齊王因而誅之舊出春秋後語任城示靴楊津獲絹北齊任城王湝領并州刺史時有婦人臨汾水浣衣為乘馬行人換其靴而去者婦人持故靴詣州言之湝召城中諸嫗以靴示之紿曰有乘馬於路𬒳劫者遺此一靴得非親屬乎一嫗撫膺哭曰兒昨著此回妻家也即捕而獲之周楊津字羅漢為岐州刺史有武功人齎絹三百匹去城十里為賊所劫時有使者馳騎而至𬒳劫人因以告之使者到州以狀白之津乃下教曰有人著某色衣乘某色馬在城東十里𬒳殺不知姓名若有家人可速收示有一老母行哭而出云是已子於是收捕并絹俱獲李傑買棺重榮咄箭唐李傑為河南尹有寡婦告其子不孝傑察其狀非不孝者乃謂寡婦曰汝寡居惟一子今罪至死得無悔乎婦曰不順之子寧復惜之傑曰審如是可買棺來取尸因使人視之乃謂一道士曰事了矣俄將棺至傑尚冀其悔而寡婦堅執如初時道士在門外密令擒之一問承伏曰某與寡婦有私常為兒制故欲除之乃杖殺道士及婦却以棺盛之後晉安重榮鎮恆州有夫妻共訴其子不孝公乃面加詰責抽劒令自殺之其父泣曰不忍也其母詬叱仗劒逐之重榮問之乃繼母也因咄自後射一箭而斃聞者莫不增快蘇請祔柩賈廢追服蘇寀為大理寺詳斷官時有父卒而母嫁後聞母死已葬乃盜其柩而祔于父法當死寀獨曰子盜母柩納於父墓豈可與發冡取財者比請之得減死侍讀賈黯判流內銓時益州推官乘澤在蜀三年不知其父死及代還銓吏不為領文書始去發喪既除服且求磨勘黯言澤與父不通問者三年借非匿喪是豈為孝卒使坐廢田里王圭撰志子産知姦莊遵疑哭鄭子産聞婦人哭使人執而問之果手刃其夫者也御者問曰何以知之子産曰夫人之於所親也有病則憂臨死則懼既死則哀今其夫已死哭不哀而懼是以知其有姦也出獨異志莊遵為楊州刺史巡行部內聞一哭聲懼而不哀駐車問之答曰夫遭火燒死遵疑焉因令吏守之有蠅集於尸首吏乃披髻視之得鐡釘焉因知此婦與姦人共殺其夫也即案其罪思兢詐客佐史誣裴唐則天時或告駙馬崔宣謀反敕御史張行岌案之告者先誘宣妾藏之乃云妾將發其謀而宣殺之行岌案而無狀則天怒令重劾終無實則天曰不獲妾何以自雪行岌乃逼宣家訪妾宣再從弟思兢多置錢帛募之略無所聞而宣家每議事則獄中告者輒知思兢疑宣家有同謀者乃詐曰須顧俠客殺告者語了遂侵晨伺於臺側有館客素為宣所信任乃至臺賂門吏以通告者思兢因罵曰若陷崔宣必殺汝矣乃引思兢於告者之黨搜獲其妻宣始得免唐湖州佐史江琛取刺史裴光製書割取字合成文理詐為徐敬業反書以告及差使推之欵云書是光書語非光語前後三使並不能決則天令差能事人劾之曰張楚金可及劾之仍如前欵楚金憂悶仰卧向窗日影透窗向日視之其字乃是輔葺而作因令琛取書投於水中字字解散琛即扣頭伏罪奉敕斬之季圭雞豆張舉豬灰宋傳季圭為山隂令有爭雞者季圭問雞旦何食一云豆一云粟殺雞破嗉有豆焉遂罰言粟者吳張舉為句章令有妻殺夫因放火燒舍乃詐稱火燒夫死夫家疑之詣官訴妻妻拒而不承舉遂取豬二口一殺之一活之乃積薪燒之察殺者口中無灰活者口中有灰因驗夫口中無灰以此鞫之妻果伏罪舊不著出處定牧認皮滄州市脯北齊彭城王浟為定州刺史有一人𬒳盜黑牛上有白毛浟乃詐為上府庫皮倍酬其直皮至使牛主認之因獲其盜又為滄州刺史日有人從幽州來驢馱鹿脯至滄州界以足疾行遲偶會一人為伴𬒳盜驢及脯去明旦告州浟乃命左右及府寮散市鹿脯不限其價失主見而識之推獲盜者張受越訴裴命急吐唐張允濟為武陽令以德教訓下百姓懷之鄰邑元武縣有以牸牛依其妻家者八九年間孳生十餘牛及將異居妻家不與本縣纍政不能決其人乃越界訴於允濟允濟曰爾自有令何至此也其人垂泣不肯去具言所以允濟遂令左右縛牛主布衫蒙頭將詣其妻家村中捕盜牛賊悉問此村牛所從來妻家不知其故恐𬒳連及乃曰此是女壻家牛允濟令發其蒙謂曰此即女壻當以牛歸之唐裴子雲為衛州新鄉令部人王恭戍邊留牸牛六頭於舅李璡家五年産犢三十頭恭還索牛李云牸牛二頭已死只還四頭老牸恭訴之子雲送恭於獄令收追盜牛者李璡璡至子雲叱之曰賊引汝盜牛三十頭藏汝莊禸喚賊共對乃以布衫籠恭頭立南墻下命璡急吐欵云三十頭牛㧾是外甥牸牛所生實非盜得子雲遣去恭布衫即令盡還牛却以五頭酬璡辛苦王質母原馬亮悉貸王質待制知廬州有盜殺其黨并其資而遁邏者得之質抵之死轉運使楊告駮之曰盜殺其徒者死當原質云殺其徒而自首者當原今殺人而取其資非自首而捕得之原死豈法意乎數上疏不報降監舒州靈仙觀逾年韓琦知審刑院請盜殺其徒而不首者母得原見本傳尚書馬亮知潭州屬縣有亡命卒剽攻為鄉村患或謀殺之在法當死者四人亮曰能為民除害而反坐以死豈法意耶乃悉貸之鄭克評曰按剽攻之人於法許捕若非名捕者輒以謀殺之則慮有誣枉法所不許也能奏聼裁尤為得體云允濟聽蔥彭城書菜張允濟為武陽令道逄老母種蔥結庵守之因告曰不須守若遇盜當來訴老母如戒居一宿而失蔥母以告允濟悉召蔥地左右居人使之一一聽其手乃得盜者北齊彭城王浟為滄州刺史有老母種菜數被盜者浟使人密往書其葉明日市中認之乃獲賊吕婦斷腕包牛割舌吕公綽侍讀知開封府有營婦夫出外有盜夜入舍斷其腕而去都人喧駭公謂非其夫之仇不冝快意如此遣騎詰其夫果護同營韓元者具姦狀伏誅王圭所撰志包副樞初知楊州天長縣時有訴盜割牛舌者拯密令歸屠其牛而鬻之繼有告其私殺牛者拯詰之曰何為割其家牛舌而又告之其人驚伏見本傳崔黯搜帑張輅行穴唐崔黯鎮湖南有惡少不為鄉里所容乃自髠鉗依佛教為傭隸假託焚修幻誘聾俗積財萬計公𥘉到懼其事露乃投牒請脫鉗歸俗公問曰你教化三年所得幾何曰旋得旋用不計其數公曰費用造設幾何曰三千餘貫公曰給者既知納者不記決有隱欺乃搜其積蓄有妻孥滿室遂劾其矯妄之咎並以財物施之貧下石晉時魏州冠氏縣華村僧寺有一鐡佛可長丈餘中心且空一旦云佛能言士衆雲集施利填委縣申州府時髙祖鎮鄴莫測其事命衙將尚謙持香奉供且驗其事有三傳張輅請與偕行詰其妖狀乃率人圍寺盡遣僧赴道場輅即潛開僧房見有穴道及入穴行至鐡佛坐下因於空身中厲聲歷數僧過使令擒魁首數人上聞就彼戮之因以輅為長河縣主簿杜鎬毁像次翁戮男杜鎬侍郎之兄仕江南為法官嘗有子毁父畫像為所親所訟者疑其法未能決鎬幼輒曰僧道之毁天尊佛像可以比也兄甚竒之遂用此為斷黃霸字次翁漢宣時為相燕代之間有三男共娶一婦因生一子及欲分離各爭其子遂訟於臺請霸斷之霸曰非同人類當以禽獸處之遂戮三男其子還母按荀子云有法者以法行無法者以類舉若夫黃霸戮三男王尊殺假子蓋舉其事之類耳法不禁禽獸聚麀然人殺禽獸無罪則戮之可也傅令鞭絲李惠擊鹽宋傅季圭為山隂令有賣糖賣針者爭一絲團訴於縣乃令挂絲於柱鞭之有少鐵屑焉乃罰賣糖者後魏李惠仕為雍州刺史有負鹽負薪者爭一羊皮各言籍背之物惠謂州吏曰此皮可拷知主群下默然惠因令置皮於席上以杖擊之見少許鹽屑使爭者視之負薪者伏辜楊牧笞巫薛向執賈後魏李崇為楊州刺史有定州流人解思安背役亡歸其兄慶賔規絶名貫乃認城外死尸詐稱是弟為蘇顯甫李蓋所殺有女巫陽氏託鬼附説思安𬒳害之苦李蓋等不勝其楚各自欵服崇疑之乃遣二人偽從外來詣慶賔曰某住在北州有一人夜過寄宿云是流兵背役人解思安欲送之官苦求見免且謂有兄慶賔見住楊州君脫矜閔為往告報須重相酬今但見質若往不獲送官未晚慶賔悵然失色崇乃攝而問之即自引伏數日間思安亦為人縛至崇笞女巫一百遂釋蓋等出北史本傳樞密薛向𥘉為京兆户曹兼監商稅有賈胡過稅務出銀一篋書其上曰密使遺涇原都監向曰此決偽也安有大臣餉人物而使賈胡致之執詣府治之果伏其詐吕大防所撰志程戡仇門仲遊帥宇程戡宣徽知虔州民有積為仇者一日諸子私謂其母曰母今老且病恐不得更夀請以母死報仇乃殺其母置于仇人之門而訴之仇不能自明戡疑之或謂無足疑戡曰殺人而自置於門非可疑耶乃親劾治具見本謀王圭所撰志畢仲遊為河東提刑丞相韓縝出鎮太原其家奴胡童自陳有卒剽劫其衣服於黃堂之側公怒以付吏將黥配之仲遊謂小童衣服鮮薄而剽掠於大帥故相之宇下似非人情易吏案治其誣乃辨符融沐枕獄吏滌屨前秦苻融字博林善斷獄董豐遊學三年而還宿妻家是夜妻為人所殺妻兄疑豐殺之融引問曰汝𥘉無怪與卜問否豐曰夜夢乘馬入一水而北自北而南俯見兩日在水中又馬左向濕筮者云憂獄逺二沐避二枕既至妻具沐夜授枕憶筮者言遂不從之妻乃自沐枕枕而寢融曰在易坎為水為北離為馬為南馬北渡從北而南從坎之離三爻同變離為中女坎為中男馬左向而濕水也左水右馬馮字兩日昌字其馮昌殺之乎遂捕昌詰之昌具服與其妻通期以新沐枕為驗誤中婦人江南大理寺鞫殺人獄未得其實獄吏憂畏乃焚香禱神因夢遇枯河上髙山寤而思曰河無水乃可字山而髙乃嵩字可嵩僧名也崇孝寺有僧名可嵩即白長官攝之訊問未有姦狀忽見屨上有墨汙因問其由云為墨所濺使脫視之乃墨塗也僧色動遂滌之即見血痕以此劾之僧乃服見吳淑校理祕閣間談宗裔卷紬髙防校布王蜀時許宗裔典劔州有于燈下識認暴客逮曉告吏捕之所收贓惟絲絇紬紈失主言是本物其賊不禁拷掠遂誣服因而送州宗裔引慮囚囚言其物乃是家有與失主互爭即命取兩家繅絲車又問紬紈卷時各用何物為胎心一云杏核一云瓦子即開示之見杏核仍以絲絇安於車􅤧量其􅤧大小亦是囚家物𬒳劫主受妄認之過巡捕吏伏拷決之辜其枉獲雪周世宗時髙防知蔡州部民王義為賊所劫捕得五人繫獄窮治贓狀已具將加極刑防復取贓閲之召義問所失衫袴是一端布否曰然防令校其幅尺廣狹踈密不同囚乃稱冤問何故服罪曰不任捶楚求速死耳居數日獲本賊而五人乃免防歸本朝終於左丞見本傳江分表裏章辨朱墨陵州仁夀縣有里胥洪氏利鄰人田紿之曰我為若稅免若役鄰人喜剗其稅歸之名於公上踰二十年且偽為劵以茶染𥿄類逺年者訟之于縣縣令江某郎中取𥿄積伸之曰若逺年𥿄裏當色白今表裏如一偽也訊之果伏江乃衢州開化人今失其名事見李泰伯主簿所撰志侍御章頻知彭州九隴縣時眉州大姓孫延世為偽契奪族人田久不能辨運使委頻驗治頻曰劵墨浮朱上決先盜用印而後書之既引伏獄未上而其家人復訴於轉運使命知益州華陽縣黃夢松覆案亦無所異黃用此召為監察御史頻乃坐不即具獄降慶州監酒見本傳頻以景祐二年使虜而卒于道胡質集鄰髙柔察色魏志胡質字文德為常州太守東莞盧顯為人所殺求賊未得質曰此士無讐而有少妻所以死耳乃集鄰居少年有李若者見質而色動遂窮詰之乃自首伏罪魏護軍營士竇禮出不還營以為沒身其妻盈氏詣廷尉訴髙柔曰爾夫不與人交財乎乃曰嘗出錢與同營焦子文因追察之子文色動應對失節於是伏殺禮之罪蔣常覘嫗思彥集兒唐板橋店主張逖妻歸寧有王衛楊正等投店宿五更早發夜有人以王衛刀殺逖其刀仍入鞘中正等不之覺至明店人趂正等拔刀血甚狼籍收訊之遂自誣伏上疑之差蔣常覆推到則悉追店人十五以上既集為人數不足且放去止留一嫗日晚放出令典獄者密覘之云有人共語即記之明日復爾如是三日並是此人常乃追集男女三百餘人就中喚出與嫗語者問之具伏乃是與逖妻有姦而殺之唐韓思彥使并州有賊殺人主名不立醉胡懷刀而汙訊掠已伏思彥疑之晨集童兒凡數百暮乃出之如是者三因問兒出亦有問之者乎皆曰有之即物色其人而訊之於是果獲真盜劉相鄰證韓參乳醫丞相劉沆知衡州日有大姓尹氏欲買鄰人田莫能得鄰人老而子幼乃偽為劵及鄰人死即逐其子訟二十年不得直沆至又訴尹氏出積歲所收户鈔為驗沆曰若田百頃户鈔豈特收此乎始為劵時嘗問鄰乎其人固多在可取為證尹不能對遂伏罪按賣田問鄰成劵會鄰古法也近年有司茍取小快遂改此法未之思歟參政韓億知洋州時土豪李甲者兄死迫嫁其嫂因誣其子為異姓以專其資嫂歷訴於官甲輒賂吏使掠服之億視舊牘但未曽引乳醫為證一日盡召其黨以乳醫示之衆乃無詞其冤遂白袁滋鑄金孫寶稱散唐李汧公鎮鳯翔屬邑有編氓因耨田得馬蹄金一甕里民送於縣治沿牒將置府庭邑宰恐公藏失守使貯於私庫信宿視之乃土塊也以狀聞於府議者僉疑姦人换之遂遣掾就案其事宰莫能明即以易金誣服窮其所藏之所或云糞土或云水中以案上聞汧公怒甚俄而有宴語及斯事坐客咸驚時袁相國滋亦在幕中獨俯首無語汧公詰之滋曰某疑此事有枉汧公乃俾移其獄於郡命袁治之袁令閲甕間得土二百五十餘塊遂於列肆索金鎔成土塊狀始及其半已有三百斤詢其𥘉負之人乃二農夫以巨竹舁之計其總數非二人以竹可輿度其在路之時金已化為土矣於是群情大豁邑宰獲伸雪劇談録漢孫寶為京兆尹有賣鐶散者今之鐶餅也於都市與一村民相逄擊落皆碎村民甘認填五十枚賣者堅稱三百枚爭至太守之前引問無以證明公令别買一枚稱之乃都稱碎者細折分兩賣者乃伏虗誑之罪程簿舊錢王璩故簡程皓察院𥘉為京兆府鄠縣簿民有借兄之宅居者發地藏錢兄之子訴曰父所藏也令言無證佐何以決之皓曰此易辨耳問兄之子曰爾父藏錢幾年矣曰二十年遣吏取一千視之謂曰今官所鑄不五六年則遍天下此錢乃爾父未居前數十年所鑄何也其人遂伏伊川所撰行狀寺丞王璩嘗為襄州中廬令有賊久訊不得情偶於賊槖中得故簡而揭示之乃房陵商人道為賊所掠者賊即引伏王圭所撰志棠隂比事上卷
