front:
  text: 後序端平改元七月乙夘萬榮以尚右郎􅀩恩陞對首􅆢守一心之正以謹治原次奏懲群吏之貪以固􅀖本天威咫尺洊賜褒嘉既而玉音巽發謂朕甞見卿所編棠隂比事知卿聴訟决能審克萬榮即㳟奏臣昨調建康司理右􅁺待次日乆因編此以資見聞豈料天侈其逄誤關乙覧容臣下殿躬謝暨出黄門便有力求此本者鋟梓星江逺莫之致是用重刋流布庻可上廣聖主好生之徳下禆涖官哀矜之意十月既望朝散大夫新除直寶章閣知常徳府桂萬榮謹識棠隂比事後序獄重事也獄而有疑則尤事之重君子所冝盡心焉今之居是官者其果能盡是心乎吾表兄桂夢恊讀書不讀律而每有哀憐無辜之心尉滿參選特注司㓂參軍而歸人問之則曰此吾志也待次五年則曰此吾所欲也因取古人之書有資於折獄者觀之其於和魯公之疑獄集鄭公克之折獄􅀛鑑則又考之精翫之熟事之􅁼者不期而合韻之恊者不期而比屬辭七十有二信乎臨事之不茍而遇物期於無悔也虙甞伏而讀之以為近世士夫鉤元提要以資愽識彊記者不知㡬書􅁼多無􅀘此書一傳天下其無􅁈民乎則又從而思之竊謂鞭絲以出鐵擊皮以驗鹽􅀤冡知盗模金辨誣如此等事不見於古之盛時而見於後世豈古之風俗尚淳不俟乎測囚之法而後世如􅀑如蜮不如是則不得其情邪觀天子議獄緩死之言獨於中孚之象發之盖惟天下之至誠可以動人悟物雖開金石感􅀑神可也茍推吾是心聴之以五聲簡之以五辭不撓不屈志氣清明天威具嚴洋洋在上謂人情不可得吾不信也吾表兄其知之矣虙幹辨浙東安撫司事表兄携此書見示未㡬赴官金陵道出越上虙歸此書因題于後以代送行序云嘉定辛未良月之望張虙識
