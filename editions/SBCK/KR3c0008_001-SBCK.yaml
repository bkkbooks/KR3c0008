front:
  text: 棠隂比事卷上
  hash: sha256:b2e40f19594ee42df35cc3e70635e25165a57d1a43ac2ec0ede6325fb249a837
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3c0008_SBCK_001-1a}
body:
  text: 宋桂萬榮編次向相訪賊錢推求奴丞相向敏中判西京時有僧過村舍求􅀫主人不許遂􅀫於門外夜半忽見有賊携一婦人併物踰墻者僧恐明日為主人所執因亡去走荒草中誤墜眢井而踰墙婦人已為人殺在其中既而主人蹤迹捕􅀗送官不勝拷掠遂自誣服但云􅂍與刀留在井旁不知何人持去獄成公獨以􅂍仗不􅀗疑之詰問數四僧云前生􅀒此人命無可言者力問之乃以實對於是宻遣吏訪賊吏食於村店有嫗聞其府中來不知其吏因問僧之獄如何吏紿云昨日已笞死於市嫗云今若􅀗賊如何吏云府已誤决不復敢問嫗遂曰賊乃此村少年某甲也吏詢其處併􅂍捕􅀗涑水記聞錢若水為同州推官有冨家女奴逃亡父母訴於州録參甞貸冨家錢不􅀗遂劾冨民父子共殺女奴失屍於水或為元謀或為加功罪皆應死獄具若水獨疑留而不决州郡上下切怪之錄參誣若水受賂若水但􅀏謝而已旬餘詣州屏人語曰某留獄者所以訪求女奴今得之矣因送於州既而知州從􅄕中推出示其父母父母驚曰是也於是冨民父子皆得釋知州欲奏其功固辭不願朝廷聞之驟加進擢同上曹攄明婦裴均釋夫晉曹攄字顔逺為臨淄令目有寡婦飬姑甚謹姑以其年少勸令改適婦守節不移姑愍之宻自殺親黨乃以誣其婦婦不勝官司拷訊即自誣伏攄􅀄到疑其􅁈更加辨究具得情實時稱其明唐裴均鎮襄陽日里俗妻有外情乃託骨烝之疾云醫者湏得獵犬肉食之則愈謂其夫曰東隣有犬每來盗物君可屠之夫乃依其言獻肉於妻妻食之餘乃留於篋笥夫出命隣告之遂聞於公夫到官因述妻之所欲公曰斯乃妻有他姦躓夫於禍耳令劾之具得其情併以外情者俱付法其夫遂釋程顥詰翁丙吉驗子程察院知澤州晉城縣日冨民張氏子其父死未㡬有老父至門曰我汝父也來就汝居具陳其由張氏子驚疑相與詣縣請辨老父曰業醫逺出妻生子貧不能飬以與張氏某年月日某人抱去某人見之顥曰􅀊乆矣汝何說之詳也老父曰書於藥法册後某歸而知之使以其册進乃曰某年月日某人抱兒與張三翁顥問張氏子年㡬曰三十六又問爾父年㡬曰七十六謂老父曰是子之生其父􅂊年四十人已謂之張三翁乎老父驚駭服罪此聞之前􅒰漢宣帝時陳留有人年八十餘家冨而無子􅀄娵祗一女已適人再娵復生一子數年而翁死前妻女欲奪財物乃誣後母所生非其父之子郡縣不能决聞於䑓省丙吉為廷尉乃曰吾聞老人之子不耐寒且日中無影時八月中取同􅀊小兒均衣單衣而老人之子獨色變及立於日中亦無影前女遂受誣母之罪李崇還泰黄覇叱姒後魏李崇為􅀭州刺史縣民荀㤗者有子三􅀊失之後見在趙􅆢伯家各言已子並有隣證郡縣不能斷崇乃令二父與兒各禁數日忽遣獄吏報兒􅁀卒㳟聞之悲不自勝􅆢伯嗟嘆而已遂以兒還泰􅆢伯伏罪漢時頴川有冨室兄弟同居弟婦與長姒皆懐姙長姒胎傷弟婦生男􅂺奪以為已子爭訴三年郡守黄覇使人抱兒於庭令娣姒競取之長姒持之甚猛弟婦恐有所傷於手覇乃叱長姒曰汝貪家財欲得兒寧慮頓有所傷乎乃以兒還弟婦出風俗通歐陽左手惟濟右臂都官歐陽曄知端州有桂陽監民争舟毆死獄乆不决曄出囚飲食之皆還於獄獨留一人留者色動曄曰殺人者汝也囚不知所以然曄曰吾視食者皆以右手汝獨以左今死者傷右肋此汝殺之明也囚乃服見歐文忠􅀁撰志錢惟濟知絳州有條桑者盗強奪之不得乃自斫其右臂誣以殺人官司莫能辨公乃引問面給以食而盗以左手舉匕因語之曰他人行刃則上重下輕今上輕下重正用左手傷右臂也誣者引伏見本傳沈括顙喉南公塞鼻沈内翰云世人以竹木牙骨之屬作呌子置喉中顙之能作人言予謂瘖者苦煩􅁈無以自明取呌子令顙之作聲如傀儡子粗能辨其一二􅁈或可伸尚書李南公為河北提刑時有班行犯罪下獄案之不服開口不食者百餘日獄吏不敢拷訊甚以為患南公曰吾能立使之食引出問曰吾以一物塞汝鼻汝能終不食乎其人懼即食蓋彼善服氣以物塞鼻則氣結而不通是以自服程琳烓竈強至油幕程宣徽知開封府時禁中失火延燒兩宮宦者根治諸􅒌人已誣服乃送府具獄琳辨其非是又命工圖火所經處且言後宫人多而居隘其烓竈近版壁乆燥而焚此殆天灾不可罪人上為寛其獄卒無死者見本慱烓竈行竈也淵圭切強至祠部為開封府倉曹參軍時禁中露積油幕一夕火主守者法皆應死至預聴讞疑火所起召幕工訊之工言製幕湏雜他藥相因既夕得濕則燔府為上聞仁宗悟曰頃􅀊真宗山陵火起油衣中其事正爾主守者遂傳輕典見行状昔晉武庫火張華以為積油之所致者此也妾吏酖宋玉素毒郭范忠宣知河中府有知錄宋儋年會客罷以疾告是夜􅁀卒盖其妾與小吏為姦公知死不以理遂付有司案治驗其屍九竅流血因言寘毒鱉胾中公問鱉在第㡬盞豈有中毒而能終席耶决非情實命再劾之乃因客散寘毒酒盞中而殺之盖罪人以儋年不嗜鱉而為坐客所併欲為他日翻異逃死計耳見范公言行録唐中書舍人郭正一有婢玉素極姝麗正一夜湏漿水粥非玉素煑之不可玉素乃毒之良乆覔婢并金銀噐不得録奏􅃙令長安萬年尉石良捕之石良主帥魏昶有策畧請喚舍人少年家奴三人布衫籠頭及縛衛士四人問十日内何人覔舍人家衛士云有投化髙麗留書遣付舍人牧馬奴索驗之乃云金城坊中有一空宅更無他語石良徃彼處搜之至一宅封鎻甚宻打􅄏婢與化士並在其中乃是化士共牧馬奴藏之􅆢􅃙斬於東市彦超虗盗道讓詐囚後漢慕容彦超善捕盗為鄆帥日有庫在州中或以假銀二鋌質錢十萬彦超知之使主庫者出榜虗稱􅀍盗失􅀁質銀鋌等物召人􅀵捕不日聞果有人来贖銀執之伏罪後魏髙謙之子道讓為河隂令有人􅇸瓦石作金以詐市馬者因而逃去詔令捕之謙之乃枷一囚立於馬市宣言詐市馬賊欲刑之宻遣人察市之􅀻議者有人忻然曰無復憂矣遂執訊問悉􅀗其黨孫甫舂粟許元焚舟待制孫甫為華州推官日州倉粟惡吏當􅀒錢數百萬轉運使李紘以吏屬甫甫乃令取斗粟舂之可棄者十􅂊一二又試之亦然吏遂得弛繫􅀒錢􅂊數十萬而已紘因薦之見曽鞏所撰志待制許元􅀄為發運判官患官舟多虗破釘鞠之數元一日命取新造船一隻焚之秤其釘鞠比所破􅂊十之一自是立為定額見魏㤗東軒筆録宗元守辜魏濤證死待制馬宗元少時父麟毆人􅀍繫守辜而傷者死􅀅抵法宗元推所毆時在限外四刻因訴於郡得原父罪由是知名鄭克評云案辜限計日而日以百刻計之死在限外則不坐毆殺之罪而坐毆傷之罪法無乆近之異雖止四刻亦在限外魏朝􅆢知沂州永縣兩仇闘而傷既决遣而傷者死濤求其故而未得死者子訴於監司監司怒有惡語濤歎曰官可奪囚不可殺後得其實乃因是夕罷歸騎及門而墜死隣證既明其誣遂辨見陳無已所撰志桑懌閉柵蘓秦徇市明道末亰西旱蝗有惡賊二三十人樞宻院召永安廵檢桑懌授以賊名使捕之懌曰盗畏吾名决潰去冝先示以怯至則閉柵戒軍吏不得出其下數請自效皆不許乃夜與數卒服盗服迹盗所常行處入民家老小皆走獨一媪留為治飲食如事群盗懌三日復自携饌飲媪媪以為真盗乃稍就與語因及群盗媪曰彼聞桑殿直来皆遁去近知閉營不出漸還矣某在某處某在某處懌後三日又徃厚遺之遂以實告曰我桑殿直也為我察盗之實的居處切勿泄乃分軍士悉擒􅀗之見本傳蘓秦在齊齊大夫多與之争寵而使人刺之不殊而走求賊不得蘓秦且死乃謂齊王曰臣死之後王車裂以殉於市曰秦為燕作亂於齊如此則刺臣之賊决可得王如其言殺蘓秦者果出齊王因而誅之舊出春秋後語任城示靴楊津􅀗絹北齊任城王湝領并州刺史時有婦人臨汾水浣衣為乗馬行人換其靴而去者婦人持故靴詣州言之湝召城中諸嫗以靴示之紿曰有乗馬於路􅀍刼者遺此一靴得非親屬乎一嫗撫膺􅂘曰兒昨着此囘妻家也即捕而􅀗之周楊津字羅漢為岐州刺史有武功人齎絹三百匹去城十里為賊􅀁刼時有使者馳􅀐而至􅀍刼人因以告之使者到州以狀白之津乃下教曰有人着某色衣乗某色馬在城東十里􅀍殺不知姓名若有家人可速􅀵示有一老母行哭而出云是已子於是􅀵捕并絹俱􅀗李傑買棺重榮咄箭唐李傑為河南尹有寡婦告其子不孝傑察其状非不孝者乃謂寡婦曰汝寡居惟一子今罪至死得無悔乎婦曰不順之子寧復惜之傑曰審如是可買棺来取屍因使人視之乃謂一道士曰事了矣俄􅀅棺至傑尚冀其悔而寡婦堅執如初時道士在門外宻令擒之一問承伏曰某與寡婦有􅀻常為兒制故欲除之乃杖殺道士及婦􅁍以棺盛之後晉安重榮鎮恒州有夫妻共訴其子不孝公乃面加詰責抽劒令自殺之其父泣曰不忍也其母詬叱仗劒逐之重榮問之乃繼母也因咄自後射一箭而斃聞者莫不増快蘓請祔柩賈廢追服蘓寀為大理寺詳斷官時有父卒而母嫁後聞母死已葬乃盗其柩而祔于父法當死寀獨曰子盗母柩納於父墓豈可與發冡􅂑財者比請之得减死侍讀賈黯判流内銓時益州推官乗澤在蜀三年不知其父死及代還銓吏不為領文書始去發喪既除服且求磨勘黯言澤與父不通問者三年借非匿喪是豈為孝卒使坐廢田里王珪撰志子産知姦莊遵疑哭鄭子産聞婦人哭使人執而問之果手刃其夫者也御者問曰何以知之子産曰夫人之於所親也有病則憂臨死則懼既死則哀今其夫已死哭不哀而懼是以知其有姦也出獨異志莊遵為楊州刺史廵行部内聞一哭聲懼而不哀駐車問之答曰夫遭火燒死遵疑焉因令吏守之有蝇集於屍首吏乃披髻視之得鐡釘焉因知此婦與姦人共殺其夫也即案其罪思兢詐客佐史誣裴唐則天時或告駙馬崔宣謀反􅃙御史張行岌案之告者先誘宣妾藏之乃云妾􅀅發其謀而宣殺之行岌案而無状則天怒令重劾終無實則天曰不􅀗妾何以自雪行岌乃逼宣家訪妾宣􅂯從弟思兢多置錢帛募之略無􅀁聞而宣家每議事則獄中告者􅂺知思兢疑宣家有同謀者乃詐曰須顧俠客殺告者語了遂侵晨伺於臺側有舘客素為宣所信任乃至臺賂門吏以通告者思兢因罵曰若䧟崔宣必殺汝矣乃引思兢於告者之黨捜􅀗其妻宣始得免唐湖州佐史江琛取刺史裴光製書割取字合成文理詐為徐敬業反書以告及差使推之欵云書是光書語非光語前後三使並不能决則天令差能事人劾之曰張楚金可及劾之仍如前欵楚金憂懣仰卧向䆫日影透窓向日視之其字乃是􅀘葺而作因令琛取書投於水中字字解散琛即扣頭伏罪􅆢􅃙斬之季珪鷄豆張舉猪􅁅宋傳季珪為山隂令有争雞者季珪問雞旦何食一云豆一云粟殺雞破嗉有豆焉遂罰言粟者呉張舉為句章令有妻殺夫因放火燒舍乃詐稱火燒夫死夫家疑之詣官訴妻妻拒而不承舉遂取猪二口一殺之一活之乃積薪燒之察殺者口中無􅁅活者口中有􅁅因驗夫口中無灰以此鞫之妻果伏罪舊不著出處定牧認皮滄州市脯北齊彭城王浟為定州刺史有一人􅀍盗黒牛上有白毛浟乃詐為上府庫皮倍酬其直皮至使牛主認之因􅀗其盗又為滄州刺史日有人從幽州来驢䭾鹿脯至滄州界以足疾行遲偶會一人為伴􅀍盗驢及脯去明旦告州浟乃命左右及府寮散市鹿脯不限其價失主見而識之推􅀗盗者張受越訴裴命急􅄍唐張允濟為武陽令以徳教訓下百姓懐之隣邑元武縣有以㹀牛依其妻家者八九年間孳生十餘牛及將異居妻家不與本縣累政不能决其人乃越界訴於允濟允濟曰爾自有令何至此也其人垂泣不肯去具言􅀁以允濟遂令左右縛牛主布衫􅂪頭將詣其妻家村中捕盗牛賊悉問此村牛􅀁從来妻家不知其故恐􅀍連及乃曰此是女壻家牛允濟令􅀤其蒙謂曰此即女壻當以牛歸之唐裴子雲為衛州新郷令部人王恭戍邊留㹀牛六頭於舅李璡家五年産犢三十頭㳟還索牛李云㹀牛二頭已死只還四頭老㹀㳟訴之子雲送㳟於獄令收追盗牛者李璡璡至子雲叱之曰賊引汝盗牛三十頭藏汝莊禸喚賊共對乃以布衫籠㳟頭立南墻下命璡急􅄍欵云三十頭牛㧾是外甥㹀牛所生實非盗得子雲遣去㳟布衫即令盡還牛􅁍以五頭酬璡辛苦王質母原馬亮悉貸王質待制知廬州有盗殺其黨并其貲而遁邏者得之質抵之死轉運使楊告駮之曰盗殺其徒者死當原質云殺其徒而自首者當原今殺人而取其貲非自首而捕得之原死豈法意乎數上䟽不報降監舒州靈仙觀逾年韓琦知審刑院請盗殺其徒而不首者母得原見本傳尚書馬亮知潭州屬縣有亡命卒剽攻為鄉村患或謀殺之在法當死者四人亮曰能為民除害而反坐以死豈法意耶乃悉貸之鄭克評曰按剽攻之人於法許捕若非名捕者􅂺以謀殺之則慮有誣枉法􅀁不許也能奏聼裁尤為得體云允濟聴葱彭城書菜張允濟為武陽令道逄老母種葱結庵守之因告曰不湏守若遇盗當来訴老母如戒居一􅀫而失葱母以告允濟悉召葱地左右居人使之一一聴其手乃得盗者北齊彭城王浟為滄州刺史有老母種菜数被盗者浟使人宻徃書其葉明日市中認之乃􅀗賊吕婦斷腕包牛割舌吕公綽侍讀知􅄏封府有營婦夫出外有盗夜入舍斷其腕而去都人喧駭公謂非其夫之􅄷不冝快意如此遣􅀐詰其夫果䕶同營韓元者具姦狀伏誅王珪􅀁撰志包副樞初知楊州天長縣時有訴盗割牛舌者拯宻令歸屠其牛而鬻之繼有告其􅀻殺牛者拯詰之曰何為割其家牛舌而又告之其人驚伏見本傳崔黯捜帑張輅行穴唐崔黯鎮湖南有惡少不為鄉里所容乃自髠鉗依佛教為傭􅀠假託焚脩幻誘聾俗積財萬計公􅀄到懼其事露乃投牒請脫鉗歸俗公問曰你教化三年所得㡬何曰旋得旋用不計其數公曰費用造設㡬何曰三千餘貫公曰給者既知納者不記决有􅀮欺乃捜其積蓄有妻孥滿室遂劾其矯妄之咎並以財物施之貧下石晉時魏州冠氏縣華村僧寺有一鐡佛可長丈餘中心且空一旦云佛能言士衆雲集施利填委縣申州府時髙祖鎮鄴莫測其事命衙􅀅尚謙持香􅆢供且驗其事有三傳張輅請與偕行詰其妖狀乃率人圍寺盡遣僧赴道塲輅即潜開僧房見有穴道及入穴行至鐡佛坐下因於空身中厲聲歷數僧過使令擒魁首數人上聞就彼戮之因以輅為長河縣主簿杜鎬毁像次翁戮男杜鎬侍郎之兄仕江南為法官嘗有子毁父􅀞像為所親所訟者疑其法未能决鎬㓜輙曰僧道之毁天尊佛像可以比也兄甚竒之遂用此為斷黄覇字次翁漢宣時為相燕代之間有三男共娶一婦因生一子及欲分離各争其子遂訟於臺請覇斷之覇曰非同人􅁼當以禽獸處之遂戮三男其子還母按荀子云有法者以法行無法者以􅁼舉若夫黄覇戮三男王尊殺假子蓋舉其事之􅁼耳法不禁禽獸聚麀然人殺禽獸無罪則戮之可也傅令鞭絲李惠撃鹽宋傅季珪為山隂令有賣糖賣針者争一絲團訴於縣乃令掛絲於柱鞭之有少鐵屑焉乃罰賣糖者後魏李惠仕為雍州刺史有􅀒塩􅀒薪者争一羊皮各言籍背之物惠謂州吏曰此皮可拷知主群下嘿然惠因令置皮於席上以杖擊之見少許塩屑使争者視之􅀒薪者伏辜楊牧笞巫薛向執賈後魏李崇為楊州刺史有定州流人解思安背役亡歸其兄慶賔規絶名貫乃認城外死屍詐􅁛是弟為蘓顯甫李盖所殺有女巫陽氏託鬼附說思安􅀍害之苦李盖等不勝其楚各自欵服崇疑之乃遣二人偽從外来詣慶賔曰某住在北州有一人夜過􅀉􅀫云是流兵背役人觧思安欲送之官苦求見免且謂有兄慶賔見住楊州君脫矜閔為徃告報湏重相酬今但見質若徃不􅀗送官未晚慶賔悵然失色崇乃攝而問之即自引伏數日間思安亦為人縛至崇笞女巫一百遂釋盖等出北史本傳樞宻薛向􅀄為京兆户曹兼監商稅有賈胡過稅務出銀一篋書其上曰宻使遺涇原都監向曰此决偽也安有大臣餉人物而使賈胡致之執詣府治之果伏其詐吕大防所撰志程戡仇門仲游帥宇程戡宣徽知䖍州民有積為仇者一日諸子私謂其母曰母今老且病恐不得更夀請以母死報仇乃殺其母置于仇人之門而訴之仇不能自明戡疑之或謂無足疑戡曰殺人而自置於門非可疑耶乃親劾治具見本謀王珪􅀁撰志畢仲游為河東提刑丞相韓縝出鎮太原其家奴胡童自陳有卒剽刼其衣服於黄堂之側公怒以付吏􅀅黥配之仲游謂小童衣服尠薄而剽掠於大帥故相之宇下似非人情易吏案治其誣乃辨符融沐枕獄吏滌屨前秦苻融字愽林善斷獄董豊遊學三年而還􅀫妻家是夜妻爲人所殺妻兄疑豊殺之融引問曰汝􅀄無怪與卜問否豊曰夜夢乗馬入一水而北自北而南俯見両日在水中又馬左向濕筮者云憂獄逺二沐避二枕既至妻具沐夜授枕憶筮者言遂不從之妻乃自沐枕枕而寢融曰在易坎爲水爲北离爲馬爲南馬北渡從北而南從坎之离三爻同變离為中女坎為中男馬左向而濕水也左水右馬馮字兩日昌字其馮昌殺之乎遂捕昌詰之昌具服與其妻通期以新沐枕為驗悞中婦人江南大理寺鞫殺人獄未得其實獄吏憂畏乃焚香禱神因夣遇枯河上髙山寤而思曰河無水乃可字山而髙乃嵩字可嵩僧名也崇孝寺有僧名可嵩即白長官攝之訊問未有姦狀忽見屨上有墨汙因問其由云為墨所濺使脫視之乃墨􅂗也僧色動遂滌之即見血痕以此劾之僧乃服見吴淑校理祕閣閑談宗裔卷紬髙防校布王蜀時許宗裔典劔州有扵燈下識認暴客迨暁告吏捕之所􅀵􅂍惟絲絇紬紈失主言是本物其賊不禁拷掠遂誣服因而送州宗裔引慮囚囚言其物乃是家有與失主互争即命取兩家繰絲車又問紬紈卷時各用何物為胎心一云杏核一云瓦子即開示之見杏核仍以絲絇安於車􅤧量其􅤧大小亦是囚家物􅀍刼主受妄認之過廵捕吏伏拷决之辜其枉􅀗雪周世宗時髙防知蔡州部民王義為賊􅀁刼捕得五人繫獄窮治􅂍狀已具􅀅加極刑防復取􅂍閱之召義問􅀁失衫袴是一端布否曰然防令校其幅尺廣狹踈宻不同囚乃稱􅁈問何故服罪曰不任捶楚求速死耳居数日􅀗本賊而五人乃免防歸本朝終於左丞見本傳江分表裏章辨朱墨陵州仁夀縣有里胥洪氏利隣人田紿之曰我爲若稅免若役隣人喜剗其稅歸之名於公上踰二十年且偽爲劵以茶染􅁓􅁼逺年者訟之于縣縣令江某􅀰中取􅁓積伸之曰若逺年􅁓裏當色白今表裏如一偽也訊之果伏江乃衢州開化人今失其名事見李泰伯主簿所撰志侍御章頻知彭州九隴縣時眉州大姓孫延世為偽契奪族人田乆不能辨運使委頻驗治頻曰劵墨浮朱上决先盗用印而後書之既引伏獄未上而其家人復訴於轉運使命知益州華陽縣黄夣松覆案亦無所異黄用此召為監察御史頻乃坐不即具獄降慶州監酒見本傳頻以景祐二年使虜而卒于道胡質集隣髙柔察色魏志胡質字文徳為常州太守東莞盧顯為人􅀁殺求賊未得質曰此士無讐而有少妻所以死耳乃集隣居少年有李若者見質而色動遂窮詰之乃自首伏罪魏護軍營士竇禮出不還營以為沒身其妻盈氏詣廷尉訴髙柔曰爾夫不與人交財乎乃曰甞出錢與同營焦子文因追察之子文色動應對失節於是伏殺禮之罪蔣常覘嫗思彦集兒唐板橋店主張逖妻歸寧有王衛楊正等投店􅀫五更早發夜有人以王衛刀殺逖其刀仍入鞘中正等不之覺至明店人趂正等拔刀血甚狼籍􅀵訊之遂自誣伏上疑之差蔣常覆推到則悉追店人十五以上既集為人數不足且放去止留一嫗日晚放出令典獄者宻覘之云有人共語即記之明日復爾如是三日並是此人常乃追集男女三百餘人就中喚出與嫗語者問之具伏乃是與逖妻有姦而殺之唐韓思彦使并州有賊殺人主名不立醉胡懐刀而汙訊掠已伏思彦疑之晨集童兒凡數百暮乃出之如是者三因問兒出亦有問之者乎皆曰有之即物色其人而訊之於是果􅀗真盗劉相隣證韓參乳醫丞相劉沆知衡州日有大姓尹氏欲買隣人田莫能得隣人老而子㓜乃偽為劵及隣人死即逐其子訟二十年不得直沆至又訴尹氏出積􅀊􅀁収户鈔為驗沆曰若田百頃户鈔豈特􅀵此乎始為劵時甞問隣乎其人固多在可取為證尹不能對遂伏罪按賣田問隣成劵會隣古法也近年有司茍取小快遂改此法未之思歟叅政韓億知洋州時􅁟豪李甲者兄死迫嫁其嫂因誣其子為異姓以專其資嫂歷訴於官甲輙賂吏使掠服之億視舊牘但未曽引乳醫為證一日盡召其黨以乳醫示之衆乃無詞其􅁈遂白袁滋鑄金孫寳秤散唐李汧公鎮鳯翔屬邑有編氓因耨田得馬蹄金一瓮里民送於縣治沿牒􅀅置府庭邑宰恐公藏失守使貯於私庫信􅀫視之乃􅁟塊也以狀聞於府議者僉疑姦人换之遂遣􅁺就案其事宰莫能明即以易金誣服窮其所藏之所或云糞土或云水中以案上聞汧公怒甚俄而有宴語及斯事坐客咸驚時􅀽相國滋亦在幕中獨俛首無語汧公詰之滋曰某疑此事有枉汧公乃俾移其獄於郡命􅀽治之􅀽令閱瓮間得􅁟二百五十餘塊遂於列肆索金鎔成􅁟塊状始及其半已有三百斤詢其􅀄􅀒之人乃二農夫以巨竹舁之計其緫數非二人以竹可轝度其在路之時金已化為􅁟矣於是群情大豁邑宰􅀗伸雪劇談録漢孫寳為京兆尹有賣鐶散者今之鐶餅也於都市與一村民相逄撃落皆碎村民甘認填五十枚賣者堅􅁛三百枚争至太守之前引問無以證明公令别買一枚秤之乃都秤碎者細折分兩賣者乃伏虗誑之罪程簿舊錢王璩故簡程顥察院􅀄爲京兆府鄠縣簿民有借兄之宅居者發地藏錢兄之子訴曰父所藏也令言無證佐何以决之顥曰此易辨耳問兄之子曰爾父藏錢㡬年矣曰二十年遣吏取一千視之謂曰今官所鑄不五六年則徧天下此錢乃爾父未居前數十年所鑄何也其人遂伏伊川􅀁撰行状寺丞王璩甞爲襄州中廬令有賊乆訊不得情偶於賊槖中得故簡而掲示之乃房陵商人道爲賊所掠者賊即引伏王珪所撰志棠隂比事上卷
