front:
  text: 者以正典刑不然横致四無辜於死地啣寃千古咎將誰執萬榮聞之瞿然歛衽因嘆吾夫子三絶韋編特著其議獄緩死之象於中孚而古之君子亦盡心於一成不可變者公其有焉既而東歸参選待次建康犴曹屡省斯事若有隠憂遂於暇日取和魯公父子疑獄集参以開封鄭公折獄龜鑑比事屬詞聫成七十二韻號曰棠隂比事凡與我同志者類能上體厯代欽䘏之意下究諸公編劘之心研精極慮不謂空言則棠隂著明教棘林無夜哭曷勝多禮之幸是用弗嫌於近名擬鋟諸木以廣其傳嵗在重光協洽閏月望日四明桂萬榮序端明改元七月乙夘萬榮以尚右郎䝉恩陞對首奏守一心之正以謹治原次奏懲羣吏之貪以固邦本天威咫尺洊賜襃嘉既而玉音巽發謂朕嘗見卿所編棠隂比事知卿聼訟决能審克萬榮即恭奏臣昨調建康司理右掾待次日久因編此以資見聞豈料天侈其逢誤闗乙覽容臣下殿恭謝既出黄門便有力求此本者鋟梓星江逺莫之致是用重刋流布庶可上廣聖主好生之徳下禆涖官哀矜之志十月既望朝散大夫新除直寳章閣知常徳府桂萬榮謹識欽定四庫全書
