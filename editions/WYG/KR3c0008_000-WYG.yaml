body:
  text: 棠隂比事宋桂萬榮撰明呉訥刪補漢武明經漢景帝時廷尉上囚防年繼母陳殺防年父防年因殺陳依律以殺母大逆論帝疑之武帝時年十二為太子在帝側遂問之對曰夫繼母如母明不及母縁父之故比之於母今繼母無狀手殺其父下手之日母恩絶矣宜與殺人同不宜以大逆論謹按大明律云凡繼母殺其父聽告不在干名犯義之限今觀漢史所云防年繼母殺父因殺繼母宜與殺人同不宜以大逆論竊詳此實倫理之變若比殺常人則故殺者斬若比父母為人殺而子孫擅殺行兇人者杖六十其即殺死者勿論盛世倫理修明固無此事萬一遇此所司當體究的確比擬奏請李傑買棺唐李傑為河南尹有寡婦告子不孝傑察其狀非不孝者乃謂曰汝寡居惟一子今罪至死得無悔乎婦曰不順之子寧復惜之傑曰審如是可買棺來取尸因使人覘之乃謂一道士曰事了矣俄將棺至傑尚兾其悔而寡婦堅執如初時道士在門外宻令擒之一問承服曰某與寡婦有私常為兒制故欲除之乃杖殺道士以棺盛之謹按大明律云父母誣告子孫勿論今觀所載母與所私道士謀誣告其子欲致於死母勿論道士難科教唆之罪萬一遇此當比依謀殺人巳行未曾傷人者杖一百徒三年比擬奏請戴爭異罸唐戴胄為大理少卿時長孫無忌被召不解佩刀入東上閣右僕射封德彞論監門校尉不覺察罪死無忌當贖胄曰校尉與無忌罪均臣子于君父不得稱誤御湯藥飲食舟船誤不如法皆死陛下録無忌功原之可也若罸無忌殺校尉不可謂刑帝曰法為天下公朕安得阿親戚詔復議德彞固執胄駁之曰校尉縁無忌以致罪法當從輕若皆過誤不當獨死由是無忌與校尉皆免死謹按大明律云若罪人自首告及遇赦原免或蒙特恩减罪收贖者亦准罪人原免减等贖罪法注云謂因人連累皆依罪人全免减等收贖今觀唐戴胄所爭長孫無忌事則我朝律文已備載之矣嗚呼至哉曹駁坐妻沈存中内翰云壽州有人殺妻之父母兄弟數口州司以為不道縁坐妻子刑曹駁曰毆妻之父母即是義絶况於謀殺不當復坐其妻存中宋人不書世代後同謹按大明律云殺一家非死罪三人者凌遲處死妻子流二千里入十惡不道之條今觀所載壽州人殺妻之父母兄弟數口刑曹駁以義絶不當縁坐其妻竊詳本犯身為不道殺妻父母兄弟與其妻實已義絶法難縁坐然律無明文所司遇此亦當比擬奏請宗元守辜
