seq: 1
front:
  text: 待制馬宗元少時父麟毆人被繫守辜而傷者死將抵法宗元推所毆時在限外四刻因訴於郡得原父死鄭克云按辜限計日而日以百刻計之死在限外則不坐毆殺之罪而坐毆傷之罪雖止四刻亦在限外
  hash: sha256:ff14411b1cd54630c4dafd0e7dedf82252506dd22ba6224769660a4a13aa77ca
body:
  text: 謹按大明律云几保辜者責令犯人醫治辜限内皆須因傷死者以鬬毆殺人論其在辜限外死者各從本毆傷法若折傷以上辜内醫治平復者各减二等辜限滿日不平復者各依律全科又依唐律云保辜限内死者依殺人論限外死者依本毆傷法又按元史刑法志云保辜限内死者依殺人論限外死者杖一百七盖元時未嘗定律及聖朝未定律之先皆以唐律比擬故我朝律文多宗唐律而此條亦本之也訥曩在南京㑹審刑部罪囚有毆人辜限外死者訥曰當依本毆傷法或曰律云辜限滿不平復者全科此當死訥曰所云限滿不平復全科者因上文折傷以上限内平復减二等立文盖謂辜内雖平復而成殘廢篤疾及限滿不平復者則全科折傷之罪若曰辜限外死者全科死罪則律又何不云傷不平復而死者絞乃虚立此辜限乎後此囚㑹赦得免然或人終不以愚言為然也近讀宗元守辜事有感因備載之讀者詳焉杜亞疑酒唐杜亞鎮維揚有富室子父亡奉繼母不以道因上壽母復子觴子疑有毒覆於地地墳乃謂母以酖殺人母曰天鑒在上何當厚誣訴於府公曰酒從何來曰長婦執爵而致公曰爾婦執爵毒因婦起豈可誣母乃分開鞫之盖子婦同謀害母遂皆伏法張昇窺井張丞相知潤州有婦人夫出不歸忽聞菜園井中有死人即往哭曰吾夫也以聞於官昇命吏集鄰里騐是其夫否皆言井深不可辨昇曰衆不可辨而婦人獨知為夫何耶送獄訊問乃奸夫殺之婦與共謀歐陽左手都官歐陽􅁮知端州有桂陽監民爭舟毆死獄久不决􅁮出囚飲食之皆還於獄獨留一人留者色動􅁮曰殺人者汝也囚不知所以然􅁮曰吾視食者皆以右手汝獨以左今死者傷右肋此汝殺之明騐也囚乃伏罪錢推求奴錢若水為同州推官有富家女奴逃亡父母訴於州録事參軍録參嘗貸富家錢不獲遂劾富民父子共殺女奴投尸於水或為元謀或為加功罪皆應死獄具若水獨疑留而不决州郡上下切怪之録參誣若水受賂若水但笑謝而已旬餘屏人語知州曰某留獄者所以訪求女奴今得之矣知州取入從簾中推出示其父母父母驚曰是已於是富民父子得釋知州欲奏其功固辭不願朝廷聞之驟加進擢向相訪賊丞相向敏中判西京時有僧過村舍求宿不許遂宿門外夜半有人擕一婦人并物踰墻出僧恐天明為主人所執因走去至荒草中誤墮枯井前踰墻婦人已為人殺在其中主人踪跡捕僧送官不勝拷掠遂自誣服但云贓與刀留井旁不知何人持去獄成公獨以贓仗不獲疑之詰問數四僧云前生負此人命無可言者力問之乃以實對於是宻遣吏訪賊吏食於村店有嫗聞其府中來不知是吏因問僧之獄如何吏紿曰昨日已笞死於市嫗曰今若獲賊如何吏云府已誤决不復敢問嫗遂曰賊乃此村少年某也吏詢其處併贓捕獲僧遂得釋程琳烓竈程宣徽知開封府時禁中失火當即根治諸縫人已誣服乃送府具獄琳辨其非是又命工圖火所經處且言後宫人多而居隘其烓竈近版壁久燥而焚此殆天災不可罪人上為寛其獄無死者强至油幕强至祠部為開封府倉曹參軍時禁中露積油幕一夕火主守者皆應死至預聽讞疑火所起召幕工訊之工言製幕須雜他藥相因既久得濕則燔府為上聞仁宗悟曰頃者真宗山陵火起油衣中其事正爾主守者遂比輕典昔晉武庫火張華以為積油所致是也程戡仇門程戡宣徽知處州民有積為仇者一日諸子私謂其母曰母今老且病恐不得更壽請以母死報仇乃殺其母置於仇人之門而訴之仇弗能自明戡疑之或謂無足疑戡曰殺人而自置於門非可疑耶乃親劾治具見本謀莊遵疑哭莊遵為揚州刺史巡行部内聞哭聲懼而不哀駐車問之答曰夫遭火燒死遵疑焉因令吏守之有蠅集尸首吏乃披髻視之得鐡釘焉問知此婦與奸夫共殺其夫按伏其罪妾吏酖宋范忠宣知河中府有知録宋儋年㑹客罷以疾告是夜暴卒盖其妾與小吏為奸公知死不可以理遂付有司案治驗其尸九竅流血囚言置毒鱉胾中公問鱉在苐幾琖豈有中毒而能終席决非情實命再劾之乃因客散置毒酒琖中而死計耳玉素毒郭唐中書舍人郭正一有婢玉素極姝艷正一夜須漿水粥玉素毒之覔婢并金銀器不得勅長安萬年尉石良捕之石良主帥魏昶有䇿略喚舍人少年家奴三人布衫籠頭及縳衛士四人問十日内何人覔舍人家衛士云有投化高麗留書付遣舍人牧馬奴云金城坊中有一空宅更無他語石良往彼處捜之至一宅封鎻甚宻打開婢與化士在其中乃是化士共牧馬奴藏之奉勅斬於東市吕婦斷腕吕公綽侍讀知開封府有營婦夫出外盗夜入舍斷其腕而去都人喧駭公謂非其夫之仇不宜快意如此遣騎詰其夫果獲同營韓元者具奸狀伏誅從事函首惜從事之姓名不傳近有行商回見其妻為人殺而失其首妻族執其婿殺女吏嚴訊之乃自誣服案具郡守委諸從事從事疑之請緩其獄乃令封内仵作行人徧供近與人家安厝墓塜一一詰之有一人曰某近於豪家舉事言死却嬭子五更墻頭舁過凶器輕似無物見葬某處乃發之但獲一女人首即將對尸令其夫認云非妻也繼收豪家鞫言乃是殺一嬭子函首葬之以尸易此良家婦私畜之豪民棄市裴均釋夫唐裴均鎮襄陽日里社妻有外情乃托骨蒸之疾云醫者言得犬肉食之則愈謂其夫曰東鄰有犬每來盗物君可屠之夫依其言獻肉於妻妻食之餘乃留於篋笥夫出命鄰告之遂聞於公夫因述妻之所欲公曰此乃妻有他奸陷夫於禍耳令劾之具得其情併以外情者付法其夫遂釋曹攄明婦晉曹攄為臨淄令日有寡婦養姑甚謹姑以其年少勸令改適婦守節不移姑愍之宻自殺親黨乃誣其婦婦不勝拷訊即自誣服攄初到疑其寃更加辨究具得實情時稱其明崇龜認刀唐劉崇龜鎮南海有富商子泊船江邉有岸上高門家一妙姬殊不避人少年挑之曰昏黄當到宅亦無難色是夕果啓扉待之少年未至有盗入欲行竊姬不知即就之盗謂見執以刀刺之遺刀而逃少年後至踐其血仆地捫之見死者急出解維而去明日其家隨血跡至江岸岸主人云夜有某客船徑發去官差人追到拷掠備至具實吐之惟不招殺人以刀視之乃屠家物府主下令曰某日演武合境庖丁集毬塲宰殺既集復曰已晩留刀於厨明日再至府主以殺人之刀換下一口來早各來請刀獨一屠􅆟後不認其刀因詰之對曰此非某刀乃某人之刀耳命擒之則已竄矣於是以合死之囚代商人之子侵夜斃於市竄者知囚已斃不一二夕歸家遂擒伏法仍杖少年以夜入人家罪魏濤證死魏朝奉濤知沂州永縣兩仇鬬而傷既决遣而傷者死濤求其故而未得死者子訴於監司監司怒有惡語濤歎曰官可奪囚不可殺後得其實乃因其夕罷歸騎及門而墮死鄰證既明其誣遂觧張舉猪灰呉張舉為句章令有妻殺夫因放火燒舍乃詐稱火燒夫死夫之親疑之詣官告妻妻拒而不承舉遂取猪二口一殺一活積薪燒之殺者口中無灰活者口中有灰因驗夫口中無灰妻果伏罪王璩故紙寺丞王璩嘗為襄州中廬令有賊久訊不得情偶於賊囊中得故紙揭示之乃房陵商人道為賊所掠者賊遂服李公驗櫸尚書李南公知長沙縣日有鬬者甲强乙弱各有青赤痕南公以指揑之曰乙真甲偽訊之果然盖南方有櫸栁以葉塗肌則青赤如毆傷者剥其皮横置膚上以火熨之則如棒傷水洗不下但毆傷者血聚則硬偽者不硬耳王臻辨葛王諫議知福州時閩人欲報仇或先食野葛而後鬬即死其家遂誣告之臻問所傷果致命耶吏曰傷不甚也臻疑反訊告者遂得其實穎知子盗郎中歐陽穎知歙州富家有盗啟其藏捕久不獲穎曰勿捕獨召富家二子械付獄劾之即伏吏民初疑不勝楚掠而自誣及取出所盗物乃信孫料兄殺孫長卿知和州民有訴弟為人所殺察其言不情乃問汝户幾等曰上等汝家幾人曰惟一弟與妻子耳長卿曰殺弟者兄也豈將併有其貲乎訊之果服乖崖察額張尚書知江寧有僧呈牒給憑公㨿案熟視久之判司理院勘殺人賊郡寮不曉其故公乃召僧問披剃幾年對曰七年又曰何故額有巾痕即首伏乃一民與僧同行道中殺之以其度牒自剃為僧胡質集鄰魏志胡質為常山太守東筦盧顯為人所殺求賊未得質曰此事無仇而有少妻所以死耳乃集鄰居少年有李若者見質而色動遂窮詰之乃自首伏罪孔察代盗後唐孔相循權涖夷門軍府事長垣縣有四巨盗富有資產及敗則四貧民耳時都虞候姓韓者宻使郭崇韜之僚婿也與椎吏獄典同鍛其欵欵成斷令棄市慮之無言就法之際因屢囘首公疑召問之乃曰實枉且言適為獄吏高其枷尾遂不得言即命移於州獄鞫之自韓已下凡數十人受賂約七千緡併以伏法朱詰賕民朱壽昌知閬州有大姓雍子良殺人乃買里民使出就吏獄具壽昌疑訪因得其情引囚訊之囚對如初乃告之曰吾聞子良遺汝錢十萬納汝女為子婦許嫁其女汝家有之乎因色動又告之曰汝且死書偽劵抑汝女為婢指十萬為僱值而嫁其女他人汝將奈何因泣下始以實告收子良付法左史誣裴唐湖州左史江琛取刺史裴光書割取字合成文理詐為徐敬業反書以告及差使推之欵云書是光書語非光語前後三使並不能决則天令差能事人張楚金劾之仍如前欵楚金憂懣仰卧向忩日影透忩向日視之其書乃是補葺而成因令琛取書投水中字字觧散琛叩頭伏罪奉勅斬之思兢詐客唐則天時或告駙馬崔宣謀反勅御史張行岌按之告者先誘藏宣妾云妾將發其謀宣殺之行岌按而無狀則天曰不獲妾何以自雪宣再從弟思兢多致錢帛募之宣家每議事則獄中告者須知思兢疑宣家有同謀者乃詐曰須僱俠客殺告者語了遂侵晨伺於臺側有館客素為宣信任至臺賂門吏以通告者思兢因罵曰若陷崔宣必殺汝矣乃引思兢於告者之黨搜獲其妾宣始得免江分表裏陵州仁壽縣有里胥洪氏利鄰人田紿之曰我為收若稅免若役鄰人喜剗其稅歸之踰二十年且偽為劵以茶染紙類逺年者訟之於縣縣令江某郎中取紙卷展開視之曰若逺年紙裏當色白今表裏如一偽也訊之果服章辨朱墨侍御史章頻知彭州九隴縣時有眉州大姓孫延世為偽契奪族人田久不能辨運使委頻驗治頻曰券墨浮朱上决先盗用印而後書之既引伏獄未上而其家人復訴於轉運更命知華陽縣黄夢松覆案亦無所異章用是召為御史南公塞鼻尚書李南公為河北提刑時有班行犯罪下獄案之不服閉口不食者百餘日獄吏不敢拷訊南公曰我能立使之食引出問曰吾以一物塞汝鼻汝能終不食乎其人懼即食盖彼善服氣以物塞鼻則氣結不通是以自服包牛割舌包副樞拯初知揚州天長縣有訴盗割牛舌者拯宻令歸屠其牛而鬻之繼有告其私殺牛者拯詰之曰何為割其牛舌而又告之其人驚伏蔣常覘嫗唐板橋店主張逖妻歸寧有王衛楊正等投店宿五更早發夜有人以王衛刀殺逖其刀仍入鞘中正等不知覺至明店人執正等㧞其刀血甚狼藉收訊之遂自誣伏上疑之差蔣常覆推到則悉追店人十五以上既集為人數不足且放去只留一嫗日晩放去令典獄者宻覘之云有人共語即記之明日復爾如是三日並是此人常乃追集男女三百餘人就令喚出與嫗語者問之具服乃是與逖妻有奸而殺之張輅行穴石晉時魏州冠氏縣華村僧寺有一鐡佛長丈餘中心空一旦云佛能言士衆雲集施利填委縣申州府時高祖鎮鄴命牙將尚謙持香奉供且驗其事有三傳張輅請與偕行乃率人圍寺盡遣僧赴道塲輅即潛開僧房見有穴道及入穴行至鐡佛座下因入空身中厲聲歴數僧過擒魁首數人上聞就彼戮之因以輅為長河縣主簿薛向執賈樞宻薛向初為京兆户曹兼監商稅有賈胡過稅務出銀二篋書其上曰宻使遺涇原都監向曰此决偽也安有大人餉人物而使賈胡致之執詣府治之果伏其詐揚牧笞巫後魏李崇為揚州刺史有定州流人觧思安背役亡歸其兄慶賔規絶名貫乃認城外死尸詐稱是弟為蘓顯甫李盖所殺有女巫楊氏托鬼附說思安被害之苦李盖等不勝其楚各自欵服崇疑之乃遣二人偽從外來詣慶賔寄弟口信慶賔悵然失色崇乃攝而問之即自引伏數日間思安亦為人縛至崇笞女巫一百遂釋盖等郎簡校劵侍郎郎簡知竇州有掾吏死子幼贅婿偽為劵取其田後子長屢訴不得直因訴于朝下簡劾治簡以舊案示之曰此爾婦翁書曰然又取偽劵示之甚勿類婿乃伏罪
