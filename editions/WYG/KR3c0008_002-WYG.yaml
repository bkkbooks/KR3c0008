front:
  text: 文成括書唐張鷟為河陽尉有吕元偽作倉督馮忱書盗糶倉粟忱不認而元執之堅張乃取元告狀用紙貼兩頭唯留二字問是汝書曰非乃去貼即是元狀先决五十又貼詐為馮忱書留二字問之乃曰是及去貼乃詐書也元於是伏罪
  hash: sha256:3cd68db40abd8bddd501bcad2ced5d25eca6d148a63d197e00891d18e1e0e644
