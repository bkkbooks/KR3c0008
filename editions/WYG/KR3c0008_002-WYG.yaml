body:
  text: 御史失狀唐李靖為岐州刺史或告其謀反高祖命御史往案之御史知其誣請與告事者偕行行數驛御史詐稱失去原狀驚懼異常乃祈告事者别䟽一狀比驗乃與原狀不同即還以聞高祖大驚告事者伏誅王珣辨印少師王珣知昭州日有誣告偽為州印文書獄久不决吏以印文不類珣索景德舊牘視其印文則無少異誣者乃伏盖其文書乃景德時者方偕主名方偕大卿為御史臺推直官日澧州逃卒與富民有仇誣以嵗殺人十二祭磨駝神獄久不决詔偕就鞫之偕命告人䟽所殺主名尋訪考驗尚多無恙其事遂白至逺憶姓唐李至逺典選疾令史受賕多所黜易吏亦斂手有王忠者被黜放而吏乃謬書士姓欲擬訖增成之至逺曰調者三萬人無士姓者此决王忠也吏伏罪蘓請祔柩蘓寀為大理寺詳斷官時有父卒而母嫁後聞母死已葬乃盗其柩而祔於父法當死宷獨曰子盗母柩納於父墓豈可與發塚取財者比上請得减死賈廢追服侍讀賈黯判流内銓時益州推官乘澤在蜀三年不知其父死及代還銓吏不為入選始去發喪既除服且求磨勘黯曰澤與父不通問者三年借非匿喪是豈為孝卒使坐廢田里程簿舊錢程伯淳察院初為京兆鄠縣簿民有借兄之宅居者發地藏錢兄之子訴曰父所藏也令言無證佐何以决之伯淳曰此易辨耳問兄之子曰爾父所藏錢幾年矣曰四十年彼借宅居幾何時矣曰二十年矣即遣吏取錢十千視之謂借宅者曰今觀所鑄錢不五六年間即徧天下此錢皆爾未借居前所鑄何也其人遂服孫甫舂粟待制孫甫為華州推官日州倉粟惡吏當追陪錢數百萬轉運使李紘以吏屬甫甫乃令取斗米舂之可棄者十纔一二又試之亦然吏遂得弛繫所陪錢纔數十萬而已紘因薦甫遷職孫登比彈呉志孫權長子登嘗出有彈丸飛過令左右求之見一人操彈佩丸咸以為是詞對不伏從者請捶之登不聽使求前所過彈丸比之不類遂釋之傅令鞭絲傅季珪為山隂令有賣糖賣針者争一絲團訴於縣乃令掛絲於壁鞭之有少鐵屑乃罰賣糖者孫亮驗蜜呉孫亮因食梅使黄門索蜜黄門素怨藏吏乃以䑕屎投其中啓言藏吏不謹亮即呼吏吏以蜜瓶入問曰既盖而復油紙覆之無縁有此黄門必有求於爾耳吏叩頭曰彼嘗求貸而臣不與亮曰决為此也乃令破䑕屎亮笑曰若䑕屎先在其中當中外俱濕今内燥乃枉耳於是黄門服罪司空省書漢沛郡民家貲二十餘萬一男纔數歲失其母有一女不賢其父病困呼族人為遺書令悉以財屬女但遺一劍云兒年十五以此付之其後又不與兒乃訟之太守司空何武省其書顧謂掾吏曰女性强梁婿復貪鄙畏害其兒且俾與女實寄之耳夫劍者所以决斷限年十五者度子智力足以自居或聞州縣得以申理其用慮深逺如是乃悉奪財還子商原詐服晉商仲堪為荆州牧有桂陽人王欽生二親久没詐服衰麻言迎父喪府曹擬依律棄市商曰原律以二親生存而横言死没情事悖逆固當棄市今欽生父母已殁特誕妄耳遂免死竇阻免喪唐竇參初為奉元尉男子曹芬兄弟𨽻此軍醉暴其妹父救不止恚赴井死參當兄弟重辟衆請俟免喪參曰父由子死若以喪延是殺父不坐皆殺之次武各驅周宇仲文字次武為趙王屬安固有任杜兩家各失牛後有一牛兩家争之州郡不能决益州長史韓伯携曰宇次武少年聰察可令决之仲文乃令兩家各驅牛羣到放所得牛遂入任氏羣又使人㣲傷之任氏嗟惋杜氏自若杜即服罪薛絹互争漢時有人持縑入市遇雨以縑披覆後一人至求庇廕因與一頭雨霽當别輙互争縑太守薛宣令斷縑各與一半使騎吏聽之一云太守之恩一稱寃不已追問乃伏季珪鷄豆傅季珪為山隂令有争鷄者季珪問鷄早何食一云豆一云粟殺鷄破嗉有豆焉遂罰言粟者宗裔卷紬蜀許宗裔典劍州有於燈下識認刦賊曉告吏捕之所收贓惟繰絲紬卷不禁拷掠遂誣服送州囚言其物乃是家有與失主互争即命取兩家繰絲車又問紬卷各用何物為胎心一云杏核一云瓦子即開視之見杏核仍以絲繩安於車􅤧量其小大亦是囚家物被刼者受妄認之過廵捕吏伏考决之辜其枉遂雪彥超虚盗五代慕容彦超善捕盗為鄆帥曰有庫在州中或以假銀二錠質錢十萬彦超知之使主庫者出榜虚稱被盗失所質銀鋌等物召人緝首不日間果有人來贖銀執之伏罪道讓詐囚後魏高謙之字道讓為河隂令有人囊瓦石作金以詐市馬者因而逃去詔令捕獲謙之乃枷一囚立於馬市宣言詐市馬賊欲刑之宻遣人察市之私議者有人欣然曰無復憂矣遂執訊問悉獲其黨裴命急吐唐裴子雲為新鄉令部民王恭戍邉留牸牛六頭於舅李璡家五年産犢三十頭恭還索牛李云二頭已死只還四頭老牸恭訴之子雲送恭於獄令追盗牛者李璡璡至子雲叱之曰賊引汝盗牛三十頭在汝莊上喚賊共對乃以布衫籠恭頭立南墻下命璡即吐欵乃云三十頭牛總是外甥牸牛所生實非盗得子雲去恭布衫令盡還牛却以五頭酬璡辛苦柳設榜牒周桞慶有胡家被刼莫知賊所鄰人被囚者衆慶謂可以詐求之乃作匿名書多貼官門曰吾等共刼胡家徒侣混雜終恐泄露今欲首伏恐不免誅若聽先首免罪便欲來告慶乃復出免罪之榜居二日廣陵王欣家奴面縛自告榜下因獲黨與甚衆張鷟搜鞍唐張鷟為河陽縣尉有客驢韁斷并鞍失之捕急盗乃夜放驢出而藏其鞍尉遂令客勿秣驢夜放之驢尋向餵飼處去乃令搜其家於積草中得之人服其智濟美鈎篋唐閻濟美鎮江南有舟人載客貨客宻隠銀十錠於貨中舟人潛窺之乃盗而沉於泊舟之所船夜發至鎮所㸃閲不得遂執舟人而訴公曰載人盗物大略皆然乃問昨宿何所曰去此百里浦􅆜中即令武士同往彼處江水中鈎之果得篋銀封署不動舟人服罪崔黯搜帑唐崔黯鎮湖南有惡少不為鄉里所容乃自髠鉗依佛敎假托焚修幻誘愚俗積財萬計公初到懼事露乃投牒請脫鉗歸俗公問曰爾教化三年所得㡬何曰旋得旋用公曰費用造設幾何曰三千餘貫公曰給者既知納者不記决有隠欺乃搜其積蓄有妻孥滿室遂劾其矯妄之罪以財物施之貧下楊津獲絹周楊津為岐州刺史有武功人齎絹三百匹去城十里為賊所刼時有使者馳騎而至被刼人告之使者到州以狀白之乃下敎曰有人着某色衣乗某色馬在城東十里被殺若有家人可速來告有一老母行哭而至云是己子於是收捕并絹俱獲袁滋鑄金唐李汧公鎮鳳翔屬邑有編氓耕田得馬蹄金一甕送於縣將送於州邑宰恐公藏失守貯於私庫信宿視之乃土塊也以狀聞於府議者僉疑換之遂遣掾案其事宰莫能明即以易金誣服窮其所藏或云糞土或云水中汧公甚怒而公宴語其事時袁相國滋在幕中獨俯首無語汧公詰之滋曰某甚疑此事有枉汧公乃俾移其獄於郡命袁治之袁令閲甕間得土二百五十餘塊遂於列肆索金鎔成土塊狀始及其半已有三百斤詢其初乃二農夫以巨竹舁之計其數非二人以竹可舁度在路已化為土矣羣情太豁邑宰獲伸孫寳秤饊漢孫寳為京兆尹有賣鐶饊者今之鐶餅也於都市與一村民相逢擊落皆碎村民陪認五十枚賣者堅稱三百枚爭至無以證明公命别買一枚秤之乃都稱碎者紐折分兩賣者乃服韋臯劾財唐韋臯鎮劒南日有逆旅停止大賈因病而酖之隠沒其財公知之又有北客蘓延得病而卒公使驗其簿籍已被店主易置公乃㝷究經過宻勘於里屬詞多不同遂劾同店者店主乃認隠欺數千貫與吏二十餘人分之悉皆得罪由是劒南無横死之客元膺擒轝唐吕元膺鎮岳陽因出㳺見有喪轝駐道左男子五人衰服而隨公曰逺葬則侈近葬則省此决奸計也因令捜索之棺中皆兵刃曰欲謀過江掠貨假喪使渡者不疑耳公令劾之更有同黨數十已期集彼岸併擒付法劉相鄰證丞相劉沆知衡州日有大姓尹氏欲買鄰人田莫能得鄰人老而子幼乃偽為劵及鄰人死即逐其子訟二十年不得直沆至又訴尹氏出積歲户鈔為證沆曰若田百頃户鈔豈特收此乎始為劵時嘗問鄰乎其人多在可取為證尹不能對遂伏罪韓參乳醫參政韓億知揚州時土豪李甲者兄死迫嫁其嫂因誣其子為異姓以專其貲嫂歴訴於官甲輒賂吏使掠服之億視舊牘未曾引乳醫為證一日盡召其黨以乳醫視之衆乃無詞其寃遂白桞寃瘖奴唐桞渾為江西察判時僧有夜飲火其廬者歸罪瘖奴軍候受財不詰獄具渾與其僚崔祐甫白奴寃於觀察使魏少㳺促訊其僧僧乃首伏王扣狂嫗大理王罕知鄆州時有狂嫗數邀訴事言無倫理從騎屏逐之罕令引歸㕔事叩堦徐問嫗雖言語雜亂然時有可采者乃是人之嫡妻無子其妾有子夫死為妾所逐累訴不直因恚而狂罕為直其事盡以家貲與之䖍俲思賢沈括筆談云江南人好訟有一書名鄧思賢者作偽詞狀法也始教以侮文侮文不可得則欺誣以取之欺誣不可得則求其罪以劾之鄧思賢人名也始傳此術遂名其書村校中往往授生徒韓琚通判䖍州民有偽作寃狀悲憤叫呼似若可信琚攝郡究其風俗考其枉直莫之能欺民皆以為不寃琚魏公之兄終於轉運使按虔州今之贑州府也括熙寧中任知制誥去今四百年矣世道日漓刁民偽為寃狀以陷人者在在有焉貧弱有寃無處訴告者亦無地無焉受人財為人揑造寃苦詞情若鄧思賢者亦有之焉易訟卦彖曰利見大人言訟者求辨曲直利見剛明中正之大人以决其所訟也康誥曰如保赤子言赤子未能言為父母者誠心求之則能得其心之所欲矣今之任民牧者民呼為父母居顯要者人呼為大人其可不思盡其心稱其名以上無負聖天子之委任下無負斯民之仰望乎孝肅杖吏包拯知開封有犯杖脊徒罪者吏受財與之約曰今見尹須使我責狀汝但號呼自辨我當與汝分罪各受杖决既而引責囚如吏言分辨不已吏入大聲呼之曰但受脊杖出去拯謂其招權捽吏杖之特寛囚罪亦令從杖公知以此折吏勢不知乃為所賣弄也按元魯齋許文正公告世祖防欺之要備載是事且曰孝肅剛嚴峭直而卒為吏所賣盖在上者難於知下欲其不見欺也難矣今考孝肅由進士除大理評事出知建昌天長二縣拜監察御史歴三司判官改工部員外直集賢院出知端瀛揚廬池五州四為京東陜西河北轉運使遷三司副使天章閣待制知諫院陞龍圖閣直學士知江寧府由江寧召拜京尹歴練不為不深聲望不為不重資稟不為不高然為吏人所賣若此况初學古入官之士乎桂氏載於篇中而愚特取以終編者盖欲讀者知所警也噫棠隂比事欽定四庫全書棠隂比事附録袁安别繫所見既真必有此力量始可也推之庶政皆冝若是袁安永平中守楚郡時楚王英謀逆詞連繫者數千人安到郡不入府先案獄理其無明驗者條上出之府丞掾吏皆爭以為阿附反虜法與同罪安曰如有不合太守自當不以相及也遂分别具奏明帝感悟即報許得出者四百餘家高柔察色此正聽五詞之一騐也惟虚心以待之則情狀可見高柔遷廷尉䕶軍營士竇禮近出不還營以為亡表言沒其妻盈及男女為官奴婢盈稱寃自訟乃詣廷尉柔問曰汝何以知夫不亡盈泣曰夫少單特養一老嫗為母又哀兒女撫字不離非是輕狡不顧室家者柔重問曰汝夫無仇乎對曰夫良善與人無仇又曰汝夫不與人交財乎對曰嘗出錢與同營士焦子文久求不得時子文適坐事繫獄柔乃見子文問所坐言次曰汝曾舉人錢否子文曰單貧初不敢舉人物也柔察子文色動遂曰汝適舉竇禮錢何言不舉邪子文怪事露應對不及柔曰汝已殺禮宜早服子文於是叩頭具道本末柔遣吏卒承子文詞掘得尸詔書復盈母子為平民抵子文罪崔公仁恕必養得此等志量然後可决大獄臨大事唐崔仁師貞觀初遷殿中侍御史時青州有男子謀逆有司捕支黨纍係填獄詔仁師覆按始至悉去囚械為具食飲以情訊之坐止魁惡十餘人他悉原縱大理少卿孫伏伽謂曰原雪者衆誰肯讓死就决而事變奈何仁師曰治獄主仁恕豈有知枉不申為身謀哉吾以一介易十囚命固願也及勅使覆訊諸囚咸叩頭曰崔公仁恕無枉者舉無異詞由是知名李嶠列枉此等胸襟亦不可不預養李嶠髙宗時為給事中㑹來俊臣搆狄仁傑李嗣真裴宣禮等獄將抵死勅嶠與大理少卿張德裕侍御史劉憲覆驗德裕等内知其寃不敢異嶠曰知其枉不申是為見義不為者卒列其枉狀唐臨不寃如此治獄固季路之儔也真可為法唐臨高宗時按獄交州出寃繫三千人遷大理卿帝嘗録囚臨占對無不盡帝喜曰國之要在用法刻則人殘寛則失有罪惟是折中以稱朕意他日復訊餘司斷者輒紛訴不服獨臨所訊無一言帝問故答曰唐卿斷囚不寃所以絶意帝嘆曰為獄者固當若是乃自述其考曰形如死灰心若鐡石云真卿感雨雨否固在天然由此觀之其辨獄必能平允固冝師其辨不必其雨顔真卿𤣥宗時再遷監察御史使河隴時五原有寃獄久不决天且旱真卿辨獄而雨郡人呼御史雨崔碣霽潦霽􅕙之事與雨相似崔公之明自是當傳也崔碣為河南尹邑有大賈王可久轉貨江湖間值龎勛亂盡亡其貲不得歸妻詣卜者楊乾夫咨存亡乾夫悦其色且利其富既占陽驚曰乃夫殆不還矣隂以百金謝媒者誘聘之妻乃嫁乾夫遂為富人及徐州平可久困甚丐衣食歸閭里往見妻乾夫大怒訽逐之妻詣吏自言乾夫厚納賄可久反得罪再訴復坐誣可久恨歎失明碣至可久陳寃碣得其情即勅吏掩乾夫并前獄吏悉發賕奸殺之以妻還可久時淫潦獄决而霽陳襄捫鐘此事亦人所共傳雖未可為常然仿此推類用心亦詰奸之一助也陳襄調浦城主簿攝令事民有失物者賊曹捕偷兒至襄語曰某廟鐘能辨盗犯者捫之輒有聲餘則否乃遣吏先引以行自率同列詣鐘闕隂塗以墨而以帷蔽之命羣盗往捫少焉呼出獨一人手無所汚扣之乃為盗者劉敞察寃辨析於似是之問非至明其孰能之劉敞知揚州天長縣鞫王甲殺人既具獄敞見而察其寃甲畏吏不敢自直敞以委尸曹杜誘誘不能平反而傅致益牢將論囚敞曰寃也親按問之甲知敞為己直乃敢告盖殺人者富人陳氏也相傳以為神明吕陶服罪天理之在人心固未嘗泯也然吕公必能心誠論之自是感發也吕陶調銅梁令民龎氏姊妹三人冒隠幼弟田弟壯訴官不得直貧至傭奴於人及是又訴陶一問三人服罪弟泣拜願以田半作佛事以報陶曉之曰三姊皆汝同氣方汝幼時適為汝主之爾不然亦為他人所欺與其捐半供佛曷若遺姊復為兄弟顧不美乎弟又拜而聽命濂溪悟酷此事已載各史夫人皆知之今贅録誠慕其胸次之正未易及也周濓溪為分寧主簿有獄久不决濓溪至一訊立辨邑人驚曰老吏不如也部使者薦之調南安軍司理參軍有囚法不當死轉運使王逵欲湥治之逵酷悍吏也衆莫與爭濓溪獨與之辨不聽乃委手版歸將棄官去曰如此尚可仕乎殺人以媚人吾不為也逵悟囚得免張洽服盗此等事固所願學也而不可及誠以動物張公亦庶幾乎張洽嘉定元年改袁州司理參軍有大囚訊之則服㝷復變異且力能動摇官吏累年不决而逮繫者甚衆洽以白提㸃刑獄殺之有盗黠甚詞不能折㑹獄有兄弟爭財者洽諭之曰訟於官祗為胥吏之地且冐法以求勝孰與各守分以全手足之愛乎詞氣懇切訟者感悟盗聞之自伏罪哈雅釋孝此亦恒有之如此試騐亦易然其事可為人子勸也元布嚕哈雅太宗時拜燕南諸路廉訪使未幾授斷事官使職如故有民誤毆人死吏論以重法其子號泣請代死布嚕哈雅戒吏使擒於市懼則殺之既而不懼乃曰誤毆人死情有可宥子而能孝義無可誅遂并釋之使出銀以資葬埋且呼死者家諭之其人悦從德輝察寃此事亦世所有頋主刑者用心何如耳李德輝世祖時為右三部尚書録囚山西河東懐仁民有魏氏發得木偶持告其妻挾左道為厭勝謀不利於已移數獄詞皆具德輝察其寃知其有愛妾疑妾所為將搆陷其妻也召妾鞫之不移時而服遂杖其夫而論妾以死田滋得稿此事雖不可為常法然可見田公之用心也主刑者恒存此心庶幾公平也夫田滋為浙西廉訪使有縣尹張或者被誣以贓獄成滋審之但俯首泣而不語滋以為疑明日齋沐詣城隍祠禱曰張或坐事有寃伏願神明其誣守廟道士進曰曩有王成等五人同持誓狀到祠焚禱火未盡而去之燼中得其遺稿今藏於壁間豈其人耶視之果然明日詣憲司詰成等不服因出所得火中誓狀示之皆驚伏罪張或得釋澤民訊僧此非用心切至者不能有官君子庸可少忽乎汪澤民同知岳州事州民李氏以貲雄其弟死妻誓不他適兄利其財嗾族人誣婦以奸事獄成而澤民至察知其枉為直之及為平江府推官有僧淨廣與他僧有憾久絶往來一日邀廣飲廣弟子急欲得師財且苦其捶楚潛往他僧所殺之明日訴官他僧不勝拷掠乃誣服三經審録詞無異結案待决澤民取行兇刀視之刀上有鐡工姓名召工問之乃其弟子刀也一訊吐實即械之而出他僧罪清獻原情理法只在目前趙公能發明之趙清獻公抃景祐中為武安推官有偽造印者吏以為當死公獨曰造在赦前用在赦後赦前不用赦後不造法皆不死遂以疑讞之卒免死承議持平鄭公此事似若易及然非秉心之公不能紹興間鄭承議為蕭山丞有朱統制在縣牧馬侵西興鹽塲草鹽司申請於朝降榜許人格捕其卒打草如故為鹽停尸殺傷四人統制謀曰若不得西興草則馬不可牧矣乃醵金囑案吏作鬬殺停户八人皆抵死案成知縣簽訖次及承議曰黄榜許人格捕今若作鬭殺是本縣先自拒榜狀不得書我名銜吏皇恐謝罪易作拒捕結斷停户八人止得杖放歸日拜天曰願鄭公子孫益昌後公二子預薦登第云提舉辨明明慎如楊公可不儀式乎宋提舉楊某為越録事參軍其守治盗嚴凡保内捕賊不獲則被盗物責保長償之有一人家被盗持杖追擊仆地執送保長保長苦之乃即械繫觧官間盗死郡因治保長制死獄具後公閲狀云左肋下致命一痕長寸二分中有白路必背後追擊是其死非因保長制縛也獄吏爭案已成公不聽即追詰原捕賊者果得其情索致杖首有裂證益明迺引法止坐保長杖罪免死陳睦酷報睦事未可謂無録之為酷吏儆宋陳睦嘗提㸃兩浙刑獄㑹杭民有妾沉香者浣衣井旁嫡子墮井死妻訟於州以為必沉香擠之三易獄不合睦怒逐掾殺沉香東坡詩殺人無驗終不快此恨終身恐難了盖有激云睦還京久之無所授禱於廟無應後恍聞人云如沉香何睦震汗廢食累日而卒安禮神明王公固明敏然非用心何以能此王安禮知開封邏者得匿告人不軌書上命治之驗所指略問後加二人有薛姓者安禮曰得之矣召薛曰若仇乎曰有售筆者固拒之怏怏而去乃即命捕訊果得所為梟其首人稱為神文原雨旱鄧公蓋明達者邪辨析之精可為法也鄧文原僉浙西廉訪司事呉興民夜歸巡邏者執之繫亭下其人遁去有追及之者刺其脇仆地明旦家人得之以歸比死其兄問殺汝者何人曰白袍青衣長身者也其兄訴於官有司問直初更者曰張福兒執之使服焉械繫三年文原録之曰福兒身不滿六尺未見其長也刀傷右脇而福兒素用右手傷宜在左何右也鞫之果得真殺人者遂釋福兒桐廬人戴汝惟家被盗有司得盗獄成送郡夜有焚戴氏廬者而不知汝惟之所之文原曰此必有故也乃得其妻葉氏與其弟謀殺汝惟狀而於水涯樹下得尸與漬血斧俱在焉人以為神及移江東道徽州民謝蘭家僮汪姓者死蘭姪囘賂汪族人誣蘭殺之蘭誣服文原録之得其情釋蘭而坐囘時久旱獄决乃雨師泰折獄貢公亦善於推鞫矣詞雖煩而事可取敢併録之貢師泰為紹興路推官山隂白洋港有大船飄近岸史甲二十人適取鹵海濵見其無主因取其篙櫓而船中有二死人有徐乙者怪其無物而有死人以為史等所刼首官史既誣服師泰宻詢之則里中沈丁載物抵杭而囘漁者張網海中因盗網中魚為漁者所殺寃皆白又有㳺徼徐裕以巡鹽為名肆掠村落間一日遇諸暨商奪其錢撲殺之投尸於水走告縣曰我獲私鹽犯人畏罪赴水死矣官驗視以有傷疑之遂以疑獄釋師泰追訊覆按之具得裕所以殺人狀又餘姚孫國賔獲姚甲造偽鈔受賕而釋之執高乙魯丙赴有司誣以同造偽鈔高嘗為姚行用實非自造而魯與孫有隙故并連之師泰疑高等覆造不合以孫詰之詞屈而情見即釋魯而加高以本罪姚遂處死孫亦就法易貴辨紙國朝易貴成化間守辰州府有窶人担紙息肩路旁倦而寐熟盗去訴於貴即使人抬失紙處一石到府階下杖焉擁入觀者如市閉門量罰觀者以資窶人復詰曰汝紙有誌乎曰有遂俾住在外數日出公牘汎買諸賈人紙彼送至令各書名於上乃召窶人認之果得原紙因追究盗紙人伏罪彭祥還貲郭彭祥𢎞治間守眉州問刑明决鄰封合州有兄弟二人兄宦别省其貲每託弟携歸置産契劵俱弟收掌兄卒於官嫂扶櫬歸弟絶無所與又無籍可稽嫂訴於州訊不服乃越境訴於郭郭即隠告者取獄中賊指攀其弟與盗同夥移文本州械致詰曰汝與某人為盗致富其弟泣曰吾兄仕宦所得未嘗盗也固詰之詞甚詳一一録記乃速其嫂語之弟遂服還貲産筠守釋誣𢎞治末稽察江郡帑藏及筠筠守周君津貳王君珀銳志治盗義民廖顯六素効巡捕劇盗甘乾八報復焚掠廖殺之二君益追治逮捕一惡少怡然就獄云與某村某某等隨甘行兇衆將信之察曰死地人所苦也彼甘就焉容非其情可稍須之倘得訊醜參鞫未晚後兩月馳報曰子言是也向惡少嘗行竊數為某某窘辱因亡身攀誣今獲真盗辨釋矣觀此聽訟者可以躁心乗之哉梅妻逆夫有王梅者好酒其妻不潔圖去梅以快所私梅與族叔鍇素仇相絶歲鄉人社㑹梅家醉散入夜梅忽死於碎甕間鍇乍聞惻隠往視亟還妻懼鍇或訐發謀所私者誣鍇挾仇乗梅醉跌未死往殺之有司逮至訊鞫凡刑加梅妻輙毁加鍇乃無毁焉疑其妻寃益拷鍇不勝遂誣服㝷上官讞改鍇戍邉遇雷雨必焚香籲天後梅妻頸生惡瘡三呻吟苦楚以死所私者亦别麗重典盖妻故碎甕擠梅於上刃其頸三擬詭稱醉跌觸甕死適鍇往視以其仇誣之則易信且㓕所忌也刑具則所私賂吏卒夾棍等鐡異新故索異麻草堅韌朽脆相懸絶用惑有司云夫情偽㣲曖其變千狀奸惡不足異也明慎可少忽耶若夫天人之際亦嚴矣
