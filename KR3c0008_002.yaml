front:
  text: 棠隂比事卷下
  hash: sha256:cbe56b76f7b8e3bfd02e27c2b5db7376c730710ba73ff3399580df320810efc4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3c0008_SBCK_002-1a}
body:
  text: 宋桂萬榮編次公綽破柩元膺擒轝栁氏叙訓云栁公綽為襄陽節度使歲儉隣境尤甚有齊衰者哭且獻狀曰遷三世十二喪于武昌為津吏所遏公綽即命軍候擒其人破其柩皆實以稻米蓋葬於歉歲不應併舉三世十二䘮故知其詐耳唐吕元膺字景夫鎮岳陽日因出游賞見有䘮轝駐道左男子五人衰服而隨公曰逺葬則汰近葬則省此决姦黨為詐也因令左右搜索之棺中皆兵刃乃曰欲謀過江掠貨假喪使渡我者不疑耳公令劾之更有同黨數十已期集於彼岸併擒以付法栁冤瘖奴王扣狂嫗栁渾為江西觀察使判官僧有夜飲火其廬者歸罪瘖奴軍侯受財不詰獄具渾與其僚崔祐甫白奴冤於觀察使魏少游趣訊其僧僧乃首伏見本傳大卿王罕知潭州時有狂嫗數邀知州訴事言無倫理從騎多屏逐之罕乃令引歸聽事叩堦徐問嫗雖言語雜亂然時有可采者乃其始為人嫡妻無子其妾有子夫死為妾所逐累訴不直因恚而狂罕為直其事盡以家貲與之見涑水記聞李公驗櫸王臻辨葛尚書李南公知長沙縣日有闘者甲強乙弱各有青赤痕南公以指揑之曰乙真而甲偽訊之果然蓋南方有櫸柳以葉塗肌則青赤如毆傷者剥其皮横置膚上以火熨之則如棓傷水洗不下但毆傷者血聚則硬而偽者不然耳聞之士林王諌議知福州時閩人欲報仇或先食野葛而後闘即死其家遂誣告之臻問所傷果致命耶吏曰傷無甚也臻以為疑反訊告者乃得其實頴知子盗孫料兄殺郎中歐陽頴知歙州冨家有盗啓其藏捕乆不獲頴曰勿捕獨召冨家二子械付獄劾之即伏吏民𥘉疑不勝楚掠而自誣及取其所盗物乃信孫長卿知和州民有訴弟為人所殺察其言不情乃問汝户㡬等曰上等汝家幾人曰惟一弟與妻子耳長卿曰殺弟者兄也豈将併有其資乎訊之果然見王珪所撰志鄭躬明誤希亮救亡後漢鄭躬以郡吏辟公府時有兄弟共殺人者而罪未有所歸明帝以兄不訓弟故報兄重而减弟死中常侍孫章宣詔誤言兩報重尚書奏章矯制罪當腰斬帝以躬明法律召入問之躬對章應罰金帝曰章矯詔殺人何謂罸金躬曰法令有故誤章傳命之謬於事為誤誤者其文則輕帝曰囚與章同縣疑其故也躬曰周道如砥其直如矢君子不逆詐帝王法天刑不可委曲生意帝稱善遷躬廷尉正出躬本傳鄭克評曰按深文峻法務為苛刻者皆委曲生意而然也君子不逆詐蓋惡其末流决至於此爾傳稱躬之典理官也决獄斷刑依於矜恕故世傳法律而子孫至公者一人廷尉七人侯者三人二千石侍中郎將者三十餘人侍御史正監平者甚衆積善之慶不其盛歟陳希亮大卿為開封府司録時有青州男子趙宇上言元昊决反坐責為文學參軍福州安置明年果反宇自訟而所部不受亡至京師執政令劾以在官無故去法希亮奏乞以宇所上封事付有司即其言驗不當加責由是得釋見本傳商原詐服竇阻免䘮晉商仲堪為荆州牧有桂陽人黄欽生二親乆沒詐服縗麻言迎父喪府曹依律棄市商曰原此㫖當以二親生存而横言死沒情事悖逆所不忍言固當棄市今欽生父母終沒此特誕妄之過遂免死唐竇參𥘉為奉先尉男子曹芬兄弟隷北軍醉暴其妹父救不止恚赴井死參當兄弟重辟衆請俟免䘮參曰父由子死若以䘮延是殺父不坐皆搒殺之出唐書本傳鄭克評曰按唐制縣令許决死罪參為尉時殆攝行令事歟北軍之衆屯於奉先請爲其父持䘮以綬其刑蓋欲賂中官以倖免耳參駮正其說而亟决之乃爲此也薛絹互争符盗並走漢時有人持縑入市遇雨以縑披覆後一人至求庇廕因與一頭雨霽當别輒互争縑太守薛宣令斷縑各與一半使騎吏追聴之一云貢君之恩宣字貢月一稱冤不已宣知其狀追問乃伏出風俗通冀州有老母遇刼唱盗行人爲母逐擒之盗反誣行人争至郡符融曰二人並走先出鳯陽門者非盗既還符正色謂後至者曰汝真盗也其意以為盗若善走决不為行人所獲以此測之則知善走者是捕逐之人蕭儼震牛懐武用狗南唐昇元格盗及三緡者死吉之豪民暴衣失衾直數十千指隣為盗不勝楚掠隣自誣服詰其贓物即云散鬻於市無從追究赴法之日冤聲動人長史以聞先主命員外郎蕭儼覆之儼齋戒禱神佇雪冤枉到郡之日晴天忽雨雷撃失主一牛洎剖腹而得所失物蓋噉而猶未消潰出鄭文寳南唐近事王蜀時有蕭懐武者主㝷事團乃軍廵之職也所管百餘人毎人各飬私名十餘軰呼之曰狗深坊曲巷馬醫酒保乞丐傭作販賣童兒皆有其徒民間偶語公私動静即時聞逹於是人心恐懼自疑肘腋悉其狗也懐武殺人不可勝數郭崇韜入蜀乃族誅之是使察姦慝而反為姦慝者也見成都古今記文成括書郎簡校劵唐張鷟為河陽尉有吕元偽作倉督馮忱書盗糶倉粟忱不認而元執之堅張乃取元告牒括兩頭惟留一字問是汝書元曰非去括即是元牒先决五十又括詐為馮忱書内工字以問之乃曰是及去括即詐書也元於是服罪侍郎郎簡知竇州有掾吏死子㓜贅壻偽為劵取其田後子長屢訴不得直因訴于朝下簡劾治簡以舊案示之曰此爾婦翁書耶曰然又取偽劵示之弗類壻乃伏罪孝肅杖吏周相收掾包拯知開封日有犯徒者吏受賕與之約曰令見尹湏使我責狀汝第號呼自辨我當與汝分罪各受杖决既而引責囚如吏言分辨不已吏大聲訶之曰但受脊杖去拯謂其招權捽吏杖之特寛囚罪亦令從杖公知以此折吏勢不知乃為所賣也見沈括筆談後漢周䊸字文通為召陵侯相廷掾憚䊸嚴明欲損其威乃晨取道旁死人斷手足立於寺門䊸聞便徃至死人邉若與死人共笑語狀隂察視口眼中有稻芒乃宻問守門者曰誰載藁人城對曰唯有廷掾耳又問鈴下曰外頗有疑吾與死人共笑語者否對曰廷掾疑君乃收廷掾訊之具服方偕主名宋文墨迹方偕大卿為御史臺推直官曰澧州逃卒與冨民有仇誣以歲殺人十二祭磨駞神獄乆不决詔偕就鞫之偕命告人䟽所殺主名㝷訪考驗尚多無恙其事遂白見天聖名臣傳宋元嘉二十二年孔熈先與徐湛之許耀謝綜范曄謀立彭城王義康湛之上表告狀詔收綜等並欵服唯曄不首頻詔窮治乃言熈先茍誣引臣文帝令以曄所造及改定符檄墨迹示之乃服罪出南史范泰傳陳議捍取胡争竊食陳奉古主客通判具州時有卒執盗者其母欲前取盗卒拒不與仆之地明日死以卒屬吏論為棄市奉古議曰主盗有亡失法今人取之法當得捍捍而死乃以闘論是守者不得主盗也殘一不辜而為剽奪生事法非是因以聞報至杖卒人稱服之胡向少卿𥘉為袁州司理有人竊食而主者撃殺之郡論以死向争之曰法當杖郡将不聴至請于朝乃如向議見吕大防撰志鄭克評曰以名分言之則𬒳擊者竊食之盗也擊之者典食之主也以情理言之則與常人相毆異矣登時擊殺罪不至死可也然湏撃者本無殺意邂逅致死乃坐杖罪或用刃或絶時或殘毁則是意在於殺法所不許也又當原其情理豈可一㮣科斷盡心君子亦冝察焉御史失状國淵求牋唐李靖為岐州刺史或告其謀反者髙祖命一御史徃案之御史知誣罔請與告事者偕行行數驛佯云失告狀驚懼異常乃祈告事者别䟽一狀驗之乃與元狀不同即還以聞髙祖大驚告事者反伏誅失御史名魏國淵字子尼為魏郡太守有投書誹謗者太祖疾之欲知其主淵請留其書而不宣露其書多引二京賦淵乃勅功曹曰此郡少學問者欲令就師求能者與受業因令作牋比方其書有似謗誹者取問伏罪偉冐范祚䖍傚鄧賢劉敞侍讀知永興軍時大姓范偉冐武功令祚為祖乃穿祚墓以已祖母袝之一規避徭役者五十年數犯法至徒流輒以贖免長安人甚患苦之然吏莫敢誰何敞按其事獄未具而召由是辭屢變證逮數百人獄連年不决詔取付御史臺驗治卒如敞所發見本傳沈括筆談云江南人好訟有一書名鄧思賢皆訟牒法也其始則教以侮文侮文不可得則欺誣以取之欺誣不可得則求其罪以刼之鄧思賢人名也始傳此術遂名其書凡村校中徃徃以此授生徒韓琚司封通判䖍州日民有偽作冤狀悲憤呌呼似若可信者琚偶攝郡究其風俗考其枉直其下莫之能欺辭伏者皆自以為不冤琚乃魏公琦之兄也終於兩浙轉運使尹洙所撰墓志次武各驅憲之俱解周于仲文字次武為趙王屬安固太守有任杜兩家各失牛後得一牛兩家争之州郡不能决益州長史韓伯携曰于安固少年聴察可令决之仲文乃令両家各驅牛群到及放所得一牛遂入任氏群又使人㣲傷之任氏嗟惋杜氏自若杜即伏罪南梁顧憲之為建康令有失牛者盗與主俱認之不能制令乃令解牛任其所之牛歸本主所居盗者始伏其罪出南史顧愷之傳憲之其孫也張昪窺井蔡髙宿海張丞相知潤州有婦人夫出數日不歸忽聞菜園井中有死人即徃哭之曰吾夫也以聞於官昪命属吏集隣里就驗是其夫否皆言井深不可辨昪曰衆不能辨而婦人獨知其為夫何耶收付所司訊問乃姦人殺之而婦人與聞其謀也沈氏筆談蔡髙為福州長溪縣尉有媪二子漁于海而亡媪指某氏為仇告縣捕賊吏難之曰海有風波安知果為仇所殺若不得屍於法不可理髙乃隂察仇家得其迹與媪約曰期十日不得屍則為媪受捕賊之責凡宿海上十日潮浮二屍到驗之皆殺也乃捕仇家鞫之而服法髙乃襄之弟事見歐公所撰志劉湜焚屍髙防劾病劉待制𥘉知耀州冨平縣有盗掠人子女者既擒獲輒詐死伺間即逸去再捕得復然湜令焚之見本傳鄭克評曰埋而使人守之足矣雖不焚可也防𥘉事周為刑部郎中宿州有民剚刃其妻而妻族受賂奪州言病風狂不語並不孝掠以具獄上請大理斷令决杖防覆之云某人病風不語醫工未有驗狀憑何取證便坐杖刑况禁繫旬月豈不呼索飲食再劾其事湏見太情周相然之終寘於法王鍔匿名至逺憶姓唐王鍔為淮南節度使有遺匿名書于前者左右取以授鍔鍔納之靴中先以他書雜之使退鍔探取他書焚之人謂其皆焚之矣既而歸省所告異日以他事連所告者禁繫按驗以譎其衆號稱神明云唐李至逺典選疾令史受賕多所黜易吏亦歛手有王忠者𬒳放而吏乃謬書士姓欲擬訖増成之至逺曰調者三萬人無士姓者此决王忠也吏叩頭伏罪見唐書李素立傳至逺其孫也希崇並付齊賢兩易晉張希崇鎮邠州日有民為郭氏義子自孩提以至成人因戾不受訓遣之郭氏夫婦將死有適子已長郭氏諸親與義子私約以為親子欲分其財而訟之數政不决希崇覧其訴斷曰父在已離母死不到雖稱假子辜二十年撫飬之恩倘曰親兒犯三千條悖逆之罪頗為傷害名教安敢理認田園其生産並付親子張丞相在中書有戚里争分不均又因入官訴于上前更十餘斷不伏齊賢曰此非臺省所能决臣請自治之一日坐中書堂召至問之曰汝非以彼所分財少乎皆曰然即命各責狀結實因遣两吏趣徙其家令甲入乙舍乙入甲舍貨財皆按堵如故文書則交易之訟者乃止涑水記聞王珣辨印尹洙檢籍少師王珣知昭州日有告偽為州印者疑乆不决吏持以印文不類及珣索景徳已前舊牘視其印文則無少異誣者乃伏盖所印文書乃景徳時事固當索景徳舊牘校之吏不知印文更時所以不决王珪所撰志龍圗尹洙甞知河南府伊陽縣有女㓜孤而冐賀氏産者隣人證其非是而沒之官後隣人死女復訴且請所沒産乆不能决洙問女年㡬曰三十二乃檢咸平年籍二年賀氏死而以妻劉為户詰之曰若五年始生時安得有賀氏耶女遂服見本傳孫登比彈德𥙿模金呉志孫權長子登字髙立爲太子甞出有彈丸飛過令左右求之見一人操彈佩丸咸以爲是詞對不伏從者請捶之登不聴使求前所過弹丸比之不類遂釋之唐李徳𥙿鎮浙右曰甘露寺主僧訴交得堂住什物𬒳前主隱沒金若千兩引證前數軰皆還相交割文籍在焉且其𥘉交領分兩既明及交承之日乃不見金鞫成服罪公疑未窮破用之數前主即曰居寺者前後空交分兩文書其實無金群衆以某孤立不狎流􅒰欲乗此擠之因流涕公乃以兠子召諸關連僧咸使面壁不得相向以泥各令模金之狀僧既不知形狀各模不同公怒即劾前數軰誣證之罪梁適重詛袁彖惡滛丞相梁適為審刑院詳議官時梓州妖人白彦歡能依鬼神作法詛呪人有死者獄上請讞皆以不見傷為疑適曰殺人以刃尚或可拒今以詛呪其能免乎卒以重辟論見王珪所撰志鄭克評曰按能依鬼神作法詛呪是造蓄蠱毒厭魅之類也鞫得其實疑不見傷此盖不知無法者當以類舉之義耳欲决大獄湏傳古義彼俗吏者豈足語此南齊袁彖為廬陵王諮議參軍王鎮荆州時南郡江陵縣茍将之之弟胡之其妻為曽口寺僧所淫夜入茍家将之殺之為官司所檢将之列家門穢行欲告則耻忍則不可實已所殺胡之所列又如此兄弟争死江陵令啓刺史博議彖曰将之胡之原心非暴辨讞之日義哀行路昔文舉引謗獲漏䟽網二子心迹同符古人䧟以深刑實傷為善於是免死出南史袁湛傳彖其族孫也曹駮坐妻孔議詈母沈存中内翰云夀州有人殺妻之父母兄弟數口州司以為不道縁坐妻子刑曹駮曰毆妻之父母即是義絶况於謀殺不當復坐其妻宋孔深之為尚書比部郎時安陸應城縣張江陵與妻呉共罵母黄令死黄忿恨自縊已值赦律子殺傷毆父母遇赦猶梟首罵詈棄市會赦免刑𥙷治無罵詈致死之科深之議曰夫題里逆心仁者不入名且惡之况乃人事故殺傷呪詛法所不容罵之致盡理無可宥江陵雖遇赦恩固合梟首婦本以義愛非天屬黄之所恨意不在呉原死𥙷治有允正法詔如深之議呉可棄市岀南史孔靖傳鄭克評曰罵之致死重於毆傷不以赦原於理為信妻若從坐猶或可赦吴實共罵棄市亦冝詔所以𥙷議之缺也孫亮驗蜜杜亞疑酒呉廢帝孫亮因食生梅使黄門以銀碗并盖於藏吏索蜜黄門素怨藏吏乃以䑕屎投其中啓言藏吏不謹亮即呼吏吏以蜜瓶入亮曰既盖而復油𥿄覆之無縁有此黄門非有求於爾乎吏叩頭曰彼甞貸席而臣不與亮曰决為此也易知耳乃令破䑕屎亮笑曰若䑕屎先在其中當内外俱濕今内燥乃枉之耳於是黄門服罪唐杜亞字次公鎮維陽日有富室父亡未乆奉繼母不以道因元日上母夀母復子觴子疑酒有毒覆之於地地墳乃謂其母以酖殺人母曰天鍳在上何當厚誣撫膺不伏既訴於府公問曰酒從何来曰長婦執爵而致也公曰爾婦執爵毒因婦起豈可誣母乃分所鞫之盖子與婦同謀害母皆伏法傳隆議絶漢武明繼宋文帝時剡縣人黄𥘉妻趙打息載妻王死後遇赦王有父母及息男稱依法徙趙二千里司徒左長史傅隆議曰父子至親分形同氣稱之於載即載之於趙雖云三代合之一體稱雖創鉅痛深固無讐祖之理故古人不以父命辭王父命若云稱可殺趙當何以處載父子祖孫互相殘戮恐非先王明罰臯陶立法之旨也舊令云殺人父母徙二千里外不施父子祖孫趙當避王期功千里外耳然令云凡流徙者同籍近親欲相隨聴之趙既流移載為人子何得不從載行而稱不行豈名敎所許趙雖内愧終身稱亦沉痛没齒祖孫之義永不得絶事理固然出南史傅亮傳漢景帝時廷尉上囚防年繼母陳殺防年父防年因殺陳依律殺母以大逆論帝疑之武帝時年十二爲太子在帝側遂問之對曰夫繼母如母明不及母縁父之故比之於母今繼母無狀手殺其父下手之日母恩絶矣冝與殺人同不冝以大逆論見通典不著本處戴争異罰徐詰縁例唐戴胄爲大理少卿時長孫無忌𬒳召不解佩刀入東上閣尚書右僕射封徳彛論監門校尉不察罪死當無忌贖胄曰校尉與無忌罪均臣子於君父不得稱誤法著御湯藥飲食舟船誤不如法皆死陛下録無忌功原之可也若罰無忌殺校尉不可謂刑帝曰法為天下公朕安得阿親戚詔復議徳彛固執帝将可胄駮之曰校尉縁無忌以致罪法當從輕若皆過誤不當獨死由是無忌與校尉皆免出本傳唐徐有功為司刑丞時有韓純孝者受徐敬業偽官前已物故推事使顧仲琰奏稱家口合縁坐詔依斷籍沒有功議曰律謀反者斬身亡即無斬法若情狀難捨或敕遣戮屍餘非此塗理絶言象縁坐元因處斬無斬豈合相縁既所縁之人亡則所因之罪减减止徒坐頻會赦恩今乃却斷入官未知據何條例詔依有功議斷放由是免籍沒者數百家刑曹駮射左丞免讁沈存中内翰云邢州有盗賊一家其夫婦即時死有一子明日乃死州司以其家財産依户絶法給出嫁親女刑曹駮曰某家父母死時其子尚在財産乃子物出嫁女即姊妹不合有分宋文帝時制刼盗同籍朞親𥙷兵餘杭人薄道舉為刼從弟代公道生並大功親或以代公等母存為朞親而謂子冝從母𥙷兵尚書左丞何承天議曰婦人有三從夫死從子今道舉為刼叔父已殁代公道生並是從弟不合𥙷讁乃以叔母為朞親而令二子隨母既乖大功不讁之制又失婦人三從之道論其母子並冝見原出南史本傳從事凾首乖崖察額近代有因行商回見其妻為人所殺而失其首妻族執其壻誣以殺女吏嚴訊之乃自誣伏案具郡守委諸從事從事疑之請緩其獄乃令封内仵作行人徧供近與人家安厝墓家多少去處一一面詰之有一人曰某近於豪家舉事只言死却妳子五更時於墻頭舁過凶噐輕似無物見瘞某處及發之但獲一女人首即將對屍令其夫驗認云非妻也繼收豪家鞫之乃是殺一妳子函首葬之以屍易此良家婦私蓄之豪民棄市出玉堂閑話張尚書知江寧有僧陳牒出憑公據案熟視乆之判司理院勘殺人賊郡僚不曉其故公乃召僧問披剃㡬年對曰七年又曰何故額有巾痕即首伏乃一民與僧同行道中殺之以其祠部自剃為僧李畋所撰忠定語録無名破冡行成叱驢唐天后賜太平公主鈿噐金寳歲餘失之后聞之怒督洛州長史而下捕盗甚急吏卒游徼計無所出道逄湖州别駕蘓無名相與請至縣白尉曰得盗矣尉問之無名曰吾湖州别駕也尉問吏卒何得誣辱無名曰君無恠也吾歴官所在擒姦擿伏有名此軰聞之故見誣為解圍耳遂請見長史使聞於朝期以旬餘獲之天后許之無名戒吏卒於東北門伺察有胡人十餘􅒰来哀絰出赴北邙即踵以報果見諸胡至一新冡設奠哭而不哀既徹奠又相視冡旁而笑無名乃使擒之而發其冡剖棺視之寳噐在焉天后問故因對曰臣到都日正見此胡出葬便知是盗但未知葬處今清明拜掃計須出城遂蹤跡得之哭而不哀者所葬非人也廵冢而笑者受物無傷也天后稱善遷秩二等唐懷州河内縣董行成能察賊有一人從河陽長店盗行人驢一頭并裳袋天欲暁至懐州行成於街中見之叱曰彼賊住賊即承伏人問何以知之行成曰此驢行急而汗非長行人也見人則引驢逺過怯也以此知之收下獄有頃失主㝷蹤而至皆如其言王曽驗稅司空省書丞相王曽少時謁郡僚有争田者封畛既泯質劑且亡未能斷次曽謂驗具稅籍曲直可判郡僚從之其人乃服見沂公言行録漢時沛郡有民家貲二十餘萬一男纔數歲失其母有一女不賢其父病因呼族人為遺書令悉以財属女但遺一劔云兒年十五以此付之其後又不與兒既而訟之大守司空何武省具手書顧謂掾吏曰女性強梁壻復貪鄙畏害其兒且俾與女内實寄之耳夫劒者所以斷决限年十五者度其子智力足以自居或聞州縣得以伸理其用慮宏逺如是乃悉奪財以還子出風俗通韋皐劾財趙和贖産唐韋皐鎮劒南日有逆旅停止大賈因病而酖之隱沒其財公知之又有北客蘓延商販於蜀得病而卒以報於公公使驗其簿籍已𬒳店主易置公乃㝷究經過客勘於里属詞多不同遂劾於同店者立承隱欺數千貫與吏二十餘人分張悉命赴法由是劒南無横死之客唐咸通𥘉趙和為江隂令有楚之淮隂二農比莊其東隣以荘劵質西隣錢百萬緡明年先納八千緡期来日以殘資贖劵恃契不徴領約明日賫餘繦至而西隣不認既無保證又無文籍訴於州縣皆不能直乃越江而南訴於江隂和曰縣政甚卑且復逾境何計奉雪東隣泣曰此不得理無由自伸和乃思策一日召捕盗吏數軰賫牒至淮隂云有㓂江者案劾已具言有同惡相濟者在某處居名姓形狀俱以西隣指之請梏送至此先是隣州條法唯持刃截江無得藏匿既至和責之曰何為㓂江囚泣曰田夫未嘗舟楫和曰所盗多金寶錦綵非農家所冝有汝冝自籍以辨之囚意稍開乃言稻若干斛荘人某人者紬絹若干匹家機所出者錢若干緡東隣贖契者和乃曰汝果非㓂江者何為諱東隣所贖八千緡遂引訴隣令其偶證於是梏徃本土檢付契書卒寘之法栁設榜牒陳具飲饌周栁慶字更興有胡家𬒳刼郡縣按察莫知賊所隣人𬒳囚者衆慶謂可以詐求之乃作匿名書多榜官門曰我等共刼胡家徒侶混雜終恐泄露今欲首伏恐不免誅若聴先首免罪使欲来告慶乃復施免罪之牒居二日廣陵王欣家奴面縛自告牒下因獲黨與甚衆呉志陳表字文奥以父死敵塲求用為将時有盗官物者數人唯收施明拷掠俟死無詞廷尉以疑聞孫權以表得士卒心詔以明付表表乃去其桎梏飲食沐浴之以誘其歡心明乃首服具列支黨權恱之欲全其名遂釋明而戮其黨明後變行致位為将軍朱詰賕民孔察代盗朱夀昌中散知閬州有大姓雍子良殺人乃賕其里民使出就吏獄具夀昌疑之因引囚屏處訊之囚對如𥘉乃告之曰吾聞子良遺汝錢十萬納汝女為子婦許嫁其女汝家有之乎囚色動又告之曰汝且死書劵抑汝女為婢指十萬為傭直而嫁其女於他人汝将柰何囚泣下始以實告子良付法曽肇所撰志後唐孔相循以邦計貳職權涖夷門軍府事長垣縣有四巨盗冨有資産及敗所牽挽則四貧民耳時都虞候姓韓者則宻使郭崇韜之僚壻也與推吏獄典同鍜其欵都不訊鞫欵成而上斷令棄市及親慮之則又無言就法之際囚屢囘首公疑其情未究即召問之乃曰實枉且言適爲獄吏髙其枷尾遂不得言即命移於州獄俾郡主簿鞫之自韓已下凡數十人受賂約七千緡併以伏法崇龜認刀司馬視鞘唐劉崇龜鎮南海有富商子年少而晳白泊船於江岸次有髙門家一妙姬殊不避人少年挑之曰昬黄當詣宅矣亦無難色是夕果啓扉俟之少年未至有盗入見一房無燭欲行竊姬不知即欣然就之盗謂見執以刀剚之遺刀而逃少年旋至即踐其血汰而仆地及捫之乃見死者急出解維而去明日其家迹其蹤至江岸岸上之人皆云其夜有某客船徑發官差人追之拷掠備至具實吐之惟不招殺人及以其刀視之乃屠家物府主即下令曰某日大教合境庖丁冝集毬塲以俟宰殺既集復曰已晚可留刀於厨而明日再至府主取諸刀乃以殺人之刀換下一口来早各来請刀獨一屠最後不認已刀因詰之對曰此非某刀乃某人之刀耳命擒之則已竄矣於是以合死之囚代商人之子侵夜斃於市竄者知囚已斃不一二夕果歸家遂擒伏法仍杖少年之脊以罪夜入人家後魏司馬恱為豫州刺史有上蔡董毛奴齎錢五千死於道或疑張堤行刼又於堤家得錢五千堤懼楚掠自誣恱疑之乃引毛奴兄問曰殺人取錢當時狼狽應有所遺曽得何物荅曰得一刀鞘恱取視之曰此非里巷所為也乃召州内刀匠示之有郭門者言手所作去歲賣與郭人董及祖恱收詰之具伏出北史司馬楚傳恱其孫也張鷟搜鞍濟羙鈎篋唐張鷟字文成為河陽縣尉有客驢韁斷并鞍失之捕急盗乃夜放驢出而藏其鞍尉遂令客勿秣驢夜放之驢㝷向餵飼處去乃令捜其家於積草下得之人服其智唐閻濟羙鎮江南有舟人載客貨客宻隱銀十鋌於貨中舟人潜窺之乃盗而沉於泊舟之所夜發至鎮所點閱不得遂執舟人而訴之公曰載人盗物大畧皆然乃問曰昨者宿何所曰去此百里浦汊中即令武士同徃彼處江水中鈎之果得篋銀在其中封署不動舟人服罪承天議射廷尉訊獵宋劉毅鎮姑熟嘗出行而鄢陵縣吏陳滿射鳥誤中鎮帥雖不傷處法棄市何承天議曰獄貴情斷疑則從輕漢時有驚文帝馬者張釋之劾以犯蹕罪止罰金明其無心於驚馬也故不以乗輿之重加以異罰今滿意在射鳥非有心於中人律過誤傷人三歲刑况不傷乎罸之可也舊出南史本傳魏髙柔爲廷尉時獄法甚峻冝陽典農劉龜竊於禁内射兎其功曹張京詣校事言之帝匿京名收龜付獄柔表請告者名帝怒曰劉龜當死何復請告者主名柔曰廷尉天下之平安得以至尊喜怒而毁法乎重復為奏帝意寤乃下京名即還訊之各當其罪鄭克評曰按法有誣告反拷若人所以息姦省訟也安得匿告者名乎柔可謂䏻執法矣出魏志本傳
