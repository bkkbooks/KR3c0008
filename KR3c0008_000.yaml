body:
  text: 向相訪賊錢推求奴曹攄明婦裝均釋夫程皓詰翁丙吉驗子李崇還泰黃霸叱姒歐陽左手惟濟右臂沈括顙喉南公塞鼻程琳烓竈強至油幕妾吏鴆宋玉素毒郭彥超虗盜道讓詐囚孫甫舂粟許元焚舟宗元守辜魏濤證死桑懌閉柵蘇秦徇市任城示靴楊津獲絹李傑買棺重榮咄箭蘇請祔柩賈廢追服子産知姦莊遵疑哭思兢詐客佐史誣裴季圭雞豆張舉猪灰定牧認皮滄州市脯張受越訴裴命急吐王質母原馬亮悉貸允濟聽葱彭城書菜吕婦斷腕包牛割舌崔黯搜帑張輅行穴杜鎬毁像次翁戮男傅令鞭絲李惠擊鹽楊牧笞巫薛向執賈程戡仇門仲游帥宇符融沐枕獄吏滌屨宗裔卷紬髙防校布江分表裏章辨朱墨胡質集鄰髙柔察色蔣常覘嫗思彥集兒劉相鄰證韓參乳醫袁滋鑄金孫寶稱散程簿舊錢王璩故簡公綽破柩元膺擒輿栁冤瘖奴王扣狂嫗李公驗櫸王臻辨葛頴知子盜孫料兄殺鄭躬明誤希亮救亡商原詐服竇阻免喪薛絹互爭符盜並走蕭儼震牛懷武用狗文成括書郎簡校劵孝肅杖吏周相收掾方偕主名宋文墨迹陳議捍取胡爭竊食御史失狀國淵求箋偉冒范祚䖍效鄧賢次武各驅憲之俱解張升窺井蔡髙宿海劉湜焚尸髙防劾病王鍔匿名至逺憶姓希崇並付齊賢兩易王珣辨印尹洙檢籍孫登比彈德𥙿模金梁適重詛袁彖惡淫曹駮坐妻孔議詈母孫亮驗蜜杜亞疑酒傅隆議絶漢武明繼戴爭異罰徐詰緣例刑曹駮財左丞免謫從事函首乖崖察額無名破塜行成叱驢王曽驗稅司空省書韋臯劾財趙和贖産栁設榜牒陳具飲饌朱詰賕民孔察代盜崇龜認刀司馬視鞘張鷟搜鞍濟美鈎篋承天議射廷尉訊獵棠隂比事目録終
