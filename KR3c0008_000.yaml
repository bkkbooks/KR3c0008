front:
  text: 棠隂比事序疑獄有集舊矣理掾桂君萬榮今所撰次尤詳真治獄龜鑑也職牧守者所當究心毋徒曰此司狴犴者之責也昔于公自謂治獄有隂德遽高其門我朝錢公若水問獄得情亦自其為郡府小官時桂君之為此其後詎可量耶亟命鋟木用廣其傳嘉定癸酉良月既望莆田劉隸書于金陵郡齊棠隂比事序開禧丁邜春僕以饒之餘干尉趨郡書滿紏曹孫公起豫武林人也留欵竟曰話次因及臬事謂凡典獄之官實生民司命天心向背國祚修短係焉比他職掌尤當謹重近者畨陽尉胥為人所殺昏暯莫知主名承捕之吏續執俞逹以告證佐皆具亦既承伏已且謀連三弓手結欵無一異詞某獨不能無疑躬造臺府請緩其事重立賞榜廣布耳目俾緝正囚未幾果得龔立者以正典刑不然橫致四無辜於死地銜冤千古咎將誰執萬榮聞之瞿然斂袵因嘆吾夫子三絶韋編特著其議獄緩死之象於中孚而古之君子亦盡心於一成不可變者公其有焉既而東歸參選待次建康犴曹屢省斯事若有隱憂遂於暇日取和魯公父子疑獄集參以開封鄭公折獄龜鑑比事屬詞聮成七十二韻號曰棠隂比事凡與我同志者類能上體歷代欽恤之意下䆒諸公編劘之心研精極慮不謂空言則棠隂著明教棘林無夜哭曷勝多禮之幸是用弗嫌於近名擬鋟諸木以廣其傳歲在重光協洽閏月望日四明桂萬榮序棠隂比事目録
